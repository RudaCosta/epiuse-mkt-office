<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calendário Mestre — EPI-USE Office</title>
<link rel="stylesheet" href="/design-tokens.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400;500;600;700&display=swap">
<style>
/* ── BASE ─────────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Maven Pro',sans-serif;background:#061020;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column}
office-nav{flex-shrink:0}

/* ── PAGE LAYOUT ──────────────────────────────────────────────────────────── */
.cal-page{flex:1;display:flex;flex-direction:column;overflow:hidden;height:calc(100vh - 60px)}
.cal-topbar{background:#0a1525;border-bottom:1px solid rgba(96,165,250,.12);padding:14px 20px 10px;flex-shrink:0}
.cal-title-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.cal-title{font-size:18px;font-weight:700;color:#93c5fd}
.cal-nav-group{display:flex;align-items:center;gap:6px}
.nav-btn{width:32px;height:32px;border:1px solid rgba(96,165,250,.15);border-radius:8px;background:rgba(96,165,250,.06);cursor:pointer;font-size:16px;color:#94a3b8;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nav-btn:hover{background:rgba(96,165,250,.15);border-color:rgba(96,165,250,.3);color:#e2e8f0}
#monthLabel{font-size:15px;font-weight:600;color:#e2e8f0;min-width:150px;text-align:center}
.today-btn{padding:5px 12px;border:1px solid rgba(96,165,250,.3);border-radius:8px;background:rgba(96,165,250,.08);color:#93c5fd;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.today-btn:hover{background:#001844;color:#fff;border-color:#001844}
.sync-btn{padding:5px 12px;border:1px solid rgba(96,165,250,.15);border-radius:8px;background:rgba(96,165,250,.04);color:#94a3b8;font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.sync-btn:hover{border-color:rgba(96,165,250,.3);color:#e2e8f0}
.sync-btn.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.cal-filters{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.layer-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--lc);background:transparent;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;color:var(--lc);transition:all .15s;white-space:nowrap}
.layer-btn:hover{opacity:.85}
.layer-btn.active{background:var(--lc);color:#fff}
.layer-btn .ldot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── BODY: GRID + SIDE ────────────────────────────────────────────────────── */
.cal-body{flex:1;display:flex;overflow:hidden}
.cal-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

.weekday-row{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid rgba(96,165,250,.08);background:rgba(96,165,250,.03);flex-shrink:0}
.wd-label{text-align:center;padding:7px 4px;font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.06em}
.wd-label.weekend{color:#374151}

.cal-days-wrap{flex:1;overflow-y:auto}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:auto}

/* ── DAY CELLS ────────────────────────────────────────────────────────────── */
.cal-day{border-right:1px solid rgba(96,165,250,.07);border-bottom:1px solid rgba(96,165,250,.07);padding:6px 5px 4px;min-height:88px;cursor:pointer;transition:background .1s;position:relative}
.cal-day:hover{background:rgba(96,165,250,.06)}
.cal-day.other-month{opacity:.15;cursor:default;pointer-events:none}
.cal-day.is-weekend{background:rgba(96,165,250,.02)}
.cal-day.has-feriado{background:rgba(220,38,38,.07)}
.cal-day.is-selected{background:rgba(37,99,235,.15);outline:2px solid rgba(96,165,250,.4);outline-offset:-2px;z-index:1}
.cal-day:nth-child(7n){border-right:none}

.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.day-num{width:24px;height:24px;border-radius:50%;font-size:12px;font-weight:600;color:#64748b;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cal-day.is-today .day-num{background:#001844;color:#fff;box-shadow:0 0 0 2px rgba(96,165,250,.4)}
.day-feriado-dot{width:5px;height:5px;border-radius:50%;background:#dc2626;flex-shrink:0}

.day-events{display:flex;flex-direction:column;gap:2px}
.event-chip{display:flex;align-items:center;gap:3px;padding:2px 4px;border-radius:3px;font-size:10px;line-height:1.3;overflow:hidden;cursor:pointer;transition:opacity .1s;background:color-mix(in srgb,var(--cc) 20%,transparent)}
.event-chip:hover{opacity:.8}
.chip-dot{width:6px;height:6px;border-radius:50%;background:var(--cc);flex-shrink:0}
.chip-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#cbd5e1;flex:1;font-size:10px}
.overflow-chip{font-size:10px;color:#475569;padding:1px 4px;margin-top:1px}

/* Loading */
.cal-loading{display:flex;align-items:center;justify-content:center;padding:60px 0}
.spinner{width:28px;height:28px;border:3px solid rgba(96,165,250,.15);border-top-color:#60a5fa;border-radius:50%;animation:spin .7s linear infinite}
#calLoadingBar{height:3px;background:linear-gradient(90deg,#001844,#cd1543);position:fixed;top:60px;left:0;right:0;z-index:100;transform:scaleX(0);transform-origin:left;transition:transform .4s ease;display:none}

/* ── SIDE PANEL ───────────────────────────────────────────────────────────── */
.cal-side{width:272px;flex-shrink:0;border-left:1px solid rgba(96,165,250,.10);background:#0a1525;display:flex;flex-direction:column;overflow:hidden}
.side-header{padding:14px 16px 10px;border-bottom:1px solid rgba(96,165,250,.10);flex-shrink:0}
.side-header h3{font-size:13px;font-weight:700;color:#93c5fd}
.side-header p{font-size:11px;color:#475569;margin-top:2px}
.side-body{flex:1;overflow-y:auto;padding:12px 16px}
.side-empty{text-align:center;padding:32px 0;color:#374151;font-size:12px}
.side-empty svg{display:block;margin:0 auto 8px;opacity:.3;color:#475569}

.day-event-item{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid rgba(96,165,250,.08)}
.day-event-item:last-child{border-bottom:none}
.dei-bar{width:3px;border-radius:2px;background:var(--cc);flex-shrink:0;min-height:36px}
.dei-body{flex:1;min-width:0}
.dei-title{font-size:12px;font-weight:600;color:#e2e8f0;line-height:1.3}
.dei-meta{font-size:10px;color:#64748b;margin-top:2px}
.dei-badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:700;color:#fff;background:var(--cc);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}

.side-section-label{font-size:10px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.08em;margin:12px 0 6px}
.side-section-label:first-child{margin-top:0}
.tbc-item{padding:6px 8px;border-radius:6px;background:rgba(96,165,250,.06);margin-bottom:4px;font-size:11px}
.tbc-name{font-weight:600;color:#cbd5e1}
.tbc-meta{color:#64748b;font-size:10px;margin-top:1px}

/* ── STATS BAR ────────────────────────────────────────────────────────────── */
.month-stats{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.stat-pill{display:flex;align-items:center;gap:4px;font-size:10px;color:#64748b;background:rgba(96,165,250,.06);padding:3px 8px;border-radius:12px}
.stat-dot{width:6px;height:6px;border-radius:50%}

/* ── RESPONSIVE ───────────────────────────────────────────────────────────── */
@media(max-width:960px){.cal-side{width:220px}}
@media(max-width:768px){
  .cal-side{display:none}
  .cal-day{min-height:64px}
  .chip-text{display:none}
  .event-chip{padding:2px 3px}
}
@media(max-width:480px){
  .cal-day{min-height:48px;padding:4px 3px}
  .day-num{font-size:11px;width:20px;height:20px}
}
office-footer{flex-shrink:0}
</style>
</head>
<body>
<office-nav></office-nav>
<div id="calLoadingBar"></div>

<div class="cal-page">
  <div class="cal-topbar">
    <div class="cal-title-row">
      <span class="cal-title">Calendário Mestre</span>

      <div class="cal-nav-group">
        <button class="nav-btn" id="prevBtn" title="Mês anterior">&#8249;</button>
        <span id="monthLabel">Junho 2026</span>
        <button class="nav-btn" id="nextBtn" title="Próximo mês">&#8250;</button>
        <button class="today-btn" id="todayBtn">Hoje</button>
      </div>

      <button class="sync-btn" id="syncBtn" title="Recarregar todos os dados">
        <svg id="syncIcon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M23 4v6h-6M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        Atualizar
      </button>
    </div>

    <div class="cal-filters" id="filtersRow"></div>
  </div>

  <div class="cal-body">
    <div class="cal-main">
      <div class="weekday-row">
        <div class="wd-label">Seg</div>
        <div class="wd-label">Ter</div>
        <div class="wd-label">Qua</div>
        <div class="wd-label">Qui</div>
        <div class="wd-label">Sex</div>
        <div class="wd-label weekend">Sáb</div>
        <div class="wd-label weekend">Dom</div>
      </div>
      <div class="cal-days-wrap">
        <div class="cal-days" id="calDays">
          <div class="cal-loading" style="grid-column:1/-1"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <aside class="cal-side" id="calSide">
      <div class="side-header">
        <h3 id="sideTitle">Selecione um dia</h3>
        <p id="sideSubtitle">Clique em qualquer dia do calendário</p>
      </div>
      <div class="side-body" id="sideBody">
        <div class="side-empty">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
          Clique em um dia para ver os detalhes
        </div>
      </div>
    </aside>
  </div>
</div>

<office-footer></office-footer>

<script src="/office-nav.js"></script>
<script src="/office-footer.js"></script>
<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const LAYERS = [
  { id:'mdf',          label:'MDF / Dev Funds',    color:'#dc2626' },
  { id:'deadline',     label:'Deadlines (ações)',  color:'#e11d48' },
  { id:'epiuse',       label:'Eventos EPI-USE/SAP',color:'#cd1543' },
  { id:'redatoria',    label:'Artigos Redatoria',  color:'#001844' },
  { id:'duda',         label:'Posts Redes (Duda)', color:'#0369a1' },
  { id:'comemorativa', label:'Datas Comemorativas',color:'#d97706' },
  { id:'feriado',      label:'Feriados',          color:'#b91c1c' },
  { id:'copa',         label:'Copa / Esporte',     color:'#16a34a' },
  { id:'efemeride',    label:'Efemérides',         color:'#7c3aed' },
  { id:'premiacao',    label:'Premiações',         color:'#ca8a04' },
];

// ── STATE ──────────────────────────────────────────────────────────────────
const state = {
  year:  new Date().getFullYear(),
  month: new Date().getMonth(),
  dayMap: {},       // 'YYYY-MM-DD' -> [event, ...]
  tbcByMonth: {},   // 'YYYY-MM'    -> [event, ...]
  activeLayers: new Set(LAYERS.map(l => l.id)),
  selectedDay: null,
};

// ── UTILS ──────────────────────────────────────────────────────────────────
function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDateFull(iso) {
  const [y,m,d] = iso.split('-');
  const DOW = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const dow = new Date(`${iso}T12:00:00`).getDay();
  return `${DOW[dow]}, ${parseInt(d)} de ${MONTHS_PT[parseInt(m)-1]} de ${y}`;
}

// ── DATA ───────────────────────────────────────────────────────────────────
function addToMap(dateStr, evt) {
  if (!dateStr || !/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return;
  if (!state.dayMap[dateStr]) state.dayMap[dateStr] = [];
  state.dayMap[dateStr].push(evt);
}

async function loadAllData() {
  showLoadingBar();
  const year = state.year;

  const [especiais, eventsRaw, editorial, deadlines] = await Promise.all([
    fetch('/api/datas-especiais-2026.json').then(r=>r.json()).catch(()=>({itens:[]})),
    fetch('/api/events.json').then(r=>r.json()).catch(()=>({abas:{}})),
    fetch(`/api/inbound/calendar?from=${year}-01-01&to=${year}-12-31`).then(r=>r.json()).catch(()=>({posts:[]})),
    fetch('/api/deadlines-2026.json').then(r=>r.json()).catch(()=>({itens:[]})),
  ]);

  state.dayMap = {};
  state.tbcByMonth = {};

  // 1 — Datas especiais (JSON estático)
  for (const item of (especiais.itens || [])) {
    if (!item.data) continue;
    addToMap(item.data, {
      id: item.id,
      data: item.data,
      data_fim: item.data_fim || null,
      layerId: item.tipo,
      nome: item.nome,
      desc: item.descricao || '',
      color: item.cor || '#64748b',
      paises: item.paises || [],
    });
  }

  // 1b — Deadlines MDF / ações (JSON estático, fonte email SAP + ações internas)
  for (const item of (deadlines.itens || [])) {
    if (!item.data) continue;
    addToMap(item.data, {
      id: item.id,
      data: item.data,
      data_fim: item.data_fim || null,
      layerId: item.tipo,         // 'mdf' ou 'deadline'
      nome: item.nome,
      desc: item.descricao || '',
      color: item.cor || '#dc2626',
    });
  }

  // 2 — Eventos EPI-USE (events.json)
  for (const [, aba] of Object.entries(eventsRaw.abas || {})) {
    for (const evt of (aba.eventos || [])) {
      if (!evt.m) continue;
      // TBC → painel lateral do mês
      if (!evt.d || evt.d === 'TBC') {
        const key = `${year}-${String(evt.m).padStart(2,'0')}`;
        if (!state.tbcByMonth[key]) state.tbcByMonth[key] = [];
        state.tbcByMonth[key].push({
          nome: evt.n,
          desc: `${evt.lob} · ${evt.who} · ${evt.flag||evt.country||''}`,
          color: '#cd1543',
        });
        continue;
      }
      const parts  = String(evt.d).split('-');
      const day0   = parseInt(parts[0]);
      const dayEnd = parts[1] ? parseInt(parts[1]) : null;
      const mPad   = String(evt.m).padStart(2,'0');
      const iso    = `${year}-${mPad}-${String(day0).padStart(2,'0')}`;
      const isoEnd = dayEnd ? `${year}-${mPad}-${String(dayEnd).padStart(2,'0')}` : null;
      addToMap(iso, {
        id: `epiuse-${evt.m}-${evt.d}-${evt.n}`.replace(/\s+/g,'-').slice(0,60),
        data: iso,
        data_fim: isoEnd,
        layerId: 'epiuse',
        nome: evt.n,
        desc: `${evt.lob} · ${evt.who} · ${evt.flag||evt.country||''}`,
        color: '#cd1543',
      });
    }
  }

  // 3 — Editorial calendar (SQLite: Duda + Redatoria)
  for (const post of (editorial.posts || [])) {
    const layerId = post.fonte === 'redatoria' ? 'redatoria' : 'duda';
    addToMap(post.data, {
      id: `ec-${post.id}`,
      data: post.data,
      layerId,
      nome: post.titulo,
      desc: [post.canal, post.pilar, post.autor].filter(Boolean).join(' · '),
      color: layerId === 'redatoria' ? '#001844' : '#0369a1',
      canal: post.canal,
      pilar: post.pilar,
      autor: post.autor,
      status: post.status,
      fonte: post.fonte,
    });
  }

  hideLoadingBar();
  renderMonth();
}

function getEventsForDay(iso) {
  return (state.dayMap[iso] || []).filter(e => state.activeLayers.has(e.layerId));
}

// ── RENDER: FILTERS ────────────────────────────────────────────────────────
function renderFilters() {
  const row = document.getElementById('filtersRow');
  row.innerHTML = LAYERS.map(l => `
    <button class="layer-btn${state.activeLayers.has(l.id)?' active':''}"
      data-layer="${l.id}" style="--lc:${l.color}">
      <span class="ldot"></span>${esc(l.label)}
    </button>
  `).join('');
  row.querySelectorAll('.layer-btn').forEach(btn =>
    btn.addEventListener('click', () => {
      const id = btn.dataset.layer;
      state.activeLayers.has(id) ? state.activeLayers.delete(id) : state.activeLayers.add(id);
      renderFilters();
      renderMonth();
      if (state.selectedDay) showDayPanel(state.selectedDay);
    })
  );
}

// ── RENDER: MONTH GRID ─────────────────────────────────────────────────────
function renderMonth() {
  const { year, month } = state;
  document.getElementById('monthLabel').textContent = `${MONTHS_PT[month]} ${year}`;

  const firstDay    = new Date(year, month, 1);
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const startDow    = (firstDay.getDay() + 6) % 7; // Mon=0

  const today = new Date(); today.setHours(0,0,0,0);
  const todayISO = toISO(today);

  // Build cell array
  const cells = [];
  for (let i = startDow - 1; i >= 0; i--)  cells.push({ d: new Date(year, month, -i), cur: false });
  for (let d = 1; d <= daysInMonth; d++)    cells.push({ d: new Date(year, month, d), cur: true });
  const rem = (7 - cells.length % 7) % 7;
  for (let i = 1; i <= rem; i++)            cells.push({ d: new Date(year, month+1, i), cur: false });

  const container = document.getElementById('calDays');
  container.innerHTML = '';

  for (const { d, cur } of cells) {
    const iso     = toISO(d);
    const events  = cur ? getEventsForDay(iso) : [];
    const isToday = iso === todayISO;
    const isSel   = iso === state.selectedDay;
    const isWE    = d.getDay() === 0 || d.getDay() === 6;
    const hasFer  = events.some(e => e.layerId === 'feriado');

    const cls = ['cal-day',
      !cur && 'other-month',
      isToday && 'is-today',
      isSel   && 'is-selected',
      isWE    && 'is-weekend',
      hasFer  && 'has-feriado',
    ].filter(Boolean).join(' ');

    const cell = document.createElement('div');
    cell.className = cls;

    const MAX = 3;
    const shown = events.slice(0, MAX);
    const over  = events.length - MAX;

    cell.innerHTML = `
      <div class="day-header">
        <span class="day-num">${d.getDate()}</span>
        ${hasFer ? '<span class="day-feriado-dot" title="Feriado"></span>' : ''}
      </div>
      <div class="day-events">
        ${shown.map(e => `
          <div class="event-chip" style="--cc:${e.color}" title="${esc(e.nome)}">
            <span class="chip-dot"></span>
            <span class="chip-text">${esc(e.nome)}</span>
          </div>
        `).join('')}
        ${over > 0 ? `<div class="overflow-chip">+${over} mais</div>` : ''}
      </div>
    `;

    if (cur) {
      cell.addEventListener('click', () => {
        state.selectedDay = iso;
        renderMonth();
        showDayPanel(iso);
      });
    }
    container.appendChild(cell);
  }

  // Refresh side panel
  if (state.selectedDay) showDayPanel(state.selectedDay);
  else showMonthPanel();
}

// ── RENDER: SIDE PANEL ─────────────────────────────────────────────────────
function showDayPanel(iso) {
  const events = getEventsForDay(iso);
  document.getElementById('sideTitle').textContent = fmtDateFull(iso);
  document.getElementById('sideSubtitle').textContent =
    events.length === 0 ? 'Nenhum item' : `${events.length} item${events.length>1?'s':''}`;

  if (!events.length) {
    document.getElementById('sideBody').innerHTML = `
      <div class="side-empty">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        Dia livre
      </div>`;
    return;
  }

  // Group by layer order
  const grouped = {};
  for (const e of events) { if (!grouped[e.layerId]) grouped[e.layerId] = []; grouped[e.layerId].push(e); }

  let html = '';
  for (const layer of LAYERS) {
    const grp = grouped[layer.id];
    if (!grp) continue;
    html += `<div class="side-section-label">${esc(layer.label)}</div>`;
    for (const e of grp) {
      html += `
        <div class="day-event-item">
          <div class="dei-bar" style="--cc:${e.color}"></div>
          <div class="dei-body">
            <div class="dei-title">${esc(e.nome)}</div>
            ${e.desc ? `<div class="dei-meta">${esc(e.desc)}</div>` : ''}
            ${e.data_fim ? `<div class="dei-meta">Até ${esc(e.data_fim)}</div>` : ''}
            ${e.status && e.status !== 'planned' ? `<div class="dei-meta">Status: ${esc(e.status)}</div>` : ''}
            <span class="dei-badge" style="--cc:${e.color}">${esc(layer.label)}</span>
          </div>
        </div>`;
    }
  }

  // Append TBC for the selected month
  const { year, month } = state;
  const tbcKey = `${year}-${String(month+1).padStart(2,'0')}`;
  const tbc = state.tbcByMonth[tbcKey] || [];
  if (tbc.length) {
    html += `<div class="side-section-label">Eventos sem data este mês</div>`;
    for (const t of tbc) {
      html += `<div class="tbc-item"><div class="tbc-name">${esc(t.nome)}</div><div class="tbc-meta">${esc(t.desc)}</div></div>`;
    }
  }

  document.getElementById('sideBody').innerHTML = html;
}

function showMonthPanel() {
  const { year, month } = state;
  const key = `${year}-${String(month+1).padStart(2,'0')}`;
  const tbc = state.tbcByMonth[key] || [];

  document.getElementById('sideTitle').textContent = `${MONTHS_PT[month]} ${year}`;
  document.getElementById('sideSubtitle').textContent = 'Selecione um dia para detalhes';

  // Month stats
  const allEvents = Object.entries(state.dayMap)
    .filter(([d]) => d.startsWith(key))
    .flatMap(([,evts]) => evts)
    .filter(e => state.activeLayers.has(e.layerId));

  const counts = {};
  for (const e of allEvents) counts[e.layerId] = (counts[e.layerId]||0) + 1;

  let html = '';
  if (Object.keys(counts).length) {
    html += `<div class="side-section-label">Este mês</div>
    <div class="month-stats">
      ${LAYERS.filter(l => counts[l.id]).map(l =>
        `<span class="stat-pill"><span class="stat-dot" style="background:${l.color}"></span>${counts[l.id]} ${esc(l.label)}</span>`
      ).join('')}
    </div>`;
  }

  if (tbc.length) {
    html += `<div class="side-section-label" style="margin-top:16px">Sem data confirmada (TBC)</div>`;
    for (const t of tbc) {
      html += `<div class="tbc-item"><div class="tbc-name">${esc(t.nome)}</div><div class="tbc-meta">${esc(t.desc)}</div></div>`;
    }
  }

  if (!html) {
    html = `<div class="side-empty">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
      </svg>
      Clique em um dia
    </div>`;
  }

  document.getElementById('sideBody').innerHTML = html;
}

// ── LOADING BAR ────────────────────────────────────────────────────────────
function showLoadingBar() {
  const b = document.getElementById('calLoadingBar');
  b.style.display = 'block'; b.style.transform = 'scaleX(.3)';
  setTimeout(() => b.style.transform = 'scaleX(.7)', 200);
}
function hideLoadingBar() {
  const b = document.getElementById('calLoadingBar');
  b.style.transform = 'scaleX(1)';
  setTimeout(() => { b.style.transform = 'scaleX(0)'; b.style.display = 'none'; }, 400);
}

// ── NAVIGATION ─────────────────────────────────────────────────────────────
document.getElementById('prevBtn').addEventListener('click', () => {
  if (state.month === 0) { state.month = 11; state.year--; } else state.month--;
  state.selectedDay = null;
  loadAllData();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (state.month === 11) { state.month = 0; state.year++; } else state.month++;
  state.selectedDay = null;
  loadAllData();
});
document.getElementById('todayBtn').addEventListener('click', () => {
  const n = new Date();
  state.year = n.getFullYear(); state.month = n.getMonth();
  state.selectedDay = null;
  loadAllData();
});
document.getElementById('syncBtn').addEventListener('click', async () => {
  const btn = document.getElementById('syncBtn');
  btn.classList.add('spinning');
  await loadAllData();
  btn.classList.remove('spinning');
});
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft')  document.getElementById('prevBtn').click();
  if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
});

// ── INIT ───────────────────────────────────────────────────────────────────
renderFilters();
loadAllData();
</script>
</body>
</html>
