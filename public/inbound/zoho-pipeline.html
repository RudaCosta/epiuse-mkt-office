<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pipeline MKT — EPI-USE Office</title>
<link rel="stylesheet" href="/design-tokens.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400;500;600;700&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Maven Pro',sans-serif;background:#f4f7fb;color:#1e293b;min-height:100vh;display:flex;flex-direction:column}
office-nav{flex-shrink:0}
office-footer{flex-shrink:0;margin-top:auto}

/* ── TOPBAR ── */
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 24px 12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.page-title{font-size:18px;font-weight:700;color:#001844;white-space:nowrap}
.page-sub{font-size:12px;color:#64748b;margin-top:2px}
.source-tabs{display:flex;background:#f1f5f9;border-radius:10px;padding:3px;gap:2px}
.source-tab{padding:6px 16px;border:none;border-radius:8px;background:transparent;font-family:inherit;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;transition:all .15s;white-space:nowrap;min-height:44px}
.source-tab.active{background:#001844;color:#fff}
.source-tab:hover:not(.active){background:#e2e8f0;color:#1e293b}
.topbar-right{display:flex;align-items:center;gap:8px}
.sync-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;font-family:inherit;font-size:12px;color:#64748b;cursor:pointer;transition:all .15s;min-height:44px}
.sync-btn:hover{border-color:#001844;color:#001844}
.sync-btn.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.last-sync{font-size:11px;color:#94a3b8;text-align:right}

/* ── LOADING BAR ── */
.load-bar{height:3px;background:linear-gradient(90deg,#001844,#cd1543,#001844);background-size:200% 100%;animation:loadslide 1.2s linear infinite;position:fixed;top:0;left:0;right:0;z-index:999;display:none}
.load-bar.active{display:block}
@keyframes loadslide{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* ── MAIN ── */
.main{flex:1;padding:24px;max-width:1280px;width:100%;margin:0 auto}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:80px 24px;background:#fff;border-radius:16px;border:1px solid #e2e8f0}
.empty-icon{width:64px;height:64px;margin:0 auto 16px;color:#cbd5e1}
.empty-title{font-size:18px;font-weight:700;color:#001844;margin-bottom:8px}
.empty-sub{font-size:14px;color:#64748b;line-height:1.6;max-width:400px;margin:0 auto 24px}
.empty-action{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:#001844;color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.empty-action:hover{background:#0a2560}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.kpi-grid{grid-template-columns:1fr}}
.kpi-card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:20px;transition:box-shadow .15s}
.kpi-card:hover{box-shadow:0 4px 16px rgba(0,24,68,.08)}
.kpi-label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kpi-value{font-size:26px;font-weight:700;color:#001844;line-height:1;margin-bottom:6px}
.kpi-deals{font-size:12px;color:#94a3b8}
.kpi-card.accent{border-left:3px solid #cd1543}
.kpi-card.accent .kpi-value{color:#cd1543}

/* ── SECTION ── */
.section{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:24px;margin-bottom:24px}
.section-title{font-size:15px;font-weight:700;color:#001844;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title span{font-size:11px;font-weight:600;color:#64748b;background:#f1f5f9;padding:3px 8px;border-radius:20px}

/* ── CAMPANHA TABLE ── */
.campanha-table{width:100%;border-collapse:collapse}
.campanha-table th{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.4px;padding:8px 12px;border-bottom:2px solid #f1f5f9;text-align:left}
.campanha-table th:last-child,.campanha-table td:last-child{text-align:right}
.campanha-table td{padding:10px 12px;border-bottom:1px solid #f8fafc;font-size:13px;vertical-align:middle}
.campanha-table tr:last-child td{border-bottom:none}
.campanha-table tr:hover td{background:#fafbfc}
.bar-cell{padding-right:8px!important}
.bar-wrap{height:8px;background:#f1f5f9;border-radius:4px;min-width:60px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#001844,#003080);transition:width .4s ease}
.bar-fill.sdr{background:linear-gradient(90deg,#374151,#6b7280)}
.deal-count{font-size:11px;color:#94a3b8;margin-top:2px}
.valor-cell{font-weight:700;color:#001844;font-size:13px;white-space:nowrap}

/* ── 2-COL CHART GRID ── */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:768px){.chart-grid{grid-template-columns:1fr}}

/* ── HORIZONTAL BAR CHART ── */
.hbar-list{display:flex;flex-direction:column;gap:10px}
.hbar-item{display:flex;flex-direction:column;gap:4px}
.hbar-label{display:flex;justify-content:space-between;align-items:center}
.hbar-name{font-size:12px;font-weight:600;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%}
.hbar-meta{font-size:11px;color:#64748b;white-space:nowrap}
.hbar-track{height:10px;background:#f1f5f9;border-radius:5px;overflow:hidden}
.hbar-fill{height:100%;border-radius:5px;background:#001844;transition:width .4s ease}
.hbar-fill.alt{background:#cd1543}

/* ── TREND CHART ── */
.trend-bars{display:flex;align-items:flex-end;gap:6px;height:120px;padding-bottom:4px}
.trend-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:0}
.trend-bar{width:100%;background:#001844;border-radius:4px 4px 0 0;transition:height .4s ease;min-height:2px;cursor:pointer;position:relative}
.trend-bar:hover{background:#003080}
.trend-bar-tip{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;font-size:10px;padding:3px 6px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s}
.trend-bar:hover .trend-bar-tip{opacity:1}
.trend-label{font-size:9px;color:#94a3b8;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:1000;transform:translateY(100px);opacity:0;transition:all .3s;pointer-events:none;max-width:360px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-left:3px solid #16a34a}
.toast.error{border-left:3px solid #cd1543}
</style>
</head>
<body>
<div class="load-bar" id="loadBar"></div>
<office-nav></office-nav>

<div class="topbar">
  <div class="topbar-left">
    <div>
      <div class="page-title">Pipeline MKT</div>
      <div class="page-sub">Oportunidades geradas via Marketing — Zoho CRM</div>
    </div>
    <div class="source-tabs">
      <button class="source-tab active" data-src="all">Todos</button>
      <button class="source-tab" data-src="mkt">MKT (EPI-USE)</button>
      <button class="source-tab" data-src="sdr">SDR</button>
    </div>
  </div>
  <div class="topbar-right">
    <div>
      <button class="sync-btn" id="syncBtn" title="Sincronizar dados do Zoho">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Sync Zoho
      </button>
      <div class="last-sync" id="lastSyncLabel"></div>
    </div>
  </div>
</div>

<div class="main" id="mainContent">
  <!-- preenchido pelo JS -->
</div>

<div class="toast" id="toast"></div>
<office-footer></office-footer>
<script src="/office-nav.js"></script>
<script src="/office-footer.js"></script>
<script>
const EDITOR_TOKEN = 'eubr-voices-edit-2026';
let state = { source: 'all', data: null };

// ── HELPERS ──────────────────────────────────────────────────────────────────
function brl(v) {
  const n = Number(v) || 0;
  if (n >= 1e6)  return 'R$ ' + (n/1e6).toFixed(1).replace('.',',') + 'M';
  if (n >= 1e3)  return 'R$ ' + (n/1e3).toFixed(0) + 'k';
  return 'R$ ' + n.toLocaleString('pt-BR', {minimumFractionDigits:0});
}

function brlFull(v) {
  return 'R$ ' + Number(v||0).toLocaleString('pt-BR', {minimumFractionDigits:2,maximumFractionDigits:2});
}

function fmtDate(iso) {
  if (!iso) return '—';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => { t.className = 'toast'; }, 3500);
}

function loading(on) {
  document.getElementById('loadBar').classList.toggle('active', on);
  document.getElementById('syncBtn').classList.toggle('spinning', on);
}

// ── FETCH ─────────────────────────────────────────────────────────────────────
async function loadData() {
  loading(true);
  try {
    const r = await fetch(`/api/zoho/pipeline?source=${state.source}`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    state.data = await r.json();
    render();
    const ls = state.data.last_sync;
    document.getElementById('lastSyncLabel').textContent = ls
      ? 'Sync: ' + new Date(ls).toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})
      : '';
  } catch(e) {
    toast('Erro ao carregar dados: ' + e.message, 'error');
  } finally {
    loading(false);
  }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const d = state.data;
  const main = document.getElementById('mainContent');

  if (!d || d.total_deals === 0) {
    main.innerHTML = emptyStateHTML();
    main.querySelector('.empty-action')?.addEventListener('click', triggerSync);
    return;
  }

  main.innerHTML = kpiHTML(d.kpis) + campanhaHTML(d.por_campanha) + chartGridHTML(d.por_solution, d.por_deal_scope) + trendHTML(d.por_mes);
}

function emptyStateHTML() {
  return `<div class="empty-state">
    <svg class="empty-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="8" y="16" width="48" height="36" rx="6"/>
      <path d="M8 28h48M20 16V8M44 16V8M20 40h8M20 46h16"/>
    </svg>
    <div class="empty-title">Nenhum deal sincronizado ainda</div>
    <div class="empty-sub">Clique em "Sync Zoho" para puxar as oportunidades do CRM, ou rode o script de sync numa sessão Claude com o MCP do Zoho conectado.</div>
    <button class="empty-action">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      Sincronizar agora
    </button>
  </div>`;
}

function kpiHTML(kpis) {
  const cards = [
    { key:'este_mes',   accent:true  },
    { key:'ultimo_mes', accent:false },
    { key:'ultimo_q',   accent:false },
    { key:'ultimo_fy',  accent:false },
  ];
  return `<div class="kpi-grid">${cards.map(c => {
    const k = kpis[c.key];
    return `<div class="kpi-card${c.accent?' accent':''}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${brl(k.valor)}</div>
    </div>`;
  }).join('')}</div>`;
}

function campanhaHTML(rows) {
  if (!rows?.length) return '';
  const max = rows.reduce((m,r) => Math.max(m, r.total), 0);
  const isSdr = state.source === 'sdr';
  return `<div class="section">
    <div class="section-title">Pipeline por Campanha <span>24 meses · ${rows.length} campanhas</span></div>
    <div style="overflow-x:auto">
    <table class="campanha-table">
      <thead><tr>
        <th>Campanha</th>
        <th style="width:200px">Volume</th>
        <th>Deals</th>
        <th>Total</th>
      </tr></thead>
      <tbody>${rows.map(r => `<tr>
        <td><div style="font-weight:600;color:#1e293b;font-size:13px">${r.campanha || '(sem campanha)'}</div></td>
        <td class="bar-cell"><div class="bar-wrap"><div class="bar-fill${isSdr?' sdr':''}" style="width:${max?Math.round(r.total/max*100):0}%"></div></div></td>
        <td><div class="deal-count">${r.deals} deal${r.deals!==1?'s':''}</div></td>
        <td class="valor-cell">${brlFull(r.total)}</td>
      </tr>`).join('')}</tbody>
    </table>
    </div>
  </div>`;
}

function hbarSection(title, rows, valueKey, labelKey, labelFn, valueFn, cls) {
  if (!rows?.length) return `<div class="section"><div class="section-title">${title}</div><p style="color:#94a3b8;font-size:13px">Sem dados</p></div>`;
  const max = rows.reduce((m,r) => Math.max(m, r[valueKey]||0), 0);
  return `<div class="section">
    <div class="section-title">${title} <span>${rows.length}</span></div>
    <div class="hbar-list">${rows.map(r => `
      <div class="hbar-item">
        <div class="hbar-label">
          <span class="hbar-name" title="${r[labelKey]||''}">${r[labelKey]||'(sem dado)'}</span>
          <span class="hbar-meta">${valueFn(r)}</span>
        </div>
        <div class="hbar-track"><div class="hbar-fill${cls?' '+cls:''}" style="width:${max?Math.round((r[valueKey]||0)/max*100):0}%"></div></div>
      </div>`).join('')}
    </div>
  </div>`;
}

function chartGridHTML(solution, dealScope) {
  const sol  = hbarSection('Por Solution',   solution,  'deals', 'solution',  null, r => `${r.deals} deals · ${brl(r.total)}`, '');
  const scope = hbarSection('Por Deal Scope', dealScope, 'deals', 'deal_scope', null, r => `${r.deals} deals`, 'alt');
  return `<div class="chart-grid">${sol}${scope}</div>`;
}

function trendHTML(porMes) {
  if (!porMes?.length) return '';
  const max = porMes.reduce((m,r) => Math.max(m, r.total||0), 0);
  const bars = porMes.map(r => {
    const px = max ? Math.max(3, Math.round((r.total||0)/max*96)) : 3;
    const label = r.mes ? r.mes.slice(5) + '/' + r.mes.slice(2,4) : '';
    return `<div class="trend-col">
      <div class="trend-bar" style="height:${px}px">
        <div class="trend-bar-tip">${label}<br>${brl(r.total)}<br>${r.deals} deal${r.deals!==1?'s':''}</div>
      </div>
      <div class="trend-label">${label}</div>
    </div>`;
  });
  return `<div class="section">
    <div class="section-title">Tendência mensal <span>últimos 24 meses</span></div>
    <div class="trend-bars">${bars.join('')}</div>
  </div>`;
}

// ── SYNC ─────────────────────────────────────────────────────────────────────
async function triggerSync() {
  toast('Para sincronizar: use o botão "Sync Zoho" numa sessão Claude com o MCP conectado.', 'success');
}

// ── EVENTS ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.source-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.source-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.source = btn.dataset.src;
    loadData();
  });
});

document.getElementById('syncBtn').addEventListener('click', triggerSync);

loadData();
</script>
</body>
</html>
