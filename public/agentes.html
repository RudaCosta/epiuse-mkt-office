<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🤖 Agentes & Contexto · EPI-USE Office</title>
<link rel="stylesheet" href="/design-tokens.css">
<style>
  body { margin:0; background:var(--color-bg,#0a1525); color:var(--color-text,#e6ebf2); font-family:'Open Sans',Arial,sans-serif; }
  .wrap { max-width:1200px; margin:0 auto; padding:18px 16px 60px; }
  h1 { font-size:22px; margin:6px 0 2px; }
  .sub { font-size:13px; color:var(--color-text-muted,#869ec3); margin-bottom:20px; }
  .sec-t { font-size:12px; font-weight:800; letter-spacing:.06em; text-transform:uppercase;
           color:var(--color-text-muted,#869ec3); margin:24px 0 12px; }
  /* mestre */
  .mestre { background:rgba(251,191,36,.08); border:1px solid rgba(251,191,36,.3); border-radius:14px; padding:16px; margin-bottom:6px; }
  .mestre h2 { margin:0 0 4px; font-size:15px; color:#fcd34d; }
  .mestre .files { display:flex; gap:7px; flex-wrap:wrap; margin-top:10px; }
  .file-chip { font-size:11px; font-family:'JetBrains Mono',monospace; padding:4px 10px; border-radius:7px;
               background:var(--color-surface,#0f1e35); border:1px solid var(--color-border,rgba(134,158,195,.18)); }
  .flow { text-align:center; color:var(--color-text-muted,#869ec3); font-size:20px; margin:8px 0; }
  /* grid de agentes */
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:14px; }
  .ag { background:var(--color-surface,#0f1e35); border:1px solid var(--color-border,rgba(134,158,195,.18)); border-radius:14px; padding:16px; border-left-width:4px; }
  .ag-hdr { display:flex; align-items:center; gap:10px; }
  .ag-ico { font-size:26px; }
  .ag-nome { font-size:16px; font-weight:800; }
  .ag-cargo { font-size:11px; color:var(--color-text-muted,#869ec3); }
  .ag-papel { font-size:12.5px; color:var(--color-text-dim,#c0ccd9); margin:10px 0 12px; line-height:1.4; }
  .ag-row { font-size:11px; margin:7px 0; }
  .ag-row .lbl { font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--color-text-muted,#869ec3); font-size:10px; display:block; margin-bottom:4px; }
  .tag { display:inline-block; font-size:10px; font-family:'JetBrains Mono',monospace; padding:3px 7px; border-radius:6px; margin:0 4px 4px 0; }
  .tag.le  { background:rgba(16,185,129,.12); color:#6ee7b7; }
  .tag.no  { background:rgba(248,113,113,.1); color:#fca5a5; text-decoration:line-through; opacity:.8; }
  .tag.tool{ background:rgba(96,165,250,.12); color:#93c5fd; }
  .tag.cmd { background:rgba(192,132,252,.12); color:#d8b4fe; }
  .ag-foot { font-size:10.5px; color:var(--color-text-muted,#869ec3); margin-top:10px; font-family:'JetBrains Mono',monospace; }
  .pill-tudo { font-size:10px; background:rgba(251,191,36,.16); color:#fcd34d; padding:3px 9px; border-radius:99px; font-weight:700; margin-left:auto; }
  .note { font-size:11.5px; color:var(--color-text-muted,#869ec3); margin-top:18px; line-height:1.55;
          background:var(--color-surface,#0f1e35); border:1px solid var(--color-border,rgba(134,158,195,.18)); border-radius:10px; padding:12px 14px; }
</style>
</head>
<body>
<office-nav></office-nav>
<div class="wrap" id="root"><p class="sub">Carregando agentes…</p></div>
<office-footer></office-footer>
<script src="/office-nav.js"></script>
<script src="/office-footer.js"></script>
<script>
async function init(){
  var d = await (await fetch('/api/agentes.json?t='+Date.now())).json();
  var root = document.getElementById('root');
  var ceo = d.agentes.find(function(a){return a.le_tudo;});
  var espec = d.agentes.filter(function(a){return !a.le_tudo;});

  var html = '<h1>🤖 Agentes & Contexto</h1>'
    + '<div class="sub">Como o contexto mestre se divide entre os agentes do escritório virtual · atualizado '+d.atualizado_em+'</div>';

  // MESTRE
  html += '<div class="sec-t">🧠 Contexto mestre (fonte única)</div>'
    + '<div class="mestre"><h2>'+d.mestre.local+'</h2>'
    + '<div style="font-size:12px;color:var(--color-text-dim,#c0ccd9)">Verdade única do escritório. Cada agente lê só a fatia que precisa.</div>'
    + '<div class="files">'+d.mestre.arquivos.map(function(f){return '<span class="file-chip">'+f+'</span>';}).join('')+'</div></div>';

  // CEO
  html += '<div class="flow">▼ orquestra ▼</div>';
  html += '<div class="sec-t">🎯 Orquestrador</div>' + card(ceo);

  // ESPECIALISTAS
  html += '<div class="flow">▼ delega via inbox ▼</div>';
  html += '<div class="sec-t">👥 Especialistas ('+espec.length+')</div><div class="grid">'
    + espec.map(card).join('') + '</div>';

  html += '<div class="note"><b>Princípio:</b> 1 fonte mestre · cada agente declara seu escopo no próprio <code>.claude/agents/&lt;nome&gt;.md</code> · subagente abre fresco (herda só o que o CEO passa + sua fatia) → menos token, menos alucinação cruzada. O CEO é o único com visão global.</div>';

  root.innerHTML = html;
  document.title = '🤖 Agentes & Contexto · EPI-USE Office';
}
function card(a){
  var le = (a.le||[]).map(function(x){return '<span class="tag le">'+x+'</span>';}).join('');
  var no = (a.nao_le||[]).map(function(x){return '<span class="tag no">'+x+'</span>';}).join('');
  var tools = (a.tools||[]).map(function(x){return '<span class="tag tool">'+x+'</span>';}).join('');
  var cmds = (a.comandos||[]).map(function(x){return '<span class="tag cmd">'+x+'</span>';}).join('');
  return '<div class="ag" style="border-left-color:'+a.cor+'">'
    + '<div class="ag-hdr"><span class="ag-ico">'+a.icon+'</span>'
    + '<div><div class="ag-nome">'+a.nome+'</div><div class="ag-cargo">'+a.cargo+'</div></div>'
    + (a.le_tudo?'<span class="pill-tudo">lê o mestre todo</span>':'')+'</div>'
    + '<div class="ag-papel">'+a.papel+'</div>'
    + (le?'<div class="ag-row"><span class="lbl">📖 Lê do mestre</span>'+le+'</div>':'')
    + (no?'<div class="ag-row"><span class="lbl">🚫 Não lê</span>'+no+'</div>':'')
    + '<div class="ag-row"><span class="lbl">🔧 Ferramentas</span>'+tools+'</div>'
    + (cmds?'<div class="ag-row"><span class="lbl">⌨️ Comandos</span>'+cmds+'</div>':'')
    + '<div class="ag-foot">✍️ escreve em '+a.escreve+'</div>'
    + '</div>';
}
init();
</script>
</body>
</html>
