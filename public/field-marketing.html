<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Marketing · EPI-USE Office</title>
<link rel="stylesheet" href="/design-tokens.css">
<script type="module" src="/office-nav.js"></script>
<script type="module" src="/office-footer.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
:root {
  --bg:#061020; --card:#0f1e35; --border:rgba(96,165,250,.15);
  --text:#e2e8f0; --dim:#94a3b8; --muted:#64748b;
  --accent:#60a5fa; --navy:#001844; --red:#cd1543;
  --green:#10b981; --yellow:#fbbf24; --purple:#a78bfa;
}
body { background:linear-gradient(180deg,#061020 0%,#0a1525 100%); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; padding-bottom:60px }
.container { max-width:1320px; margin:0 auto; padding:24px }
.hdr { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap; margin-bottom:18px }
.hdr h1 { font-size:24px; font-weight:700 }
.hdr .sub { color:var(--dim); font-size:13px; margin-top:4px }
.btn { background:rgba(96,165,250,.10); border:1px solid rgba(96,165,250,.30); color:var(--accent); padding:8px 14px; border-radius:8px; font-family:inherit; font-size:12px; cursor:pointer; transition:background .15s }
.btn:hover { background:rgba(96,165,250,.2) }
.btn.primary { background:var(--accent); color:#0a1525; font-weight:700 }
.btn.red { background:var(--red); color:#fff; border-color:var(--red) }

.flag { font-size:11px; color:var(--yellow); background:rgba(251,191,36,.08); border:1px solid rgba(251,191,36,.25); border-radius:8px; padding:8px 12px; margin-bottom:18px; line-height:1.5 }

.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:22px }
.kpi { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px }
.kpi-val { font-size:26px; font-weight:800; font-family:'JetBrains Mono',monospace; line-height:1 }
.kpi-lbl { font-size:10px; color:var(--dim); letter-spacing:.06em; text-transform:uppercase; margin-top:8px }

.tabs { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap }
.tab { padding:7px 14px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--dim); cursor:pointer; font-family:inherit; font-size:12px; font-weight:600; transition:all .15s }
.tab:hover { background:rgba(96,165,250,.06) }
.tab.active { background:rgba(96,165,250,.18); color:var(--accent); border-color:rgba(96,165,250,.4) }

.evt-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px }
.evt-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; cursor:pointer; transition:all .15s; border-left:3px solid var(--muted) }
.evt-card:hover { border-color:rgba(96,165,250,.4); transform:translateY(-2px) }
.evt-card.st-planejamento { border-left-color:var(--muted) }
.evt-card.st-pre-evento { border-left-color:var(--accent) }
.evt-card.st-live { border-left-color:var(--green) }
.evt-card.st-pos-evento { border-left-color:var(--yellow) }
.evt-card.st-concluido { border-left-color:var(--purple) }
.evt-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:8px }
.evt-nome { font-size:14px; font-weight:700; color:var(--text); line-height:1.3 }
.evt-flag { font-size:18px; flex-shrink:0 }
.evt-meta { font-size:11px; color:var(--dim); margin-bottom:4px }
.evt-badge { display:inline-block; font-size:9px; padding:2px 8px; border-radius:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; margin-top:8px }
.b-planejamento { background:rgba(100,116,139,.15); color:var(--dim) }
.b-pre-evento { background:rgba(96,165,250,.12); color:var(--accent) }
.b-live { background:rgba(16,185,129,.12); color:var(--green) }
.b-pos-evento { background:rgba(251,191,36,.12); color:var(--yellow) }
.b-concluido { background:rgba(167,139,250,.12); color:var(--purple) }
.evt-cap { font-size:10px; color:var(--muted); margin-top:6px; font-family:'JetBrains Mono',monospace }

/* MODAL */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(3px); z-index:200; display:none; align-items:flex-start; justify-content:center; overflow-y:auto; padding:40px 16px }
.modal-bg.open { display:flex }
.modal { background:#0a1525; border:1px solid var(--border); border-radius:16px; max-width:760px; width:100%; padding:24px; margin-bottom:40px }
.modal h2 { font-size:18px; margin-bottom:4px }
.modal .m-sub { color:var(--dim); font-size:12px; margin-bottom:18px }
.m-close { float:right; background:none; border:none; color:var(--muted); font-size:22px; cursor:pointer; line-height:1 }
.m-section { margin-bottom:18px }
.m-section h3 { font-size:11px; color:var(--accent); letter-spacing:.08em; text-transform:uppercase; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--border) }
.m-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:8px }
.m-field { flex:1; min-width:140px }
.m-field label { display:block; font-size:10px; color:var(--muted); margin-bottom:3px; text-transform:uppercase; letter-spacing:.04em }
.m-field input, .m-field select, .m-field textarea { width:100%; background:rgba(96,165,250,.06); border:1px solid var(--border); color:var(--text); padding:8px 10px; border-radius:8px; font-family:inherit; font-size:13px }
.m-field textarea { resize:vertical; min-height:54px }

/* Briefing fases */
.fase { margin-bottom:12px }
.fase-nome { font-size:12px; font-weight:700; color:var(--text); margin-bottom:6px }
.tarefa { display:flex; gap:8px; padding:4px 0; font-size:11px; border-bottom:1px dashed rgba(148,163,184,.06) }
.t-tipo { font-size:9px; padding:1px 6px; border-radius:8px; font-weight:700; white-space:nowrap; flex-shrink:0; height:fit-content }
.t-acao { background:rgba(16,185,129,.12); color:var(--green) }
.t-critico { background:rgba(239,68,68,.12); color:#fca5a5 }
.t-lembrete { background:rgba(96,165,250,.12); color:var(--accent) }
.t-plano-b { background:rgba(167,139,250,.12); color:var(--purple) }
.t-tarefa { flex:1; color:var(--dim) }
.t-prazo { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); white-space:nowrap }
.chk-item, .pb-item { font-size:11px; padding:5px 0; color:var(--dim); border-bottom:1px dashed rgba(148,163,184,.06) }
.chk-resp, .pb-meta { color:var(--muted); font-size:10px }

.loading { text-align:center; padding:50px; color:var(--muted); font-size:13px }
.toast { position:fixed; bottom:20px; right:20px; background:var(--card); border:1px solid var(--green); color:var(--text); padding:12px 18px; border-radius:10px; font-size:13px; z-index:300; display:none }
#loadBar { height:3px; background:linear-gradient(90deg,#001844,#cd1543); position:fixed; top:60px; left:0; right:0; z-index:100; transform:scaleX(0); transform-origin:left; transition:transform .4s }
@media print {
  office-nav, office-footer, .m-close, .modal-actions, #loadBar { display:none !important }
  .modal-bg { position:static; background:white; display:block; padding:0 }
  .modal { background:white; color:#1e293b; border:none; max-width:100% }
  body { background:white }
}
</style>
</head>
<body data-route="field-marketing">
<office-nav></office-nav>
<div id="loadBar"></div>

<div class="container">
  <div class="hdr">
    <div>
      <h1>📣 Field Marketing</h1>
      <div class="sub">Eventos EPI-USE/SAP · briefing, brindes e captura · <span id="total-lbl">—</span></div>
    </div>
    <div>
      <button class="btn" onclick="location.href='/inbound/calendar'">📅 Calendário</button>
    </div>
  </div>

  <div class="flag">
    🟢 <b>Dado real</b> — eventos de <code>events.json</code> (BR+LATAM) + processo do template da Isabela (<code>cronograma_gantt_eventos</code>). Briefing/brindes/captura editáveis salvos no Office.
  </div>

  <div id="content"><div class="loading">Carregando eventos…</div></div>
</div>

<!-- MODAL evento -->
<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal"></div>
</div>
<div class="toast" id="toast"></div>

<office-footer></office-footer>

<script>
let DATA = null, TEMPLATE = null, cur = null;
const STATUS = [
  { id:'planejamento', label:'Planejamento' },
  { id:'pre-evento', label:'Pré-evento' },
  { id:'live', label:'Live' },
  { id:'pos-evento', label:'Pós-evento' },
  { id:'concluido', label:'Concluído' },
];
const state = { tab:'todos' };

function showBar(){const b=document.getElementById('loadBar');b.style.display='block';b.style.transform='scaleX(.5)';setTimeout(()=>b.style.transform='scaleX(.8)',150);}
function hideBar(){const b=document.getElementById('loadBar');b.style.transform='scaleX(1)';setTimeout(()=>{b.style.transform='scaleX(0)';b.style.display='none';},400);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2600);}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function load() {
  showBar();
  try {
    [DATA, TEMPLATE] = await Promise.all([
      fetch('/api/field-marketing').then(r=>r.json()),
      fetch('/api/field-template.json').then(r=>r.json()).catch(()=>null),
    ]);
    document.getElementById('total-lbl').textContent = `${DATA.total} eventos · ${DATA.ano}`;
    render();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="loading" style="color:#fca5a5">Erro: '+esc(e.message)+'</div>';
  }
  hideBar();
}

function render() {
  const k = DATA.kpis;
  const st = k.por_status || {};
  document.getElementById('content').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-val">${DATA.total}</div><div class="kpi-lbl">Eventos no ano</div></div>
      <div class="kpi"><div class="kpi-val" style="color:var(--green)">${st.live||0}</div><div class="kpi-lbl">Live</div></div>
      <div class="kpi"><div class="kpi-val" style="color:var(--yellow)">${k.eventos_com_captura||0}</div><div class="kpi-lbl">Com captura</div></div>
      <div class="kpi"><div class="kpi-val" style="color:var(--accent)">${(k.total_leads||0).toLocaleString('pt-BR')}</div><div class="kpi-lbl">Leads capturados</div></div>
      <div class="kpi"><div class="kpi-val" style="color:var(--purple)">${k.total_deals||0}</div><div class="kpi-lbl">Deals gerados</div></div>
      <div class="kpi"><div class="kpi-val" style="font-size:18px">${k.custo_por_lead!=null?('R$ '+k.custo_por_lead):'—'}</div><div class="kpi-lbl">Custo / lead</div></div>
    </div>

    <div class="tabs">
      <button class="tab ${state.tab==='todos'?'active':''}" onclick="setTab('todos')">Todos (${DATA.total})</button>
      ${STATUS.map(s => `<button class="tab ${state.tab===s.id?'active':''}" onclick="setTab('${s.id}')">${s.label} (${st[s.id]||0})</button>`).join('')}
    </div>
    <div class="evt-grid" id="evt-grid"></div>
  `;
  renderGrid();
}

function setTab(t){ state.tab=t; document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active')); event.target.classList.add('active'); renderGrid(); }

function renderGrid() {
  let evts = DATA.eventos.slice();
  if (state.tab !== 'todos') evts = evts.filter(e => e.status === state.tab);
  // ordena: live > pré > pós > planejamento; dentro por mês
  const order = { 'live':0,'pre-evento':1,'pos-evento':2,'planejamento':3,'concluido':4 };
  evts.sort((a,b) => (order[a.status]??9)-(order[b.status]??9) || a.mes-b.mes);
  const grid = document.getElementById('evt-grid');
  if (!evts.length) { grid.innerHTML = '<div class="loading">Nenhum evento neste status.</div>'; return; }
  grid.innerHTML = evts.map(e => {
    const cap = e.captura && (e.captura.leads||e.captura.deals)
      ? `<div class="evt-cap">📊 ${e.captura.leads||0} leads · ${e.captura.deals||0} deals</div>` : '';
    return `<div class="evt-card st-${e.status}" onclick="openModal('${e.event_id}')">
      <div class="evt-top">
        <div class="evt-nome">${esc(e.nome)}</div>
        <span class="evt-flag">${e.flag||''}</span>
      </div>
      <div class="evt-meta">${e.data_evento || ('Mês '+e.mes+' · '+(e.dia||'TBC'))} · ${esc(e.lob||'')}</div>
      <div class="evt-meta">${esc(e.who||'')} · ${e.regiao==='brasil'?'🇧🇷 BR':'🌎 LATAM'}</div>
      <span class="evt-badge b-${e.status}">${STATUS.find(s=>s.id===e.status)?.label||e.status}</span>
      ${e.tem_briefing?'<span class="evt-badge b-pre-evento">📋 briefing</span>':''}
      ${cap}
    </div>`;
  }).join('');
}

function openModal(id) {
  cur = DATA.eventos.find(e => e.event_id === id);
  if (!cur) return;
  const cap = cur.captura || {};
  document.getElementById('modal').innerHTML = `
    <button class="m-close" onclick="closeModal()">×</button>
    <h2>${cur.flag||''} ${esc(cur.nome)}</h2>
    <div class="m-sub">${cur.data_evento||('Mês '+cur.mes)} · ${esc(cur.lob||'')} · ${esc(cur.who||'')} · ${cur.regiao==='brasil'?'🇧🇷 Brasil':'🌎 LATAM'}</div>

    <div class="m-section">
      <h3>⚙️ Dados do evento</h3>
      <div class="m-row">
        <div class="m-field"><label>Status</label><select id="f-status">${STATUS.map(s=>`<option value="${s.id}" ${cur.status===s.id?'selected':''}>${s.label}</option>`).join('')}</select></div>
        <div class="m-field"><label>Porte</label><select id="f-porte"><option value="">—</option><option ${cur.porte==='Pequeno'?'selected':''}>Pequeno</option><option ${cur.porte==='Médio'?'selected':''}>Médio</option><option ${cur.porte==='Grande'?'selected':''}>Grande</option></select></div>
      </div>
      <div class="m-row">
        <div class="m-field"><label>Local</label><input id="f-local" value="${esc(cur.local)}" placeholder="Cidade / venue"></div>
        <div class="m-field"><label>Responsável</label><input id="f-resp" value="${esc(cur.responsavel)}" placeholder="Isabela / ..."></div>
        <div class="m-field"><label>Orçamento (R$)</label><input id="f-orc" type="number" value="${cur.orcamento||''}"></div>
      </div>
    </div>

    <div class="m-section">
      <h3>📊 Captura pós-evento</h3>
      <div class="m-row">
        <div class="m-field"><label>Leads</label><input id="c-leads" type="number" value="${cap.leads||''}"></div>
        <div class="m-field"><label>Qualificados</label><input id="c-qual" type="number" value="${cap.qualificados||''}"></div>
        <div class="m-field"><label>Deals gerados</label><input id="c-deals" type="number" value="${cap.deals||''}"></div>
        <div class="m-field"><label>Custo real (R$)</label><input id="c-custo" type="number" value="${cap.custo||''}"></div>
      </div>
      <div class="m-field"><label>Observações</label><textarea id="c-obs" placeholder="Notas do evento, aprendizados...">${esc(cap.obs)}</textarea></div>
    </div>

    <div class="m-section">
      <h3>📋 Briefing (processo Isabela) <button class="btn" style="float:right;padding:3px 8px;font-size:10px" onclick="printBriefing()">⬇ PDF</button></h3>
      <div id="briefing-content">${renderBriefing()}</div>
    </div>

    <div class="m-row modal-actions" style="margin-top:16px">
      <button class="btn primary" style="flex:1" onclick="salvar()">💾 Salvar evento</button>
      <button class="btn" onclick="closeModal()">Fechar</button>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('open');
}

function renderBriefing() {
  if (!TEMPLATE) return '<div style="color:var(--muted);font-size:11px">Template não carregado.</div>';
  const tipoCls = t => { t=(t||'').toUpperCase(); if(t.includes('CRÍTICO')||t.includes('CRITICO'))return't-critico'; if(t.includes('LEMBRETE'))return't-lembrete'; if(t.includes('PLANO'))return't-plano-b'; return't-acao'; };
  let html = (TEMPLATE.fases||[]).map(f => `
    <div class="fase">
      <div class="fase-nome">${esc(f.nome)}</div>
      ${f.tarefas.map(t => `<div class="tarefa">
        <span class="t-tipo ${tipoCls(t.tipo)}">${esc(t.tipo||'AÇÃO')}</span>
        <span class="t-tarefa">${esc(t.tarefa)}</span>
        <span class="t-prazo">${esc(t.prazo||'')}</span>
      </div>`).join('')}
    </div>`).join('');
  html += `<div class="fase"><div class="fase-nome">✅ Checklist D-Day</div>${(TEMPLATE.checklist_dday||[]).map(c=>`<div class="chk-item">☐ ${esc(c.item)} <span class="chk-resp">— ${esc(c.responsavel)}</span></div>`).join('')}</div>`;
  html += `<div class="fase"><div class="fase-nome">🔀 Planos B</div>${(TEMPLATE.planos_b||[]).map(p=>`<div class="pb-item"><b>${esc(p.risco)}</b> → ${esc(p.plano_b)} <span class="pb-meta">(${esc(p.gatilho)})</span></div>`).join('')}</div>`;
  return html;
}

function printBriefing() {
  const evtNome = cur ? cur.nome : 'evento';
  const html = `<h1 style="font-size:20px;color:#001844">📋 Briefing — ${esc(evtNome)}</h1><p style="color:#666;font-size:12px">${cur?.data_evento||''} · ${esc(cur?.lob||'')} · processo Field Marketing EPI-USE</p>${renderBriefing()}`;
  if (typeof html2pdf === 'undefined') { window.print(); return; }
  const wrap = document.createElement('div'); wrap.innerHTML = html; wrap.style.padding='20px'; wrap.style.color='#1e293b';
  html2pdf().set({ margin:[10,8], filename:`briefing-${(evtNome||'evento').replace(/\W+/g,'-')}.pdf`, jsPDF:{unit:'mm',format:'a4'} }).from(wrap).save();
}

async function salvar() {
  if (!cur) return;
  const num = id => { const v = document.getElementById(id).value; return v===''?null:Number(v); };
  const body = {
    nome: cur.nome, lob: cur.lob, pais: cur.pais,
    data_evento: cur.data_evento,
    status: document.getElementById('f-status').value,
    porte: document.getElementById('f-porte').value,
    local: document.getElementById('f-local').value,
    responsavel: document.getElementById('f-resp').value,
    orcamento: num('f-orc'),
    captura: {
      leads: num('c-leads'), qualificados: num('c-qual'),
      deals: num('c-deals'), custo: num('c-custo'),
      obs: document.getElementById('c-obs').value,
    },
  };
  try {
    const r = await fetch('/api/field-marketing/'+encodeURIComponent(cur.event_id), {
      method:'POST', headers:{'Content-Type':'application/json','x-editor-token':'eubr-voices-edit-2026'},
      body: JSON.stringify(body),
    });
    const j = await r.json();
    if (j.success) { toast('✅ Evento salvo'); closeModal(); load(); }
    else toast('Erro: '+(j.error||'falhou'));
  } catch(e) { toast('Erro: '+e.message); }
}

function closeModal(){ document.getElementById('modal-bg').classList.remove('open'); cur=null; }
document.getElementById('modal-bg').addEventListener('click', e => { if(e.target.id==='modal-bg') closeModal(); });

load();
</script>
</body>
</html>
