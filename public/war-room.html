<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>⚡ Central · Pendências & Deadlines · EPI-USE Office</title>
<link rel="stylesheet" href="/design-tokens.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(180deg,#061020 0%,#0a1525 100%);color:#e2e8f0;font-family:'Inter',sans-serif;min-height:100vh}
.wrap{max-width:1280px;margin:0 auto;padding:22px 18px 60px}
h1{font-size:24px;font-weight:700}
.sub{font-size:13px;color:#94a3b8;margin:4px 0 18px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:#0f1e35;border:1px solid rgba(96,165,250,.15);border-radius:12px;padding:15px 16px;border-left:4px solid #60a5fa}
.kpi.red{border-left-color:#cd1543}.kpi.yellow{border-left-color:#fbbf24}.kpi.green{border-left-color:#10b981}.kpi.purple{border-left-color:#a78bfa}
.kpi .lbl{font-size:10px;color:#94a3b8;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.kpi .val{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;margin-top:4px}
.sec{margin-bottom:26px}
.sec-t{font-size:13px;font-weight:800;letter-spacing:.04em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card{background:#0f1e35;border:1px solid rgba(96,165,250,.12);border-radius:10px;padding:13px 16px;margin-bottom:8px;border-left:3px solid #475569}
.card.bloq{border-left-color:#cd1543}.card.pend{border-left-color:#10b981}.card.dl{border-left-color:#dc2626}.card.gl{border-left-color:#a78bfa}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.card-title{font-size:13px;font-weight:600;color:#e2e8f0;line-height:1.35}
.card-desc{font-size:11.5px;color:#94a3b8;margin-top:5px;line-height:1.5}
.card-meta{font-size:10px;color:#64748b;margin-top:6px;font-family:'JetBrains Mono',monospace}
.tag{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700;white-space:nowrap;flex-shrink:0}
.tag-red{background:rgba(205,21,67,.15);color:#fca5a5}.tag-yellow{background:rgba(251,191,36,.15);color:#fbbf24}
.tag-green{background:rgba(16,185,129,.15);color:#34d399}.tag-purple{background:rgba(167,139,250,.15);color:#c4b5fd}
.dl-date{font-family:'JetBrains Mono',monospace;font-weight:700;white-space:nowrap}
.d-urgent{color:#fca5a5}.d-soon{color:#fbbf24}.d-ok{color:#64748b}
.empty{color:#64748b;font-size:12px;padding:10px 0}
.loading{text-align:center;padding:50px;color:#64748b;font-size:13px}
.legacy-note{font-size:10px;color:#64748b;margin-top:30px;padding-top:14px;border-top:1px solid rgba(96,165,250,.1)}
</style>
</head>
<body data-route="war-room">
<office-nav></office-nav>
<div class="wrap">
  <h1>⚡ Central — Pendências & Deadlines</h1>
  <div class="sub">O que está travado + prazos que não podem passar, em 1 tela. Atualizado <span id="ts">…</span></div>
  <div id="content"><div class="loading">Carregando…</div></div>
</div>
<office-footer></office-footer>
<script src="/office-nav.js"></script>
<script src="/office-footer.js"></script>
<script>
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function limpa(s){return String(s||'').replace(/[`*#✅🔴🟡🟢⚠️⏳�]/g,'').replace(/\s+/g,' ').trim();}

async function init(){
  const hoje = new Date().toISOString().slice(0,10);
  const em30 = new Date(Date.now()+30*864e5).toISOString().slice(0,10);
  let pend={buckets:{}}, df={a_reclamar:[],kpis:{}}, sap={proximos_golive:[]}, voicesData={voices:[]};
  try { [pend,df,sap,voicesData] = await Promise.all([
    fetch('/api/pendencias?t='+Date.now()).then(r=>r.json()).catch(()=>({buckets:{}})),
    fetch('/api/development-funds').then(r=>r.json()).catch(()=>({a_reclamar:[],kpis:{}})),
    fetch('/api/clientes-sap-4me').then(r=>r.json()).catch(()=>({proximos_golive:[]})),
    fetch('/api/voices.json').then(r=>r.json()).catch(()=>({voices:[]})),
  ]); } catch(e){}

  // Voices com SSI vencido (proxima_medicao_ssi <= hoje) → lembrete acompanhamento
  const voicesSSI = (voicesData.voices||[]).filter(v => v.proxima_medicao_ssi && v.proxima_medicao_ssi <= new Date().toISOString().slice(0,10));

  document.getElementById('ts').textContent = new Date().toLocaleString('pt-BR');
  const b = pend.buckets || {};
  const bloqueadas = (b.bloqueadas||[]).filter(x => !/RESOLVIDO|✅/.test(x.titulo));
  const pendentes = (b.pendentes||[]).filter(x => !/RESOLVIDO|✅/.test(x.titulo));

  // Deadlines DF próximos (claims a reclamar, expiração asc)
  const dlDF = (df.a_reclamar||[]).filter(r => r.expiracao).sort((a,b)=>(a.expiracao||'').localeCompare(b.expiracao||''));
  // Go-lives SAP próximos 30d
  const gl = (sap.proximos_golive||[]).filter(g => g.golive && g.golive>=hoje && g.golive<=em30);

  const expCls = e => e<hoje?'d-urgent':(e<=em30?'d-soon':'d-ok');

  document.getElementById('content').innerHTML = `
    <div class="kpis">
      <div class="kpi red"><div class="lbl">🔴 Bloqueadas (terceiros)</div><div class="val">${bloqueadas.length}</div></div>
      <div class="kpi green"><div class="lbl">🟢 Pendentes de execução</div><div class="val">${pendentes.length}</div></div>
      <div class="kpi yellow"><div class="lbl">💶 Claims DF a reclamar</div><div class="val">${dlDF.length}</div></div>
      <div class="kpi purple"><div class="lbl">🚀 Go-lives SAP 30d</div><div class="val">${gl.length}</div></div>
      <div class="kpi" style="border-left:4px solid #ec4899"><div class="lbl">🎙️ Voices · SSI a medir</div><div class="val">${voicesSSI.length}</div></div>
    </div>

    <div class="sec">
      <div class="sec-t">🔴 Bloqueadas — dependem de terceiros (Rudá acompanhar)</div>
      ${bloqueadas.length ? bloqueadas.map(x=>`
        <div class="card bloq">
          <div class="card-top"><div class="card-title">${esc(limpa(x.titulo))}</div><span class="tag tag-red">bloqueada</span></div>
          <div class="card-desc">${esc(limpa(x.descricao)).slice(0,260)}</div>
        </div>`).join('') : '<div class="empty">Nada bloqueado. 🎉</div>'}
    </div>

    <div class="sec">
      <div class="sec-t">💶 Deadlines Development Funds — claims a reclamar (por expiração)</div>
      ${dlDF.length ? dlDF.map(r=>`
        <div class="card dl">
          <div class="card-top">
            <div class="card-title">${esc(r.nome)} — €${Number(r.aprovado||0).toLocaleString('pt-BR')}</div>
            <span class="dl-date ${expCls(r.expiracao)}">⏳ ${r.expiracao}</span>
          </div>
          <div class="card-meta">${esc(r.atividade||'')} · ${esc(r.status||'')}</div>
        </div>`).join('') : '<div class="empty">Nenhum claim pendente.</div>'}
      <div class="card dl"><div class="card-top"><div class="card-title">🔴 Meta SAP: 100% EDF + 70% DDF com proposals</div><span class="dl-date d-soon">⏳ 2026-07-01</span></div><div class="card-meta">Regra DF LAC · ver Development Funds</div></div>
    </div>

    <div class="sec">
      <div class="sec-t">🚀 Go-lives SAP 4 ME — próximos 30 dias</div>
      ${gl.length ? gl.map(g=>`
        <div class="card gl">
          <div class="card-top"><div class="card-title">${esc(g.nome_cliente)}</div><span class="dl-date ${expCls(g.golive)}">${g.golive}</span></div>
          <div class="card-meta">${esc(g.pais||'')} · ${esc(g.area||'')}</div>
        </div>`).join('') : '<div class="empty">Nenhum go-live nos próximos 30 dias.</div>'}
    </div>

    <div class="sec">
      <div class="sec-t">🎙️ Voices — SSI semanal a coletar</div>
      ${voicesSSI.length ? voicesSSI.map(v=>`
        <div class="card" style="border-left-color:#ec4899">
          <div class="card-top">
            <div class="card-title">${esc(v.nome)} · ${esc(v.cargo||'')}</div>
            <span class="dl-date d-soon">📅 ${v.proxima_medicao_ssi}</span>
          </div>
          <div class="card-meta">
            SSI atual: <b>${v.ssi_atual ?? '—'}</b> · baseline: ${v.ssi_baseline ?? '—'} · medições: ${(v.ssi_historico||[]).length}
            ${v.linkedin ? ` · <a href="${esc(v.linkedin)}" target="_blank" style="color:#60a5fa">LinkedIn →</a>` : ''}
          </div>
        </div>`).join('') : '<div class="empty">Nenhum Voice com SSI vencido. ✨</div>'}
    </div>

    <div class="sec">
      <div class="sec-t">🟢 Pendentes de execução (não-bloqueado)</div>
      ${pendentes.length ? pendentes.map(x=>`
        <div class="card pend">
          <div class="card-top"><div class="card-title">${esc(limpa(x.titulo))}</div><span class="tag tag-green">a fazer</span></div>
          <div class="card-desc">${esc(limpa(x.descricao)).slice(0,200)}</div>
        </div>`).join('') : '<div class="empty">Nada pendente.</div>'}
    </div>

    <div class="legacy-note">Fonte: <code>vault/00-contexto/pendencias.md</code> + Development Funds + SAP 4 ME · ${pend.total||0} itens no total. (Antes este painel mostrava inbox/outbox de agentes virtuais — repurposed p/ pendências e deadlines reais.)</div>
  `;
}
init();
</script>
</body>
</html>
