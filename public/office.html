<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EPI-USE Office · O Escritório</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<script defer data-domain="epiuse-voices-optimizer.up.railway.app" src="https://plausible.io/js/script.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: var(--teal,#7ec850); overflow: hidden; font-family: 'Inter', sans-serif; color: var(--surface-2,#1e293b); user-select: none; -webkit-user-select: none; touch-action: none; }

#gc { display: block; position: fixed; inset: 0; image-rendering: pixelated; }

/* ── HUD ─────────────────────────────────────────────── */
#hud {
  position: fixed; top: 10px; left: 10px; right: 10px; height: 44px;
  display: none; align-items: center; gap: 8px; z-index: 20; pointer-events: none;
}
#hud.on { display: flex; }
.hud-pill {
  background: rgba(255,255,255,0.92); border: 1px solid rgba(0,24,68,0.12);
  box-shadow: 0 2px 10px rgba(0,24,68,0.10); border-radius: 22px;
  padding: 8px 16px; font-size: 12px; font-weight: 700; color: var(--surface,#001844);
  display: flex; align-items: center; gap: 7px; pointer-events: auto; white-space: nowrap;
}
#hud-back { cursor: pointer; text-decoration: none; color: var(--surface,#001844); }
#hud-back:hover { background: #fff; }
#hud-zone { font-weight: 600; color: var(--muted,#475569); transition: opacity .3s; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
#hud-spacer { flex: 1; }
#hud-user .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--uc, var(--red,#cd1543)); }
#hud-hint { font-size: 11px; font-weight: 500; color: var(--muted,#64748b); }
@media (max-width: 720px) { #hud-hint { display: none; } }

/* ── SPAWN GATE ──────────────────────────────────────── */
#spawn {
  position: fixed; inset: 0; z-index: 1000;
  background: linear-gradient(160deg, #aede8c 0%, var(--teal,#7ec850) 55%, #5cb83c 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
}
#spawn::before {
  content: ''; position: absolute; inset: 0; opacity: .35; pointer-events: none;
  background-image: radial-gradient(rgba(255,255,255,0.35) 1.5px, transparent 1.5px);
  background-size: 26px 26px;
}
.sg-card {
  position: relative; background: rgba(255,255,255,0.96); border-radius: 22px;
  box-shadow: 0 24px 60px -18px rgba(0,40,10,0.45); padding: 38px 36px 30px;
  width: min(420px, 94vw); text-align: center;
}
.sg-logo { font-family: 'Press Start 2P', monospace; font-size: 15px; color: var(--surface,#001844); line-height: 1.7; }
.sg-logo b { color: var(--red,#cd1543); }
.sg-sub { font-size: 13px; color: var(--muted,#64748b); margin: 10px 0 26px; }
.sg-label { display: block; text-align: left; font-size: 11px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--muted,#94a3b8); margin-bottom: 7px; }
.sg-input {
  width: 100%; padding: 13px 16px; background: #f1f5f9; border: 2px solid var(--text,#e2e8f0); border-radius: 12px;
  color: var(--bg,#0f172a); font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif; outline: none; transition: border-color .15s;
}
.sg-input:focus { border-color: var(--surface,#001844); background: #fff; }
.sg-swatches { display: flex; gap: 10px; justify-content: center; margin: 18px 0 6px; }
.sg-sw {
  width: 38px; height: 38px; border-radius: 50%; cursor: pointer; border: 3px solid transparent;
  transition: transform .12s, border-color .12s; background: var(--c);
}
.sg-sw:hover { transform: scale(1.12); }
.sg-sw.sel { border-color: var(--surface,#001844); transform: scale(1.15); box-shadow: 0 0 0 3px rgba(0,24,68,0.15); }
.sg-btn {
  width: 100%; margin-top: 20px; padding: 15px; border: none; border-radius: 13px;
  background: var(--surface,#001844); color: #fff; font-size: 15px; font-weight: 800; font-family: 'Inter', sans-serif;
  cursor: pointer; transition: background .15s, transform .1s;
}
.sg-btn:hover { background: #0a2a60; }
.sg-btn:active { transform: scale(.98); }
.sg-ver { margin-top: 16px; font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--muted,#94a3b8); letter-spacing: .12em; }

/* ── MODAL IFRAME ────────────────────────────────────── */
#modal { position: fixed; inset: 0; background: rgba(15,23,42,.55); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 200; padding: 18px; }
#modal.on { display: flex; }
#modal-box { position: relative; width: min(1180px, 100%); height: min(820px, 100%); background: var(--bg,#0a1525); border-radius: 16px; overflow: hidden; box-shadow: 0 30px 80px -20px rgba(0,0,0,.6); }
#modal-frame { width: 100%; height: 100%; border: none; }
#modal-x {
  position: absolute; top: 10px; right: 10px; width: 38px; height: 38px; border: none; border-radius: 50%;
  background: rgba(255,255,255,0.92); color: var(--bg,#0f172a); font-size: 17px; font-weight: 800; cursor: pointer; z-index: 5;
  box-shadow: 0 2px 10px rgba(0,0,0,.3);
}

/* ── INFO CARD ───────────────────────────────────────── */
#info { position: fixed; inset: 0; background: rgba(15,23,42,.45); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 210; padding: 18px; }
#info.on { display: flex; }
.info-card {
  background: #fff; border-radius: 20px; width: min(480px, 96vw); max-height: 86vh; overflow: auto;
  box-shadow: 0 30px 70px -18px rgba(0,20,60,.5); padding: 28px 28px 24px;
}
.info-head { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.info-ava { width: 52px; height: 52px; border-radius: 14px; background: var(--ac, var(--surface,#001844)); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.info-title { font-size: 18px; font-weight: 800; color: var(--bg,#0f172a); line-height: 1.25; }
.info-sub { font-size: 12px; font-weight: 600; color: var(--muted,#64748b); margin-top: 2px; }
.info-body { font-size: 13.5px; color: var(--muted,#334155); line-height: 1.65; white-space: pre-line; }
.info-items { display: flex; flex-wrap: wrap; gap: 7px; margin: 14px 0 4px; }
.info-item { font-size: 11.5px; font-weight: 700; background: #f1f5f9; color: var(--muted,#334155); border: 1px solid var(--text,#e2e8f0); padding: 5px 11px; border-radius: 99px; }
.info-flag { font-size: 10.5px; color: var(--gold,#b45309); background: var(--gold,#fef3c7); border-radius: 8px; padding: 6px 10px; margin-top: 12px; }
.info-actions { display: flex; gap: 9px; margin-top: 18px; }
.info-btn { flex: 1; padding: 12px; border: none; border-radius: 11px; font-size: 13px; font-weight: 800; font-family: 'Inter', sans-serif; cursor: pointer; }
.info-btn.pri { background: var(--surface,#001844); color: #fff; }
.info-btn.pri:hover { background: #0a2a60; }
.info-btn.sec { background: #f1f5f9; color: var(--muted,#334155); }
.info-btn.sec:hover { background: var(--text,#e2e8f0); }

/* ── TOAST ───────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(255,255,255,0.96); color: var(--bg,#0f172a); font-size: 13px; font-weight: 700;
  padding: 11px 20px; border-radius: 14px; box-shadow: 0 8px 30px rgba(0,20,60,.25);
  opacity: 0; transition: opacity .25s, transform .25s; z-index: 300; pointer-events: none; max-width: 90vw; text-align: center;
}
#toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── ACTION PROMPT (perto de zona) ───────────────────── */
#prompt {
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.95); border: 1px solid rgba(0,24,68,0.12);
  border-radius: 16px; padding: 10px 18px; font-size: 13px; font-weight: 700; color: var(--surface,#001844);
  box-shadow: 0 8px 26px rgba(0,20,60,.22); display: none; align-items: center; gap: 10px; z-index: 30;
}
#prompt.on { display: flex; }
#prompt kbd { background: var(--surface,#001844); color: #fff; font-size: 11px; font-weight: 800; padding: 4px 9px; border-radius: 7px; font-family: 'Inter', sans-serif; }

/* ── MINIMAPA ────────────────────────────────────────── */
#mini {
  position: fixed; right: 12px; bottom: 12px; border-radius: 12px; z-index: 25;
  border: 2px solid rgba(255,255,255,0.85); box-shadow: 0 6px 24px rgba(0,20,60,.3); opacity: .92;
}
@media (max-width: 720px) { #mini { display: none; } }

/* ── JOYSTICK MOBILE ─────────────────────────────────── */
#joy { position: fixed; left: 18px; bottom: 18px; width: 120px; height: 120px; z-index: 40; display: none; }
#joy.on { display: block; }
#joy-base { position: absolute; inset: 0; border-radius: 50%; background: rgba(255,255,255,0.35); border: 2px solid rgba(255,255,255,0.6); }
#joy-stick { position: absolute; width: 52px; height: 52px; left: 34px; top: 34px; border-radius: 50%; background: rgba(255,255,255,0.85); box-shadow: 0 3px 10px rgba(0,0,0,.25); }
#btn-act {
  position: fixed; right: 20px; bottom: 110px; width: 64px; height: 64px; border-radius: 50%;
  background: rgba(0,24,68,0.88); color: #fff; border: 3px solid rgba(255,255,255,0.7);
  font-size: 15px; font-weight: 800; font-family: 'Inter', sans-serif; z-index: 40; display: none;
  box-shadow: 0 6px 20px rgba(0,20,60,.4);
}
#btn-act.on { display: block; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<canvas id="mini" width="180" height="108"></canvas>

<div id="hud">
  <a class="hud-pill" id="hud-back" href="/home">← Home</a>
  <div class="hud-pill" id="hud-zone">🏢 EPI-USE Office</div>
  <a class="hud-pill" id="hud-hub" href="/hub" title="Marketing Hub — serviços, materiais e contatos">🏢 Hub</a>
  <div id="hud-spacer"></div>
  <div class="hud-pill" id="hud-hint">WASD / setas andam · clique move · <b>E</b> interage</div>
  <div class="hud-pill" id="hud-user"><span class="dot"></span><span id="hud-name">—</span></div>
</div>

<div id="prompt"><kbd>E</kbd><span id="prompt-txt"></span></div>
<div id="toast"></div>

<div id="spawn">
  <div class="sg-card">
    <div class="sg-logo">EPI-USE<br><b>OFFICE</b></div>
    <div class="sg-sub">O escritório virtual do marketing — versão 2.0 🎮</div>
    <label class="sg-label">Seu nome</label>
    <input class="sg-input" id="sg-name" maxlength="24" placeholder="Como te chamam?" autocomplete="off">
    <label class="sg-label" style="margin-top:18px">Cor do avatar</label>
    <div class="sg-swatches" id="sg-swatches"></div>
    <button class="sg-btn" id="sg-go">Entrar no escritório →</button>
    <div class="sg-ver">v0.44.1 · GATHER EDITION</div>
  </div>
</div>

<div id="modal"><div id="modal-box"><button id="modal-x">✕</button><iframe id="modal-frame" src="about:blank"></iframe></div></div>
<div id="info"><div class="info-card" id="info-card"></div></div>

<div id="joy"><div id="joy-base"></div><div id="joy-stick"></div></div>
<button id="btn-act">E</button>

<script>
// ═══════════════════════════════════════════════════════════════════
// EPI-USE OFFICE ENGINE 2.0 — "Gather Edition" · jun/2026
// Pixel-art procedural · zero assets externos · vanilla JS
// ═══════════════════════════════════════════════════════════════════

const COLS = 60, ROWS = 36, TS = 32;
const WW = COLS * TS, WH = ROWS * TS;
const PLAYER_SPEED = 200, NPC_SPEED = 62;

// ── TILES ──────────────────────────────────────────────────────────
const T = { GRASS:0, PATH:1, FLOOR:2, WALL:3, RUG_BLUE:5, RUG_GREEN:6, RUG_VIOLET:7, RUG_SKY:8, RUG_NAVY:9, RUG_SAND:10, RUG_AMBER:11, RUG_PURPLE:12, RUG_WARM:13, RUG_RED:14, GARDEN:15 };

// Paleta Gather: clara, pastel, acolhedora
const RUG_COLORS = {
  [T.RUG_BLUE]:   { a:'#cfe0f5', b:'#c2d6ef', edge:'#9db9dd' },  // Voices
  [T.RUG_GREEN]:  { a:'#d2ecd6', b:'#c5e5ca', edge:'#9ccaa4' },  // Optimizer
  [T.RUG_VIOLET]: { a:'#e4dcf5', b:'#dbd1f0', edge:'#b9a8df' },  // Hub
  [T.RUG_SKY]:    { a:'#d4e9f7', b:'#c7e1f3', edge:'#99c4e3' },  // Inbound
  [T.RUG_NAVY]:   { a:'#d6dce8', b:'#cad2e1', edge:'#a3afc8' },  // Roberto
  [T.RUG_SAND]:   { a:'#f1e7d4', b:'#ecdfc8', edge:'#d4bf99' },  // Bullpen
  [T.RUG_AMBER]:  { a:'#fbe9cc', b:'#f8e1bb', edge:'#e3bf85' },  // Field
  [T.RUG_PURPLE]: { a:'#e9def2', b:'#e1d2ed', edge:'#c3a6d6' },  // SAP
  [T.RUG_WARM]:   { a:'#f3e3d3', b:'#eedac5', edge:'#d6b18d' },  // Coffee
  [T.RUG_RED]:    { a:'#f6dde0', b:'#f2d1d6', edge:'#dfa3ac' },  // Lobby
};

const mapTiles = new Uint8Array(COLS * ROWS).fill(T.GRASS);
const mapSolid = new Uint8Array(COLS * ROWS);

function fill(c, r, w, h, tile, solid) {
  for (let row = r; row < r + h && row < ROWS; row++)
    for (let col = c; col < c + w && col < COLS; col++) {
      const i = row * COLS + col;
      if (tile != null) mapTiles[i] = tile;
      if (solid != null) mapSolid[i] = solid ? 1 : 0;
    }
}
function wallH(c0, c1, r, doors) {
  for (let c = c0; c <= c1; c++) {
    if (doors && doors.includes(c)) continue;
    mapTiles[r * COLS + c] = T.WALL; mapSolid[r * COLS + c] = 1;
  }
}
function wallV(r0, r1, c, doors) {
  for (let r = r0; r <= r1; r++) {
    if (doors && doors.includes(r)) continue;
    mapTiles[r * COLS + c] = T.WALL; mapSolid[r * COLS + c] = 1;
  }
}

// ── SALAS (retângulos em tiles) ────────────────────────────────────
const ROOMS = {
  optimizer: { c0:3,  r0:3,  c1:13, r1:10, rug:T.RUG_GREEN,  nome:'🪪 Profile Optimizer' },
  hub:       { c0:15, r0:3,  c1:25, r1:10, rug:T.RUG_VIOLET, nome:'📺 Marketing Hub' },
  inbound:   { c0:27, r0:3,  c1:37, r1:10, rug:T.RUG_SKY,    nome:'📡 Inbound HQ' },
  roberto:   { c0:39, r0:3,  c1:56, r1:10, rug:T.RUG_NAVY,   nome:'🏛️ Sala do Roberto' },
  voices:    { c0:3,  r0:12, c1:16, r1:22, rug:T.RUG_BLUE,   nome:'🎙️ Voices Studio' },
  bullpen:   { c0:18, r0:12, c1:40, r1:22, rug:T.RUG_SAND,   nome:'💼 Time de Marketing' },
  field:     { c0:42, r0:12, c1:56, r1:16, rug:T.RUG_AMBER,  nome:'📅 Field & Eventos' },
  sap:       { c0:42, r0:18, c1:56, r1:22, rug:T.RUG_PURPLE, nome:'⚗️ SAP Lab' },
  coffee:    { c0:3,  r0:24, c1:15, r1:32, rug:T.RUG_WARM,   nome:'☕ Coffee Lounge' },
  lobby:     { c0:17, r0:24, c1:40, r1:32, rug:T.RUG_RED,    nome:'🛎️ Lobby' },
  garden:    { c0:42, r0:24, c1:56, r1:32, rug:T.GARDEN,     nome:'🐘 Jardim ERP.ngo' },
};

(function buildMap() {
  // Prédio: piso madeira em todo interior
  fill(3, 3, 54, 30, T.FLOOR);
  // Tapetes por sala
  for (const k in ROOMS) {
    const R = ROOMS[k];
    if (R.rug === T.GARDEN) fill(R.c0, R.r0, R.c1-R.c0+1, R.r1-R.r0+1, T.GARDEN);
    else fill(R.c0+1, R.r0+1, R.c1-R.c0-1, R.r1-R.r0-1, R.rug);
  }
  // Caminho de entrada (sul)
  fill(28, 33, 4, 3, T.PATH);

  // Paredes externas do prédio
  wallH(2, 57, 2);
  wallH(2, 57, 33, [28,29,30,31]);          // entrada sul
  wallV(2, 33, 2);
  wallV(2, 33, 57);

  // Divisórias norte (linha r=11) — portas no meio de cada sala
  wallH(3, 56, 11, [8,9, 20,21, 32,33, 47,48]);
  wallV(3, 10, 14); wallV(3, 10, 26); wallV(3, 10, 38);

  // Faixa do meio
  wallV(12, 22, 17, [16,17]);                // Voices ↔ Bullpen
  wallV(12, 22, 41, [13,14, 19,20]);         // Bullpen ↔ Field/SAP
  wallH(42, 56, 17, [48,49]);                // Field ↔ SAP

  // Divisórias sul (linha r=23)
  wallH(3, 56, 23, [9,10, 28,29, 49,50]);
  wallV(24, 32, 16, [27,28]);                // Coffee ↔ Lobby
  wallV(24, 32, 41, [27,28]);                // Lobby ↔ Garden
})();

// ── CATÁLOGO DE ITENS DE MESA (pixel-art 10×8 @ desk) ──────────────
const ITEM_LABELS = {
  caneca:'☕ caneca', caneca_vermelha:'☕ caneca vermelha', planta:'🪴 plantinha', livros:'📚 livros',
  fones:'🎧 fones', foto:'🖼️ porta-retrato', trofeu:'🏆 troféu', violao:'🎸 violão', mate:'🧉 chimarrão',
  notebook:'💻 notebook', monitor_duplo:'🖥️🖥️ monitor duplo', gato:'🐈 gato dorminhoco', bola:'⚽ bolinha', cafe:'☕ café espresso',
  funko_tini:'👱‍♀️ Funko Pop da Tini', funko_deadpool:'🔴 Funko do Deadpool', caderno_erpngo:'🐘 caderno ERP.ngo',
  tarot:'🔮 livro de tarot', switch:'🎮 Nintendo Switch', ae86:'🚗 miniatura Toyota AE86', ps5:'🎮 PS5',
  pc_gamer:'🖥️ PC gamer', luminaria:'💡 luminária', ganesha:'🐘 mini Ganesha',
  garrafa_agua:'💧 garrafa de água', gloss:'💄 gloss', oculos:'👓 óculos de grau',
  caneca_office:'☕ caneca "World\'s Best Boss"'
};

function drawItem(g, id, x, y) {
  // itens ~10px, desenhados sobre a mesa
  switch(id) {
    case 'caneca': g.fillStyle='#3b82f6'; g.fillRect(x,y+3,7,6); g.fillRect(x+7,y+4,2,3); g.fillStyle='#93c5fd'; g.fillRect(x+1,y+4,5,1); break;
    case 'caneca_vermelha': g.fillStyle='#cd1543'; g.fillRect(x,y+3,7,6); g.fillRect(x+7,y+4,2,3); g.fillStyle='#f9a8b4'; g.fillRect(x+1,y+4,5,1); break;
    case 'cafe': g.fillStyle='#fff'; g.fillRect(x,y+4,6,5); g.fillStyle='#78350f'; g.fillRect(x+1,y+5,4,1); g.fillStyle='#d6d3d1'; g.fillRect(x+6,y+5,2,2); break;
    case 'planta': g.fillStyle='#b45309'; g.fillRect(x+2,y+5,6,4); g.fillStyle='#16a34a'; g.fillRect(x+3,y,4,5); g.fillRect(x+1,y+2,3,3); g.fillRect(x+6,y+2,3,3); break;
    case 'livros': g.fillStyle='#dc2626'; g.fillRect(x,y+6,9,2); g.fillStyle='#2563eb'; g.fillRect(x+1,y+4,8,2); g.fillStyle='#16a34a'; g.fillRect(x,y+2,8,2); break;
    case 'fones': g.fillStyle='#0f172a'; g.fillRect(x+1,y,8,2); g.fillRect(x,y+1,2,6); g.fillRect(x+8,y+1,2,6); g.fillStyle='#475569'; g.fillRect(x,y+5,3,4); g.fillRect(x+7,y+5,3,4); break;
    case 'foto': g.fillStyle='#92400e'; g.fillRect(x+1,y,8,9); g.fillStyle='#fef3c7'; g.fillRect(x+2,y+1,6,7); g.fillStyle='#60a5fa'; g.fillRect(x+3,y+2,4,3); break;
    case 'trofeu': g.fillStyle='#fbbf24'; g.fillRect(x+2,y,6,4); g.fillRect(x+4,y+4,2,3); g.fillRect(x+1,y+7,8,2); g.fillStyle='#fef3c7'; g.fillRect(x+3,y+1,2,2); break;
    case 'violao': g.fillStyle='#92400e'; g.fillRect(x+3,y+4,6,5); g.fillRect(x+5,y,2,5); g.fillStyle='#451a03'; g.fillRect(x+5,y+6,2,2); break;

const spriteCache = new Map();
function charSprite(pal, dir, frame) {
  const key = pal.hair+pal.skin+pal.shirt+pal.pants+dir+frame;
  if (spriteCache.has(key)) return spriteCache.get(key);
  const flip = dir === 'right';
  const base = BODY[dir === 'up' ? 'up' : (dir === 'down' ? 'down' : 'side')];
  const legSet = (dir === 'left' || dir === 'right')
    ? [LEGS.sideIdle, LEGS.sideA, LEGS.sideB][frame]
    : [LEGS.idle, LEGS.a, LEGS.b][frame];
  const rows = base.concat(legSet.slice(0,3));
  const cv = document.createElement('canvas'); cv.width = 24; cv.height = 32;
  const g = cv.getContext('2d');
  const cmap = { H:pal.hair, S:pal.skin, E:'#1e293b', T:pal.shirt, P:pal.pants, O:'#3f3f46' };
  for (let r = 0; r < rows.length; r++) {
    const row = rows[r];
    for (let c = 0; c < 12; c++) {
      const ch = row[flip ? 11 - c : c];
      if (ch && ch !== '.') { g.fillStyle = cmap[ch] || '#000'; g.fillRect(c*2, r*2, 2, 2); }
    }
  }
  spriteCache.set(key, cv);
  return cv;
}

const world = document.createElement('canvas'); world.width = WW; world.height = WH;
let worldReady = false;

function prerenderWorld() {
  const g = world.getContext('2d');
  g.imageSmoothingEnabled = false;

  // tiles
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = mapTiles[r * COLS + c], x = c * TS, y = r * TS;
    if (t === T.GRASS || t === T.GARDEN) {
      g.fillStyle = ((r + c) % 2) ? '#7ec850' : '#83cd55'; g.fillRect(x, y, TS, TS);
      if ((r*7 + c*13) % 9 === 0) { g.fillStyle = '#6ab63f'; g.fillRect(x+8, y+10, 3, 3); g.fillRect(x+20, y+22, 3, 3); }
      if ((r*5 + c*11) % 13 === 0) { g.fillStyle = '#fef08a'; g.fillRect(x+14, y+6, 3, 3); }
    } else if (t === T.PATH) {
      g.fillStyle = '#dcc9a3'; g.fillRect(x, y, TS, TS);
      g.fillStyle = '#cdb88f'; g.fillRect(x+4, y+6, 10, 7); g.fillRect(x+18, y+18, 11, 8);
    } else if (t === T.FLOOR) {
      g.fillStyle = ((r + c) % 2) ? '#e8d5b5' : '#e2cda9'; g.fillRect(x, y, TS, TS);
      g.fillStyle = 'rgba(160,120,70,0.18)'; g.fillRect(x, y + TS - 2, TS, 1);
      if (c % 4 === 0) g.fillRect(x, y, 1, TS);
    } else if (t === T.WALL) {
      g.fillStyle = '#8a93a6'; g.fillRect(x, y, TS, TS);
      g.fillStyle = '#aab3c5'; g.fillRect(x, y, TS, 10);
      g.fillStyle = '#6e7789'; g.fillRect(x, y + TS - 5, TS, 5);
    } else if (RUG_COLORS[t]) {
      const rc = RUG_COLORS[t];
      g.fillStyle = ((r + c) % 2) ? rc.a : rc.b; g.fillRect(x, y, TS, TS);
    }
  }
  // bordas dos tapetes
  for (const k in ROOMS) {

// ── PATHFINDING (BFS) — click-to-move ──────────────────────────────
function walkable(c, r) {
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return false;
  return !mapSolid[r * COLS + c];
}
function findPath(c0, r0, c1, r1) {
  if (!walkable(c1, r1) || (c0 === c1 && r0 === r1)) return null;
  const prev = new Int32Array(COLS * ROWS).fill(-1);
  const q = [r0 * COLS + c0]; prev[r0 * COLS + c0] = r0 * COLS + c0;
  const target = r1 * COLS + c1;
  while (q.length) {
    const cur = q.shift();
    if (cur === target) break;
    const cc = cur % COLS, cr = (cur / COLS) | 0;
    for (const [dc, dr] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const nc = cc + dc, nr = cr + dr, ni = nr * COLS + nc;
      if (walkable(nc, nr) && prev[ni] === -1) { prev[ni] = cur; q.push(ni); }
    }
  }
  if (prev[target] === -1) return null;
  const path = [];
  let cur = target;
  while (cur !== r0 * COLS + c0) { path.push([cur % COLS, (cur / COLS) | 0]); cur = prev[cur]; }
  return path.reverse();
}

const player = { x: 29.5*TS, y: 31*TS, dir:'up', walkF:0, walkT:0, moving:false, name:'', shirt:SHIRT_CHOICES[0], pal:null, path:null };

function solidAtPx(x, y, w, h) {
  for (const [px, py] of [[x,y],[x+w,y],[x,y+h],[x+w,y+h]]) {
    const c = Math.floor(px / TS), r = Math.floor(py / TS);
    if (!walkable(c, r)) return true;
  }
  return false;
}

function movePlayer(dt) {
  if (modalOpen || infoOpen) return;
  let dx = 0, dy = 0;
  if (UP()) dy -= 1; if (DOWN()) dy += 1; if (LEFT()) dx -= 1; if (RIGHT()) dx += 1;
  if (joy.active && (Math.abs(joy.dx) > 0.18 || Math.abs(joy.dy) > 0.18)) { dx = joy.dx; dy = joy.dy; }

  if (dx || dy) player.path = null;        // input manual cancela click-to-move
  else if (player.path && player.path.length) {
    const [tc, tr] = player.path[0];
    const tx = tc * TS + TS/2 - 12, ty = tr * TS + TS/2 - 20;
    const ddx = tx - player.x, ddy = ty - player.y, dist = Math.hypot(ddx, ddy);
    if (dist < 4) { player.path.shift(); }
    else { dx = ddx / dist; dy = ddy / dist; }
  }

  if (dx && dy && Math.abs(dx) === 1 && Math.abs(dy) === 1) { dx *= 0.707; dy *= 0.707; }
  player.moving = !!(dx || dy);
  if (player.moving) {
    if (Math.abs(dx) > Math.abs(dy)) player.dir = dx > 0 ? 'right' : 'left';
    else player.dir = dy > 0 ? 'down' : 'up';
  }

  const HB = 13, HOX = 5, HOY = 18;
  const nx = player.x + dx * PLAYER_SPEED * dt;
  const ny = player.y + dy * PLAYER_SPEED * dt;
  if (!solidAtPx(nx + HOX, player.y + HOY, HB, HB)) player.x = nx;
  if (!solidAtPx(player.x + HOX, ny + HOY, HB, HB)) player.y = ny;

  if (player.moving) {
    player.walkT += dt;
    if (player.walkT > 0.14) { player.walkF = player.walkF === 1 ? 2 : 1; player.walkT = 0; }
  } else player.walkF = 0;
}

const npcs = [];
function setupNPCs() {
  for (const t of TEAM) {
    const meta = DESKS[t.id] || {};
    // se player usa o mesmo nome, não duplica
    if (player.name && meta.nome && meta.nome.toLowerCase().startsWith(player.name.toLowerCase().split(' ')[0])) continue;
    npcs.push({
      id: t.id, nome: (meta.nome || t.id), area: (meta.area || ''),
      x: t.px * TS, y: t.py * TS, dir: 'down', walkF: 0, walkT: 0, moving: false,
      pal: t.pal, room: ROOMS[t.room], path: null, idleT: Math.random() * 4 + 1,
    });
  }
}
function moveNPC(n, dt) {
  if (n.path && n.path.length) {
    const [tc, tr] = n.path[0];
    const tx = tc*TS + TS/2 - 12, ty = tr*TS + TS/2 - 20;
    const dx = tx - n.x, dy = ty - n.y, dist = Math.hypot(dx, dy);
    if (dist < 3) { n.path.shift(); if (!n.path.length) { n.moving = false; n.idleT = 2 + Math.random()*5; } }
    else {
      n.moving = true;
      n.x += dx/dist * NPC_SPEED * dt; n.y += dy/dist * NPC_SPEED * dt;
      n.dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up');
      n.walkT += dt;
      if (n.walkT > 0.18) { n.walkF = n.walkF === 1 ? 2 : 1; n.walkT = 0; }
    }
  } else {
    n.moving = false; n.walkF = 0;
    n.idleT -= dt;
    if (n.idleT <= 0) {
      const R = n.room;
      for (let tries = 0; tries < 8; tries++) {
        const tc = R.c0 + 1 + Math.floor(Math.random() * (R.c1 - R.c0 - 1));
        const tr = R.r0 + 1 + Math.floor(Math.random() * (R.r1 - R.r0 - 1));
        if (!walkable(tc, tr)) continue;
        const pc = Math.floor((n.x+12)/TS), pr = Math.floor((n.y+20)/TS);
        const p = findPath(pc, pr, tc, tr);
        if (p && p.length < 26) { n.path = p; break; }
      }
      n.idleT = 3 + Math.random() * 6;
    }
  }
}

      </div>`);
  }
  else if (a.type === 'person') showPerson(a.id);
}

function showPerson(id) {
  const m = DESKS[id] || {};
  const itens = (m.itens || []).map(i => `<span class="info-item">${ITEM_LABELS[i] || i}</span>`).join('');
  const flag = m.padrao ? `<div class="info-flag">📝 Itens padrão — personalização real da mesa pendente (manda os itens reais pro Rudá que ele atualiza o office-desks.json)</div>` : '';
  openInfo(`
    <div class="info-head"><div class="info-ava" style="--ac:${m.cor || '#001844'}">👤</div>
      <div><div class="info-title">${escH(m.nome || id)}</div><div class="info-sub">${escH(m.area || '')}</div></div></div>
    <div class="info-body">Na mesa:</div>
    <div class="info-items">${itens || '<span class="info-item">— sem itens ainda</span>'}</div>
    ${flag}
    <div class="info-actions"><button class="info-btn pri" onclick="closeInfo()">Fechar</button></div>`);
}

// ── HUD helpers ────────────────────────────────────────────────────
const hudZone = document.getElementById('hud-zone');
const promptEl = document.getElementById('prompt'), promptTxt = document.getElementById('prompt-txt');

function roomOf(px, py) {
  const c = Math.floor(px / TS), r = Math.floor(py / TS);
  for (const k in ROOMS) {
    const R = ROOMS[k];
    if (c >= R.c0 && c <= R.c1 && r >= R.r0 && r <= R.r1) return R;
  }
  return null;
}

// ── RENDER ─────────────────────────────────────────────────────────
const ctx = gc.getContext('2d');
function resize() { gc.width = innerWidth; gc.height = innerHeight; ctx.imageSmoothingEnabled = false; }
addEventListener('resize', resize); resize();

function drawChar(x, y, dir, frame, pal, name, isPlayer) {
  const spr = charSprite(pal, dir, frame);
  // sombra
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(x - cam.x + 12, y - cam.y + 31, 9, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.drawImage(spr, Math.round(x - cam.x), Math.round(y - cam.y));
  // name tag
  if (name) {
    const sx = x - cam.x + 12, sy = y - cam.y - 8;
    ctx.font = '700 10px Inter';
    const w = ctx.measureText(name).width + 16;
    ctx.fillStyle = isPlayer ? 'rgba(0,24,68,0.92)' : 'rgba(255,255,255,0.94)';
    rr(ctx, sx - w/2, sy - 7, w, 15, 8); ctx.fill();
    ctx.fillStyle = isPlayer ? '#fff' : '#1e293b';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(name, sx, sy + 0.5);
  }
}
function rr(g, x, y, w, h, r) {
  g.beginPath();
  g.moveTo(x+r, y); g.arcTo(x+w, y, x+w, y+h, r); g.arcTo(x+w, y+h, x, y+h, r);
  g.arcTo(x, y+h, x, y, r); g.arcTo(x, y, x+w, y, r); g.closePath();
}

function drawRoomLabels() {
  ctx.font = '700 11px Inter'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const k in ROOMS) {
    const R = ROOMS[k];
    const cx = (R.c0 + R.c1 + 1) / 2 * TS - cam.x;
    const cy = R.r0 * TS + 18 - cam.y;
    if (cx < -150 || cx > gc.width + 150 || cy < -40 || cy > gc.height + 40) continue;
    const w = ctx.measureText(R.nome).width + 20;
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    rr(ctx, cx - w/2, cy - 10, w, 20, 10); ctx.fill();
    ctx.strokeStyle = 'rgba(0,24,68,0.10)'; ctx.lineWidth = 1; rr(ctx, cx - w/2, cy - 10, w, 20, 10); ctx.stroke();
    ctx.fillStyle = '#334155';
    ctx.fillText(R.nome, cx, cy + 0.5);
  }
}

function drawZoneHints(near) {
  if (!near) return;
  const sx = near.px - cam.x, sy = near.py - cam.y;
  const pulse = 4 + Math.sin(performance.now() / 280) * 2;
  ctx.strokeStyle = 'rgba(205,21,67,0.65)'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(sx, sy, 22 + pulse, 0, Math.PI*2); ctx.stroke();
}

// minimapa
const mini = document.getElementById('mini'), mg = mini.getContext('2d');
function drawMini() {
  const sx = mini.width / WW, sy = mini.height / WH;
  mg.fillStyle = '#7ec850'; mg.fillRect(0, 0, mini.width, mini.height);
  mg.fillStyle = '#e8d5b5'; mg.fillRect(3*TS*sx, 3*TS*sy, 54*TS*sx, 30*TS*sy);
  for (const k in ROOMS) {
    const R = ROOMS[k], rc = RUG_COLORS[R.rug];
    mg.fillStyle = rc ? rc.edge : '#5cb83c';
    mg.fillRect((R.c0+1)*TS*sx, (R.r0+1)*TS*sy, (R.c1-R.c0-1)*TS*sx, (R.r1-R.r0-1)*TS*sy);
  }
  for (const n of npcs) { mg.fillStyle = n.pal.shirt; mg.fillRect(n.x*sx - 1.5, n.y*sy - 1.5, 3.5, 3.5); }
  mg.fillStyle = '#cd1543'; mg.fillRect(player.x*sx - 2.5, player.y*sy - 2.5, 5, 5);
  mg.strokeStyle = '#fff'; mg.lineWidth = 1; mg.strokeRect(player.x*sx - 2.5, player.y*sy - 2.5, 5, 5);
}

// ── GAME LOOP ──────────────────────────────────────────────────────
let spawned = false, last = 0, miniT = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - last) / 1000, 0.05); last = ts;
  if (!spawned || !worldReady) return;

  movePlayer(dt);
  for (const n of npcs) moveNPC(n, dt);
  updateCamera(gc.width, gc.height);

  // render
  ctx.fillStyle = '#7ec850'; ctx.fillRect(0, 0, gc.width, gc.height);
  ctx.drawImage(world, -Math.round(cam.x), -Math.round(cam.y));

  drawRoomLabels();

  // chars ordenados por Y (depth)
  const chars = npcs.map(n => ({ x:n.x, y:n.y, dir:n.dir, f:n.moving ? n.walkF : 0, pal:n.pal, name:n.nome.split(' ')[0], pl:false }));
  chars.push({ x:player.x, y:player.y, dir:player.dir, f:player.moving ? player.walkF : 0, pal:player.pal, name:player.name, pl:true });
  chars.sort((a, b) => a.y - b.y);
  for (const c of chars) drawChar(c.x, c.y, c.dir, c.f, c.pal, c.name, c.pl);

  // zona próxima
  let near = null, nd = 1e9;
  for (const z of ZONES) {
    const d = Math.hypot(z.px - (player.x+12), z.py - (player.y+16));
    if (d < z.r && d < nd) { near = z; nd = d; }
  }
  drawZoneHints(near);
  if (near) { promptTxt.textContent = near.name + ' — ' + near.tip; promptEl.classList.add('on'); }
  else promptEl.classList.remove('on');

  if ((ACT() || actTouch) && near && !modalOpen && !infoOpen) runAction(near);
  actTouch = false;
  keysJust.clear();

  // HUD zona
  const room = roomOf(player.x + 12, player.y + 16);
  hudZone.textContent = room ? room.nome : '🌳 Área externa';

  miniT += dt;
  if (miniT > 0.25) { drawMini(); miniT = 0; }
}
requestAnimationFrame(loop);

// ── SPAWN ──────────────────────────────────────────────────────────
const swWrap = document.getElementById('sg-swatches');
let selShirt = SHIRT_CHOICES[0];
SHIRT_CHOICES.forEach((c, i) => {
  const b = document.createElement('button');
  b.className = 'sg-sw' + (i === 0 ? ' sel' : ''); b.style.setProperty('--c', c);
  b.addEventListener('click', () => {
    selShirt = c;
    swWrap.querySelectorAll('.sg-sw').forEach(el => el.classList.remove('sel'));
    b.classList.add('sel');
  });
  swWrap.appendChild(b);
});

const nameInput = document.getElementById('sg-name');
try {
  const saved = JSON.parse(localStorage.getItem('office.user') || 'null');
  if (saved && saved.nome) nameInput.value = saved.nome;
  else if (typeof saved === 'string') nameInput.value = saved;
} catch {}

function spawn() {
  const nome = nameInput.value.trim() || 'Visitante';
  player.name = nome.split(' ')[0];
  player.shirt = selShirt;
  player.pal = palFor(nome, selShirt);
  try {
    const prev = JSON.parse(localStorage.getItem('office.user') || '{}');
    localStorage.setItem('office.user', JSON.stringify({ ...(typeof prev === 'object' ? prev : {}), nome }));
  } catch {}
  setupNPCs();
  document.getElementById('spawn').style.display = 'none';
  document.getElementById('hud').classList.add('on');
  document.getElementById('hud-name').textContent = player.name;
  document.getElementById('hud-user').style.setProperty('--uc', selShirt);
  spawned = true;
  toast('🎮 Bem-vindo ao EPI-USE Office! Anda até a recepção pra ver o guia.');
}
document.getElementById('sg-go').addEventListener('click', spawn);
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') spawn(); });

// Versão colaborador: quem é role 'hub' (não-staff de marketing) vê o game
// orientado ao Marketing Hub — o "← Home" vira atalho pro Hub e o rótulo muda.
(function () {
  fetch('/api/auth/status').then(function (r) { return r.json(); }).then(function (s) {
    if (s && s.authenticated && s.role === 'hub') {
      var back = document.getElementById('hud-back');
      if (back) { back.href = '/hub'; back.textContent = '← Hub'; }
      var zone = document.getElementById('hud-zone');
      if (zone) zone.textContent = '🏢 EPI-USE · Hub do Colaborador';
      var hub = document.getElementById('hud-hub');
      if (hub) hub.style.outline = '2px solid #cd1543';
    }
  }).catch(function () {});
})();
</script>
