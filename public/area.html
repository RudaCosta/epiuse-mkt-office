<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Módulo · EPI-USE Office</title>
<link rel="stylesheet" href="/design-tokens.css">
<style>
  body { margin:0; background:var(--color-bg,#0a1525); color:var(--color-text,#e6ebf2); font-family:'Open Sans',Arial,sans-serif; }
  .wrap { max-width:1200px; margin:0 auto; padding:18px 16px 60px; }
  .mod-hdr { display:flex; align-items:center; gap:14px; padding:18px 20px; border-radius:14px; margin-bottom:18px;
             border:1px solid var(--color-border,rgba(134,158,195,.18)); }
  .mod-ico { font-size:34px; }
  .mod-hdr h1 { margin:0; font-size:22px; }
  .livechip { display:inline-block; font-size:11px; font-weight:700; vertical-align:middle; margin-left:10px;
              padding:3px 9px; border-radius:99px; background:rgba(16,185,129,.14); color:#6ee7b7;
              border:1px solid rgba(16,185,129,.3); letter-spacing:.02em; }
  .fstage .fsrc, .card .csrc { font-size:10px; color:#6ee7b7; margin-top:6px; opacity:.85; }
  .mod-dona { font-size:13px; color:var(--color-text-muted,#869ec3); margin-top:2px; }
  .mod-foco { font-size:12px; color:var(--color-text-dim,#c0ccd9); margin-top:4px; max-width:760px; }
  .subabas { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
  .subaba { padding:7px 14px; border-radius:8px; border:1px solid var(--color-border,rgba(134,158,195,.18));
            color:var(--color-text,#e6ebf2); text-decoration:none; font-size:13px; font-weight:600; }
  .subaba:hover { background:var(--color-surface-2,#142547); }
  .sec-t { font-size:12px; font-weight:800; letter-spacing:.06em; text-transform:uppercase;
           color:var(--color-text-muted,#869ec3); margin:22px 0 10px; }
  /* FUNIL */
  .funil { display:flex; gap:8px; align-items:stretch; overflow-x:auto; padding-bottom:6px; }
  .fstage { flex:1; min-width:150px; background:var(--color-surface,#0f1e35); border:1px solid var(--color-border,rgba(134,158,195,.18));
            border-radius:12px; padding:14px; position:relative; }
  .fstage .fname { font-size:11px; font-weight:700; text-transform:uppercase; color:var(--color-text-muted,#869ec3); letter-spacing:.04em; }
  .fstage .fval { font-size:26px; font-weight:800; font-family:'JetBrains Mono',monospace; margin:6px 0 2px; }
  .fstage .fmeta { font-size:11px; color:var(--color-text-dim,#c0ccd9); }
  .fstage .fbar { height:6px; border-radius:99px; background:rgba(134,158,195,.15); margin-top:8px; overflow:hidden; }
  .fstage .fbar > i { display:block; height:100%; border-radius:99px; }
  .fstage .fobs { font-size:10px; color:var(--color-text-muted,#869ec3); margin-top:6px; }
  .farrow { align-self:center; color:var(--color-text-muted,#869ec3); font-size:18px; flex:0 0 auto; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
  .card { background:var(--color-surface,#0f1e35); border:1px solid var(--color-border,rgba(134,158,195,.18)); border-radius:12px; padding:14px; }
  .card .clbl { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--color-text-muted,#869ec3); font-weight:700; }
  .card .cval { font-size:24px; font-weight:800; font-family:'JetBrains Mono',monospace; margin-top:6px; }
  .pend { font-size:12px; color:var(--color-text-muted,#869ec3); }
  .proj { display:flex; align-items:center; gap:8px; padding:9px 12px; background:var(--color-surface,#0f1e35);
          border:1px solid var(--color-border,rgba(134,158,195,.18)); border-radius:10px; margin-bottom:7px; font-size:13px; }
  .pstatus { margin-left:auto; font-size:11px; padding:3px 8px; border-radius:99px; background:rgba(134,158,195,.12); }
  .tools { display:flex; gap:8px; flex-wrap:wrap; }
  .tool { padding:9px 14px; border-radius:9px; background:var(--color-surface,#0f1e35); border:1px solid var(--color-border,rgba(134,158,195,.18));
          color:var(--color-text,#e6ebf2); text-decoration:none; font-size:13px; font-weight:600; }
  .tool:hover { background:var(--color-surface-2,#142547); }
</style>
</head>
<body>
<office-nav></office-nav>
<div class="wrap" id="root"><p class="pend">Carregando módulo…</p></div>
<office-footer></office-footer>

<script src="/office-nav.js"></script>
<script src="/office-footer.js"></script>
<script>
function getId(){
  var p = location.pathname.replace(/\/+$/,'').split('/');
  var last = p[p.length-1];
  if (last && last !== 'area' && last !== 'area.html') return last;
  return new URLSearchParams(location.search).get('id') || 'pipeline';
}
var fmt = function(n){ return (n==null||n==='') ? null : (typeof n==='number' ? n.toLocaleString('pt-BR') : n); };

function renderFunil(funil, cor){
  var parts = [];
  funil.forEach(function(s, i){
    if (i>0) parts.push('<div class="farrow">→</div>');
    var val = fmt(s.valor);
    var pct = (s.valor!=null && s.meta) ? Math.min(100, Math.round(100*s.valor/s.meta)) : null;
    var metaTxt = s.meta ? ('meta: '+fmt(s.meta)+(pct!=null?(' · '+pct+'%'):'')) : '⏳ meta validando';
    parts.push(
      '<div class="fstage">'
      + '<div class="fname">'+s.estagio+'</div>'
      + '<div class="fval" style="color:'+(val?cor:'var(--color-text-muted,#869ec3)')+'">'+(val||'—')+'</div>'
      + '<div class="fmeta">'+metaTxt+'</div>'
      + (pct!=null ? '<div class="fbar"><i style="width:'+pct+'%;background:'+cor+'"></i></div>' : '')
      + (s._fonte ? '<div class="fsrc">🔗 '+s._fonte+'</div>' : '')
      + (s.obs ? '<div class="fobs">'+s.obs+'</div>' : '')
      + '</div>'
    );
  });
  return '<div class="funil">'+parts.join('')+'</div>';
}

// helpers de wiring: acham estágio/kpi por nome e injetam valor REAL + marcam fonte
function setStage(a, estagio, valor, fonte){
  (a.funil||[]).forEach(function(s){ if (s.estagio===estagio && valor!=null){ s.valor = valor; if(fonte) s._fonte = fonte; } });
}
function setKpi(a, label, valor, fonte){
  (a.kpis||[]).forEach(function(k){ if (k.label===label && valor!=null){ k.valor = valor; k.fonte = 'real'; if(fonte) k._fonte = fonte; } });
}
async function jget(u){ return (await fetch(u + (u.indexOf('?')<0?'?':'&') + 't=' + Date.now())).json(); }

// enriquecimento AO VIVO por área — só dado REAL das fontes já integradas (Regra 7)
async function enrich(a){
  a._live = [];
  try {
    if (a.id==='pipeline' || a.id==='intelligence'){
      var pl = await jget('/api/pipeline');
      setStage(a,'Contatos', pl.contatos_total); setStage(a,'Sequências', pl.sequencias_total);
      setStage(a,'Base CRM (contatos)', pl.contatos_total); setStage(a,'Empresas mapeadas', pl.empresas_total);
      setKpi(a,'Contatos na base (Apollo)', pl.contatos_total); setKpi(a,'Empresas mapeadas', pl.empresas_total);
      setKpi(a,'Contatos na base', pl.contatos_total); setKpi(a,'Empresas', pl.empresas_total);
      if (pl.contatos_total!=null) a._live.push('Apollo');
    }
    if (a.id==='growth'){
      var li = await jget('/api/linkedin/historical');
      var sm = li.serie_mensal||[]; var last = sm[sm.length-1] || {};
      setStage(a,'Seguidores novos/mês', last.novos, 'LinkedIn');
      setStage(a,'Impressões/Alcance', last.impressoes_7d, 'LinkedIn 7d');
      setKpi(a,'Seguidores LinkedIn (total)', last.total_seguidores, 'LinkedIn');
      if (last.total_seguidores!=null) a._live.push('LinkedIn');
    }
    if (a.id==='conteudo'){
      var ar = await jget('/api/artigos');
      setStage(a,'Publicados', ar.total, 'base artigos');
      setKpi(a,'Artigos na base', ar.total, 'base artigos');
      if (ar.total!=null) a._live.push('Artigos');
    }
    if (a.id==='brand'){
      var cs = await jget('/api/cases');
      if (cs && cs.kpis){ setKpi(a,'Cases publicáveis', cs.kpis.publicaveis, 'Cases'); a._live.push('Cases'); }
    }
  } catch(e){ console.warn('enrich falhou', e); }
}

async function init(){
  var id = getId();
  var d = await jget('/api/areas.json');
  var a = (d.areas||[]).find(function(x){ return x.id===id; });
  var root = document.getElementById('root');
  if (!a){ root.innerHTML = '<p class="pend">Módulo "'+id+'" não encontrado.</p>'; return; }
  document.title = a.icon+' '+a.nome+' · EPI-USE Office';

  await enrich(a);

  var liveChip = (a._live && a._live.length)
    ? ' <span class="livechip">● ao vivo · '+a._live.join(' · ')+'</span>' : '';
  var subabas = a.subabas ? ('<div class="subabas">'+a.subabas.map(function(t){
      return '<a class="subaba" href="'+t.href+'">'+t.label+'</a>'; }).join('')+'</div>') : '';

  root.innerHTML =
    '<div class="mod-hdr" style="border-left:4px solid '+a.cor+'">'
    + '<div class="mod-ico">'+a.icon+'</div>'
    + '<div><h1>'+a.nome+liveChip+'</h1><div class="mod-dona">👤 '+a.dona+'</div>'
    + '<div class="mod-foco">'+(a.foco||'')+'</div></div></div>'
    + subabas
    + '<div class="sec-t">🎯 Funil de meta</div>' + renderFunil(a.funil, a.cor)
    + '<div class="sec-t">📊 Números</div><div class="grid">'
    + (a.kpis||[]).map(function(k){
        var v = fmt(k.valor);
        return '<div class="card"><div class="clbl">'+k.label+'</div><div class="cval">'
          + (v!=null ? v : '<span class="pend">'+(k.fonte&&k.fonte.indexOf('pending')===0?'⏳ aguarda integração':'—')+'</span>')
          + '</div>'+(k._fonte?'<div class="csrc">🔗 '+k._fonte+'</div>':'')+'</div>'; }).join('')
    + '</div>'
    + '<div class="sec-t">📁 Projetos</div><div>'
    + (a.projetos||[]).map(function(p){
        return '<div class="proj">📌 '+p.nome+'<span class="pstatus">'+p.status+'</span></div>'; }).join('')
    + '</div>'
    + '<div class="sec-t">🔗 Ferramentas</div><div class="tools">'
    + (a.ferramentas||[]).map(function(t){
        return '<a class="tool" href="'+t.href+'">'+t.label+' →</a>'; }).join('')
    + '</div>';
}
init();
</script>
</body>
</html>
