<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Módulo · EPI-USE Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&family=Fira+Code:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/design-tokens.css">
<link rel="stylesheet" href="/css/polish-pro.css">
<link rel="stylesheet" href="/css/consulting-dark.css">
<link rel="stylesheet" href="/css/home.css">
<style>
  body { margin:0; background:var(--home-bg,var(--bg,#0a1525)); color:var(--home-text,var(--text,#e6ebf2)); font-family:'Source Sans 3','Open Sans',system-ui,Arial,sans-serif; }
  .wrap { max-width:1320px; margin:0 auto; padding:22px 18px 60px; }
  /* HERO MÓDULO — mesmo gradient da .home-hero */
  .mod-hdr { display:flex; align-items:center; gap:16px; padding:22px 26px; border-radius:16px; margin-bottom:22px;
             background: linear-gradient(135deg, var(--home-accent-navy,var(--surface,#001844)), #395170);
             border:1px solid var(--home-border,rgba(134,158,195,.18));
             box-shadow: var(--home-shadow, 0 1rem 2rem -1rem #000);
             color:#fff; position:relative; overflow:hidden; }
  .mod-hdr::before { content:''; position:absolute; left:0; top:0; bottom:0; width:6px;
                     background: var(--cor, var(--home-accent-red,var(--red,#cd1543))); border-radius:16px 0 0 16px; }
  .mod-ico { font-size:38px; line-height:1; }
  .mod-hdr h1 { margin:0; font-size:24px; font-weight:700; font-family:'Poppins','Source Sans 3',sans-serif; color:#fff; letter-spacing:-.01em; }
  .livechip { display:inline-block; font-size:11px; font-weight:700; vertical-align:middle; margin-left:10px;
              padding:3px 9px; border-radius:99px; background:rgba(16,185,129,.18); color:var(--teal,#6ee7b7);
              border:1px solid rgba(16,185,129,.3); letter-spacing:.02em; }
  .fstage .fsrc, .card .csrc { font-size:10px; color:var(--teal,#6ee7b7); margin-top:6px; opacity:.85; }
  .mod-dona { font-size:13px; color:rgba(255,255,255,.78); margin-top:4px; }
  .mod-dona a { color:var(--blue,#93c5fd); text-decoration:none; }
  .mod-foco { font-size:12.5px; color:rgba(255,255,255,.68); margin-top:6px; max-width:780px; line-height:1.5; }
  .subabas { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
  .subaba { padding:8px 14px; border-radius:10px; border:1px solid var(--home-border,rgba(134,158,195,.18));
            background:var(--home-surface,var(--surface,#0f1e35));
            color:var(--home-text,var(--text,#e6ebf2)); text-decoration:none; font-size:13px; font-weight:600; transition:background .15s, border-color .15s; }
  .subaba:hover { background:var(--home-surface-2,#142547); border-color:var(--home-accent-blue,var(--muted,#869ec3)); }
  .sec-t { font-size:12px; font-weight:800; letter-spacing:.06em; text-transform:uppercase;
           color:var(--home-text-muted,var(--muted,#869ec3)); margin:26px 0 12px; display:flex; align-items:center; gap:10px; }
  .sec-t::after { content:''; flex:1; height:1px; background:linear-gradient(90deg, var(--home-border,rgba(134,158,195,.2)), transparent); }
  /* DASHBOARD DE METAS (upgrade do funil) */
  .metas-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }
  .meta-card { background: rgba(10, 21, 37, 0.45); border: 1px solid rgba(255, 255, 255, 0.08);
               backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
               border-radius: 14px; padding: 16px 18px; position: relative; overflow: hidden; transition: transform .25s, border-color .25s, box-shadow .25s;
               box-shadow: 0 8px 24px rgba(0,0,0,.25); }
  .meta-card:hover { transform: translateY(-2px); border-color: var(--cor, var(--home-accent-blue)); box-shadow: 0 12px 32px rgba(0,0,0,.4), 0 0 12px var(--cor, var(--home-accent-blue)); }
  .meta-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--cor,var(--blue,#60a5fa)); opacity: .8; }
  .meta-card .estagio { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--home-text-muted,var(--muted,#869ec3)); margin-bottom: 8px; }
  .meta-card .vals { display: flex; align-items: baseline; gap: 6px; margin-bottom: 10px; }
  .meta-card .real { font-size: 28px; font-weight: 800; font-family: 'JetBrains Mono',monospace; color: var(--cor,var(--blue,#60a5fa)); }
  .meta-card .real.dim { color: var(--home-text-muted,var(--muted,#869ec3)); font-size: 22px; }
  .meta-card .slash { color: var(--home-text-muted,var(--muted,#869ec3)); font-size: 18px; }
  .meta-card .meta { font-size: 15px; color: var(--home-text-dim,var(--text-dim,#c0ccd9)); font-family: 'JetBrains Mono',monospace; }
  .meta-card .bar { height: 8px; background: rgba(134,158,195,.12); border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
  .meta-card .bar > i { display: block; height: 100%; border-radius: 99px; transition: width .5s; }
  .meta-card .status { font-size: 11px; font-weight: 700; }
  .meta-card .status.ok { color: var(--teal,#6ee7b7); }
  .meta-card .status.warn { color: var(--gold,#fcd34d); }
  .meta-card .status.off { color: var(--red,#fca5a5); }
  .meta-card .status.pend { color: var(--home-text-muted,var(--muted,#869ec3)); }
  .meta-card .obs { font-size: 10.5px; color: var(--home-text-muted,var(--muted,#869ec3)); margin-top: 6px; }
  .meta-card .fonte { font-size: 10px; color: var(--teal,#6ee7b7); margin-top: 4px; opacity: .85; }
  /* SPARKLINE (Liquid Glass) */
  .spark { background: rgba(10, 21, 37, 0.45); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 16px; padding: 16px 14px; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.45); transition: border-color .25s, box-shadow .25s; }
  .spark:hover { border-color: rgba(0, 242, 254, 0.3); box-shadow: 0 12px 40px 0 rgba(0, 242, 254, 0.15); }
  
  /* LIGHT / ELEPHANT OVERRIDES FOR GLASS CARDS */
  :root[data-theme="light"] .meta-card,
  :root[data-theme="elephant"] .meta-card {
    background: rgba(255, 255, 255, 0.65) !important;
    border: 1px solid rgba(15, 23, 42, 0.08) !important;
    box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05) !important;
  }
  :root[data-theme="light"] .meta-card:hover,
  :root[data-theme="elephant"] .meta-card:hover {
    border-color: var(--cor, var(--blue,#3b82f6)) !important;
    box-shadow: 0 12px 32px rgba(15, 23, 42, 0.1), 0 0 12px var(--cor, var(--blue,#3b82f6)) !important;
  }
  :root[data-theme="light"] .spark,
  :root[data-theme="elephant"] .spark {
    background: rgba(255, 255, 255, 0.65) !important;
    border: 1px solid rgba(15, 23, 42, 0.08) !important;
    box-shadow: 0 8px 32px 0 rgba(15, 23, 42, 0.06) !important;
  }
  :root[data-theme="light"] .spark:hover,
  :root[data-theme="elephant"] .spark:hover {
    border-color: rgba(37, 99, 235, 0.3) !important;
    box-shadow: 0 12px 40px 0 rgba(37, 99, 235, 0.15) !important;
  }
  :root[data-theme="light"] .card,
  :root[data-theme="elephant"] .card {
    background: rgba(255, 255, 255, 0.65) !important;
    border: 1px solid rgba(15, 23, 42, 0.08) !important;
  }
  /* KPIs */
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
  .card { background:var(--home-surface,var(--surface,#0f1e35)); border:1px solid var(--home-border,rgba(134,158,195,.18)); border-radius:12px; padding:14px; }
  .card .clbl { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--home-text-muted,var(--muted,#869ec3)); font-weight:700; }
  .card .cval { font-size:24px; font-weight:800; font-family:'JetBrains Mono',monospace; margin-top:6px; }
  .pend { font-size:12px; color:var(--home-text-muted,var(--muted,#869ec3)); }
  /* PROJETOS */
  .proj { display:flex; align-items:center; gap:8px; padding:9px 12px; background:var(--home-surface,var(--surface,#0f1e35));
          border:1px solid var(--home-border,rgba(134,158,195,.18)); border-radius:10px; margin-bottom:7px; font-size:13px; }
  .pstatus { margin-left:auto; font-size:11px; padding:3px 8px; border-radius:99px; background:rgba(134,158,195,.12); }
  .pstatus.feito { background:rgba(16,185,129,.16); color:var(--teal,#6ee7b7); }
  .pstatus.ativo, .pstatus.rodando { background:rgba(96,165,250,.16); color:var(--blue,#93c5fd); }
  .pstatus.pendente { background:rgba(248,113,113,.14); color:var(--red,#fca5a5); }
  /* FERRAMENTAS — NOVO CARD GRANDE COM ÍCONE */
  .tools-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; }
  .tool-card { display:flex; gap:14px; align-items:flex-start; padding:16px 18px;
               background:linear-gradient(135deg, var(--cor-bg, rgba(96,165,250,.05)), var(--home-surface,var(--surface,#0f1e35)));
               border:1px solid var(--cor-border, rgba(96,165,250,.25));
               border-radius:14px; text-decoration:none; color:var(--home-text,var(--text,#e6ebf2));
               transition:transform .15s, border-color .15s; }
  .tool-card:hover { transform:translateY(-2px); border-color:var(--cor,var(--blue,#60a5fa)); }
  .tool-card .ti { font-size:30px; line-height:1; flex:0 0 auto; }
  .tool-card .tt { font-size:14px; font-weight:700; margin-bottom:4px; color:var(--home-text,var(--text,#e6ebf2)); }
  .tool-card .td { font-size:11.5px; color:var(--home-text-muted,var(--muted,#869ec3)); line-height:1.45; }
  .tool-card .ta { font-size:11px; color:var(--cor,var(--blue,#60a5fa)); font-weight:700; margin-top:8px; }
  /* ATIVIDADE AGENTE */
  .ag-feed { display:flex; flex-direction:column; gap:0; background:var(--home-surface,var(--surface,#0f1e35));
             border:1px solid var(--home-border,rgba(134,158,195,.18)); border-radius:12px; overflow:hidden; }
  .ag-row { display:flex; align-items:center; gap:10px; padding:10px 14px; font-size:12.5px;
            border-bottom:1px solid var(--color-border,rgba(134,158,195,.1)); }
  .ag-row:last-child { border-bottom:none; }
  .ag-row .tipo { font-size:10px; padding:2px 7px; border-radius:5px; font-weight:700; font-family:'JetBrains Mono',monospace; }
  .ag-row .tipo.inbox { background:rgba(251,191,36,.14); color:var(--gold,#fcd34d); }
  .ag-row .tipo.outbox { background:rgba(16,185,129,.14); color:var(--teal,#6ee7b7); }
  .ag-row .nome { flex:1; text-transform:capitalize; }
  .ag-row .when { font-size:10.5px; color:var(--home-text-muted,var(--muted,#869ec3)); font-family:'JetBrains Mono',monospace; }
  .ag-empty { padding:18px; text-align:center; color:var(--home-text-muted,var(--muted,#869ec3)); font-size:12px; }
  /* WORKFLOWS */
  .wf-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
  .wf-mini { background:var(--home-surface,var(--surface,#0f1e35)); border:1px solid var(--home-border,rgba(134,158,195,.18));
             border-radius:12px; padding:14px 16px; }
  .wf-mini h4 { margin:0 0 4px; font-size:13px; }
  .wf-mini .wd { font-size:11.5px; color:var(--home-text-muted,var(--muted,#869ec3)); margin-bottom:10px; line-height:1.4; }
  .wf-mini .btn { display:inline-block; cursor:pointer; padding:6px 12px; font-size:11px; font-weight:700; border-radius:7px;
                  background:var(--cor,var(--blue,#60a5fa)); color:var(--bg,#0a1525); text-decoration:none; }
  .wf-mini .relev { display:inline-block; font-size:9.5px; padding:2px 7px; border-radius:99px;
                    background:rgba(168,85,247,.12); color:var(--violet,#c4b5fd); margin-left:6px; font-weight:700; }

  /* Estilos do Painel de Voices Integrado */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .kpi-card { background: rgba(15, 30, 53, 0.45); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 14px; padding: 18px 20px; backdrop-filter: blur(8px); position: relative; overflow: hidden; }
  .kpi-card.warn { border-color: rgba(245,158,11,0.3); background: linear-gradient(135deg, rgba(245,158,11,0.05), rgba(15, 30, 53, 0.45)); }
  .kpi-card.ok { border-color: rgba(16,185,129,0.3); background: linear-gradient(135deg, rgba(16,185,129,0.05), rgba(15, 30, 53, 0.45)); }
  .kpi-lbl { font-size: 10px; letter-spacing: 0.16em; color: var(--home-text-muted, #869ec3); text-transform: uppercase; font-weight: 700; }
  .kpi-val { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 26px; color: var(--home-text, #e6ebf2); margin: 10px 0 4px; letter-spacing: 0.04em; }
  .kpi-val.warn { color: var(--warning, #f59e0b); }
  .kpi-val.ok { color: var(--success, #10b981); }
  .kpi-val.dim { color: var(--home-text-muted, #869ec3); font-size: 18px; }
  .kpi-sub { font-size: 11px; color: var(--home-text-muted, #869ec3); }
  .kpi-bar { height: 5px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; margin-top: 10px; }
  .kpi-bar-fill { height: 100%; background: linear-gradient(90deg, var(--warning, #f59e0b), #fbbf24); border-radius: 3px; }

  .tbl-wrap { background: rgba(15, 30, 53, 0.45); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 14px; overflow: hidden; margin-bottom: 24px; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.25); }
  .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tbl thead { background: rgba(255,255,255,0.02); }
  .tbl th { padding: 12px 14px; text-align: left; font-size: 10px; letter-spacing: 0.14em; color: var(--home-text-muted, #869ec3); text-transform: uppercase; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .tbl td { padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.06); vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tr:hover { background: rgba(255,255,255,0.02); }
  .tbl-name { font-weight: 700; color: var(--home-text, #e6ebf2); }
  .tbl-niche { font-size: 11px; color: var(--home-text-muted, #869ec3); margin-top: 2px; }
  .chip { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 11px; white-space: nowrap; }
  .chip.piloto, .chip.onboarding { background: rgba(245,158,11,0.10); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
  .chip.piloto::before, .chip.onboarding::before { content: ''; width: 6px; height: 6px; background: #fbbf24; border-radius: 50%; }
  .chip.ativo { background: rgba(16,185,129,0.10); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
  .chip.ativo::before { content: ''; width: 6px; height: 6px; background: #10b981; border-radius: 50%; }
  .chip.kit-ok { background: rgba(16,185,129,0.10); color: #10b981; border: 1px solid rgba(16,185,129,0.25); font-size: 10px; }
  .chip.kit-no { background: rgba(148,163,184,0.08); color: var(--home-text-muted, #869ec3); border: 1px solid rgba(148,163,184,0.2); font-size: 10px; }
  .tbl-action { font-size: 12px; color: #60a5fa; text-decoration: none; padding: 5px 10px; background: rgba(37,99,235,0.10); border-radius: 5px; }
  .tbl-action:hover { background: rgba(37,99,235,0.20); }
  .muted { color: var(--home-text-muted, #869ec3); font-size: 12px; }

  /* PERFORMANCE */
  .perf-filters { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .perf-filter { font-size: 11px; padding: 6px 14px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,0.06); color: var(--home-text-dim, #c0ccd9); border-radius: 16px; cursor: pointer; transition: all .15s; }
  .perf-filter:hover { background: rgba(255,255,255,.08); }
  .perf-filter.active { background: rgba(37,99,235,.15); border-color: rgba(37,99,235,.4); color: #93c5fd; }
  .perf-mini { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .perf-mini-card { background: rgba(10, 21, 37, 0.45); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px; padding: 13px 16px; box-shadow: 0 6px 20px 0 rgba(0, 0, 0, 0.2); }
  .perf-mini-lbl { font-size: 10px; letter-spacing: .12em; color: var(--home-text-muted, #869ec3); text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
  .perf-mini-val { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 20px; color: var(--home-text, #e6ebf2); }
  .perf-mini-val.success { color: #10b981; }
  .perf-mini-val.purple { color: #c084fc; }
  .perf-mini-sub { font-size: 10px; color: var(--home-text-muted, #869ec3); margin-top: 4px; }
  .perf-tbl-wrap { background: rgba(10, 21, 37, 0.45); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 12px; overflow: hidden; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.35); }
  .perf-tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
  .perf-tbl th { padding: 10px 14px; text-align: left; font-size: 10px; letter-spacing: .12em; color: var(--home-text-muted, #869ec3); text-transform: uppercase; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,.02); }
  .perf-tbl td { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .perf-tbl tr:last-child td { border-bottom: none; }
  .perf-tbl tr.clickable { cursor: pointer; transition: background .15s; }
  .perf-tbl tr.clickable:hover { background: rgba(37,99,235,.05); }
  .perf-spark { width: 100px; height: 30px; vertical-align: middle; margin-left: 8px; }
  .top-post-card { background: linear-gradient(135deg, rgba(168,85,247,.10), rgba(37,99,235,.05)); border: 1px solid rgba(168,85,247,.3); border-radius: 12px; padding: 16px 20px; margin-bottom: 18px; display: flex; gap: 16px; align-items: center; }
  .top-post-card .crown { font-size: 32px; }
  .top-post-card .body { flex: 1; min-width: 0; }
  .top-post-card .label { font-size: 10px; letter-spacing: .14em; color: #c084fc; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
  .top-post-card .voice-name { font-size: 14px; font-weight: 700; color: var(--home-text, #e6ebf2); }
  .top-post-card .preview { font-size: 13px; color: var(--home-text-dim, #c0ccd9); margin: 4px 0; line-height: 1.4; }
  .top-post-card .metrics { display: flex; gap: 12px; font-size: 12px; color: var(--home-text-muted, #869ec3); }
  .top-post-card .open-btn { background: rgba(168,85,247,.18); color: #c084fc; padding: 8px 14px; border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: 600; border: 1px solid rgba(168,85,247,.3); }
  .top-post-card .open-btn:hover { background: rgba(168,85,247,.28); }
  .trend-up { color: #10b981; }
  .trend-down { color: #ef4444; }
  .trend-flat { color: var(--home-text-muted, #869ec3); }
  .perf-empty { text-align: center; padding: 30px; color: var(--home-text-muted, #869ec3); font-size: 13px; font-style: italic; background: rgba(15, 30, 53, 0.45); border: 1px dashed rgba(255, 255, 255, 0.08); border-radius: 12px; }

  /* LIGHT OVERRIDES */
  :root[data-theme="light"] .kpi-card,
  :root[data-theme="elephant"] .kpi-card {
    background: rgba(255, 255, 255, 0.65) !important;
    border: 1px solid rgba(15, 23, 42, 0.08) !important;
  }
  :root[data-theme="light"] .tbl-wrap,
  :root[data-theme="elephant"] .tbl-wrap,
  :root[data-theme="light"] .perf-mini-card,
  :root[data-theme="elephant"] .perf-mini-card,
  :root[data-theme="light"] .perf-tbl-wrap,
  :root[data-theme="elephant"] .perf-tbl-wrap,
  :root[data-theme="light"] .perf-empty,
  :root[data-theme="elephant"] .perf-empty {
    background: rgba(255, 255, 255, 0.65) !important;
    border: 1px solid rgba(15, 23, 42, 0.08) !important;
    box-shadow: 0 8px 32px 0 rgba(15, 23, 42, 0.05) !important;
  }
  :root[data-theme="light"] .tbl th,
  :root[data-theme="elephant"] .tbl th,
  :root[data-theme="light"] .perf-tbl th,
  :root[data-theme="elephant"] .perf-tbl th {
    background: rgba(0, 0, 0, 0.02) !important;
    border-bottom-color: rgba(15, 23, 42, 0.06) !important;
  }
  :root[data-theme="light"] .tbl td,
  :root[data-theme="elephant"] .tbl td,
  :root[data-theme="light"] .perf-tbl td,
  :root[data-theme="elephant"] .perf-tbl td {

  :root[data-theme="elephant"] .perf-tbl tr.clickable:hover {

  /* Visual pipeline funnel */
  .visual-funnel {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10, 21, 37, 0.45);

    padding: 24px;
    margin-bottom: 24px;
    flex-wrap: wrap;

  }
  :root[data-theme="light"] .visual-funnel,
  :root[data-theme="elephant"] .visual-funnel {
    background: rgba(255, 255, 255, 0.65) !important;

  }
  @media (max-width: 900px) {
    .visual-funnel {
      flex-direction: column;
      align-items: stretch;
    }
  }
  .funnel-step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    padding: 14px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);

  .funnel-step:hover {
    transform: translateY(-2px);

  :root[data-theme="light"] .funnel-step,
  :root[data-theme="elephant"] .funnel-step {
    background: rgba(15, 23, 42, 0.02) !important;

  .funnel-step-name {
    font-size: 11px;

    text-transform: uppercase;

    letter-spacing: 0.05em;

    font-family: 'JetBrains Mono', monospace;

    font-weight: 800;

  .funnel-step-meta {
    font-size: 11px;

    font-size: 10px;
    font-weight: 800;
    color: var(--color-success-400, #10b981);

<body class="home-root" data-route="area">
<office-nav></office-nav>
<div class="wrap" id="root"><p class="pend">Carregando módulo…</p></div>
<office-footer></office-footer>

<script src="/office-nav.js"></script>
<script src="/office-footer.js"></script>
<script>
function getId(){
  var p = location.pathname.replace(/\/+$/,'').split('/');
  var last = p[p.length-1];
  if (last && last !== 'area' && last !== 'area.html') return last;
  return new URLSearchParams(location.search).get('id') || 'pipeline';
}
function esc(s){ return String(s||'').replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
var fmt = function(n){ return (n==null||n==='') ? null : (typeof n==='number' ? n.toLocaleString('pt-BR') : n); };

// MAPA workflows ↔ areas (qual workflow é relevante pra qual area)
var WF_RELEV = {
  'criar-artigo': ['conteudo','brand','growth'],
  'nova-oferta':  ['brand','growth','pipeline','intelligence']
};

// DASHBOARD METAS (upgrade do funil) — cada estágio vira card com progresso
function renderMetasDashboard(funil, cor){
  return '<div class="metas-grid" style="--cor:'+cor+'">' + funil.map(function(s){
    var pct = (s.valor!=null && s.meta) ? Math.round(100*s.valor/s.meta) : null;
    var statusTxt = '⏳ pendente'; var statusCls = 'pend';
    if (pct != null) {
      if (pct >= 100) { statusTxt = '✅ meta batida'; statusCls = 'ok'; }
      else if (pct >= 75) { statusTxt = '🟢 on track ('+pct+'%)'; statusCls = 'ok'; }
      else if (pct >= 50) { statusTxt = '🟡 atrás ('+pct+'%)'; statusCls = 'warn'; }
      else { statusTxt = '🔴 longe ('+pct+'%)'; statusCls = 'off'; }
    } else if (s.valor != null && !s.meta) {
      statusTxt = '📊 sem meta'; statusCls = 'pend';
    }
    var barCor = (pct >= 75) ? '#10b981' : (pct >= 50) ? '#f59e0b' : (pct != null ? '#ef4444' : '#6b7280');
    var barW = (pct == null) ? 0 : Math.min(100, pct);
    return '<div class="meta-card" style="--cor:'+cor+'">'
      + '<div class="estagio">'+esc(s.estagio)+'</div>'
      + '<div class="vals">'
        + '<span class="real'+(s.valor==null?' dim':'')+'">'+(s.valor!=null?fmt(s.valor):'—')+'</span>'
        + (s.meta ? '<span class="slash">/</span><span class="meta">'+fmt(s.meta)+'</span>' : '')
      + '</div>'
      + '<div class="bar"><i style="width:'+barW+'%;background:'+barCor+'"></i></div>'
      + '<div class="status '+statusCls+'">'+statusTxt+'</div>'
      + (s.obs ? '<div class="obs">💬 '+esc(s.obs)+'</div>' : '')
      + (s._fonte ? '<div class="fonte">🔗 '+esc(s._fonte)+'</div>' : '')
      + '</div>';
  }).join('') + '</div>';
}

function renderVisualFunnel(funil, cor) {
  var stepsHtml = [];
  for (var i = 0; i < funil.length; i++) {
    var s = funil[i];
    var val = s.valor;
    var meta = s.meta;
    var valTxt = val != null ? fmt(val) : '—';
    var metaTxt = meta ? 'Meta: ' + fmt(meta) : 'Sem meta';
    var convBadge = '';
    if (i > 0) {
      var prev = funil[i-1];
      if (prev.valor && val) {
        if (i === 3) {
          var rate = ((val / prev.valor) * 100).toFixed(2);
          convBadge = '<div class="funnel-step-conv" title="Taxa de Agendamento: Reuniões / E-mails">🎯 ' + rate + '% conv.</div>';
        }
        else if (i === 5) {
          var winRate = ((val / (prev.valor + val)) * 100).toFixed(1);
          convBadge = '<div class="funnel-step-conv" title="Win Rate: Ganhos / (Ativos + Ganhos)">🏆 ' + winRate + '% win</div>';
        }
      }
    }
    var stepHtml = '<div class="funnel-step" style="--cor:' + cor + '">'
      + '<div class="funnel-step-name">' + esc(s.estagio) + '</div>'
      + '<div class="funnel-step-val">' + valTxt + '</div>'
      + '<div class="funnel-step-meta">' + metaTxt + '</div>'
      + convBadge
      + '</div>';
    stepsHtml.push(stepHtml);
    if (i < funil.length - 1) {
      stepsHtml.push('<div class="funnel-arrow">➔</div>');
    }
  }
  return '<div class="visual-funnel">' + stepsHtml.join('') + '</div>';
}

function renderSpark(pts, cor){
  var W=820, H=120, P=26;
  var ys = pts.map(function(p){return p.y;});
  var min=Math.min.apply(null,ys), max=Math.max.apply(null,ys);
  var rng = (max-min)||1;
  var n = pts.length;
  function px(i){ return P + i*(W-2*P)/(n-1); }
  function py(v){ return H-P - (v-min)*(H-2*P)/rng; }
  
  var line = pts.map(function(p,i){ return (i?'L':'M')+px(i).toFixed(1)+' '+py(p.y).toFixed(1); }).join(' ');
  var area = line + ' L'+px(n-1).toFixed(1)+' '+(H-P)+' L'+px(0).toFixed(1)+' '+(H-P)+' Z';
  
  var gradId = 'sparkGrad-' + Math.random().toString(36).substring(2, 9);
  var lineGradId = 'lineGrad-' + Math.random().toString(36).substring(2, 9);
  var glowFilterId = 'glowFilter-' + Math.random().toString(36).substring(2, 9);
  
  // Dual tone gradient logic based on the primary area color
  var secondaryCor = (cor.toLowerCase() === '#004b8d' || cor.toLowerCase() === '#0a2342' || cor.toLowerCase() === '#2563eb') ? '#00f2fe' : '#ec4899';

  var defs = '<defs>'
    + '<linearGradient id="'+gradId+'" x1="0" y1="0" x2="0" y2="1">'
    + '  <stop offset="0%" stop-color="'+cor+'" stop-opacity="0.35"/>'
    + '  <stop offset="50%" stop-color="'+secondaryCor+'" stop-opacity="0.08"/>'
    + '  <stop offset="100%" stop-color="'+secondaryCor+'" stop-opacity="0"/>'
    + '</linearGradient>'
    + '<linearGradient id="'+lineGradId+'" x1="0" y1="0" x2="1" y2="0">'
    + '  <stop offset="0%" stop-color="'+cor+'"/>'
    + '  <stop offset="100%" stop-color="'+secondaryCor+'"/>'
    + '</linearGradient>'
    + '<filter id="'+glowFilterId+'" x="-20%" y="-20%" width="140%" height="140%">'
    + '  <feGaussianBlur stdDeviation="4" result="blur" />'
    + '  <feComponentTransfer in="blur" result="boost">'
    + '    <feFuncA type="linear" slope="0.85"/>'
    + '  </feComponentTransfer>'
    + '  <feMerge>'
    + '    <feMergeNode in="boost" />'
    + '    <feMergeNode in="SourceGraphic" />'
    + '  </feMerge>'
    + '</filter>'
    + '</defs>';

  var dots = pts.map(function(p,i){
    var show = (i===0 || i===n-1);
    var dotGlow = 'filter: drop-shadow(0 0 6px ' + (i===0 ? cor : secondaryCor) + ');';
    return show ? '<circle cx="'+px(i).toFixed(1)+'" cy="'+py(p.y).toFixed(1)+'" r="6" fill="#ffffff" stroke="'+(i===0 ? cor : secondaryCor)+'" stroke-width="3" style="' + dotGlow + '"/>'
      +'<text x="'+px(i).toFixed(1)+'" y="'+(py(p.y)-14).toFixed(1)+'" fill="var(--text,#e6ebf2)" font-size="11" font-weight="700" text-anchor="'+(i===0?'start':'end')+'" font-family="JetBrains Mono,monospace">'+p.y.toLocaleString('pt-BR')+'</text>'
      +'<text x="'+px(i).toFixed(1)+'" y="'+(H-8)+'" fill="var(--text-muted,#869ec3)" font-size="10" font-weight="600" text-anchor="'+(i===0?'start':'end')+'" font-family="JetBrains Mono,monospace">'+p.x+'</text>' : '';
  }).join('');

  return '<div class="spark"><svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="width:100%;height:120px;overflow:visible;">'
    + defs
    + '<path d="'+area+'" fill="url(#'+gradId+')" />'
    + '<path d="'+line+'" fill="none" stroke="url(#'+lineGradId+')" stroke-width="3" filter="url(#'+glowFilterId+')" stroke-linecap="round" stroke-linejoin="round"/>'
    + dots + '</svg></div>';
}

// FERRAMENTAS — cards grandes com ícone + descrição + cor da área
function renderFerramentas(tools, cor){
  if (!tools || !tools.length) return '<p class="pend">Nenhuma ferramenta cadastrada pra esta área.</p>';
  // converte hex em rgba pra background suave
  var corBg = hexToRgba(cor, .08);
  var corBd = hexToRgba(cor, .28);
  return '<div class="tools-grid">' + tools.map(function(t){
    return '<a class="tool-card" href="'+esc(t.href)+'" style="--cor:'+cor+';--cor-bg:'+corBg+';--cor-border:'+corBd+'">'
      + '<div class="ti">'+(t.icon||'🔗')+'</div>'
      + '<div style="flex:1">'
        + '<div class="tt">'+esc(t.label)+'</div>'
        + (t.desc ? '<div class="td">'+esc(t.desc)+'</div>' : '')
        + '<div class="ta">Abrir →</div>'
      + '</div>'
      + '</a>';
  }).join('') + '</div>';
}

function hexToRgba(hex, a){
  var h = hex.replace('#','');
  if (h.length === 3) h = h.split('').map(function(c){return c+c;}).join('');
  var r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

// ATIVIDADE DO AGENTE — últimos itens do inbox/outbox de area-<id>
async function renderAtividadeAgente(slug){
  try {
    var ws = await jget('/api/agentes/'+slug+'/workspace');
    var rows = [];
    (ws.inbox||[]).slice(0,4).forEach(function(it){ rows.push(_agRow(it, 'inbox')); });
    (ws.outbox||[]).slice(0,3).forEach(function(it){ rows.push(_agRow(it, 'outbox')); });
    if (!rows.length) {
      return '<div class="ag-feed"><div class="ag-empty">📭 Inbox e outbox vazios pra <code>'+slug+'</code>. <a href="/cowork" style="color:#93c5fd">Disparar workflow →</a></div></div>';
    }
    return '<div class="ag-feed">'+rows.join('')+'</div>'
      + '<div style="margin-top:8px;font-size:11px;color:var(--home-text-muted,#869ec3)">→ <a href="/agentes/'+slug+'" style="color:#93c5fd">Workspace completo do agente</a></div>';
  } catch(e) {
    return '<div class="ag-feed"><div class="ag-empty">Agente <code>'+slug+'</code> sem workspace ainda.</div></div>';
  }
}

function _agRow(it, tipo){
  var ico = tipo==='inbox' ? '📥' : '📤';
  var nome = it.nome.replace(/^\d{4}-\d{2}-\d{2}-/,'').replace(/\.md$/,'').replace(/-/g,' ');
  var when = new Date(it.modificado).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  return '<div class="ag-row">'
    + '<span class="tipo '+tipo+'">'+ico+' '+tipo+'</span>'
    + '<span class="nome">'+esc(nome)+'</span>'
    + '<span class="when">'+when+'</span>'
    + '</div>';
}

// WORKFLOWS — disponíveis + marca relevância pra esta área
async function renderWorkflows(areaId, cor){
  try {
    var wfs = await jget('/api/workflows');
    if (!wfs.length) return '';
    return '<div class="wf-grid">' + wfs.map(function(w){
      var relevante = (WF_RELEV[w.slug] || []).indexOf(areaId) >= 0;
      var relevBadge = relevante ? '<span class="relev">⭐ relevante</span>' : '';
      return '<div class="wf-mini" style="--cor:'+cor+'">'
        + '<h4>'+esc(w.nome)+relevBadge+'</h4>'
        + '<div class="wd">'+esc(w.descricao||'')+' · <strong>'+(w.steps||[]).length+'</strong> steps · ~'+(w.estimativa_min||'?')+' min</div>'
        + '<a class="btn" href="/cowork">🚀 Abrir Cowork</a>'
        + '</div>';
    }).join('') + '</div>';
  } catch(e) { return ''; }
}

// helpers de wiring
function setStage(a, estagio, valor, fonte){
  (a.funil||[]).forEach(function(s){ if (s.estagio===estagio && valor!=null){ s.valor = valor; if(fonte) s._fonte = fonte; } });
}
function setKpi(a, label, valor, fonte){
  (a.kpis||[]).forEach(function(k){ if (k.label===label && valor!=null){ k.valor = valor; k.fonte = 'real'; if(fonte) k._fonte = fonte; } });
}
async function jget(u){ return (await fetch(u + (u.indexOf('?')<0?'?':'&') + 't=' + Date.now())).json(); }

async function enrich(a){
  a._live = [];
  try {
    if (a.id==='pipeline' || a.id==='intelligence'){
      var pl = await jget('/api/pipeline');
      if (a.id==='intelligence') {
        setStage(a,'Base CRM (contatos)', pl.contatos_total);
        if (pl.contas_total) {
          setStage(a,'Empresas mapeadas', pl.contas_total);
          setKpi(a,'Empresas mapeadas', pl.contas_total);
          setKpi(a,'Empresas', pl.contas_total);
        }
        setKpi(a,'Contatos na base (Apollo)', pl.contatos_total);
        setKpi(a,'Contatos na base', pl.contatos_total);
      }
    }
    if (a.id==='growth'){
      var li = await jget('/api/linkedin/historical');
      var sm = li.serie_mensal||[]; var last = sm[sm.length-1] || {};
      setStage(a,'Seguidores novos/mês', last.novos, 'LinkedIn');
      setStage(a,'Impressões/Alcance', last.impressoes_7d, 'LinkedIn 7d');
      setKpi(a,'Seguidores LinkedIn (total)', last.total_seguidores, 'LinkedIn');
      if (last.total_seguidores!=null) a._live.push('LinkedIn');
      a._spark = sm.filter(function(m){return m.total_seguidores!=null;})
                   .map(function(m){return {x:m.mes, y:m.total_seguidores};});
      a._spark_label = 'Evolução LinkedIn (' + a._spark.length + ' meses reais)';
    }
    if (a.id==='conteudo'){
      var ar = await jget('/api/artigos');
      setStage(a,'Publicados', ar.total, 'base artigos');
      setKpi(a,'Artigos na base', ar.total, 'base artigos');
      if (ar.total!=null) a._live.push('Artigos');
    }
    if (a.id==='brand'){
      var cs = await jget('/api/cases');
      if (cs && cs.kpis){ setKpi(a,'Cases publicáveis', cs.kpis.publicaveis, 'Cases'); a._live.push('Cases'); }
    }
    if (a.id==='eventos'){
      var ev = await jget('/api/events.json'); var ab = (ev && ev.abas) || {};
      var brEv = (ab.brasil && ab.brasil.eventos) || [];
      var ltEv = (ab.latam  && ab.latam.eventos)  || [];
      var br    = brEv.length;
      var latam = ltEv.length;
      setStage(a,'Eventos planejados', br, 'events.json · BR');
      setKpi(a,'Eventos planejados FY', br, 'events.json · ' + br + ' BR + ' + latam + ' LATAM');
      var meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
      var counts = new Array(12).fill(0);
      brEv.concat(ltEv).forEach(function(e){ if(e.m>=1 && e.m<=12) counts[e.m-1]++; });
      a._spark = counts.map(function(c,i){ return { x: meses[i], y: c }; });
      a._spark_label = 'Distribuição mensal FY (BR + LATAM)';
      if (br) a._live.push('Eventos');
    }
    // Coletar dinamicamente todas as fontes vivas definidas pelo servidor
    (a.funil||[]).forEach(function(s){ 
      if (s._live) {
        var name = s._live.split('-').map(function(w){ return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ');
        if (a._live.indexOf(name) < 0) a._live.push(name);
      }
    });
    (a.kpis||[]).forEach(function(k){ 
      if (k._live) {
        var name = k._live.split('-').map(function(w){ return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ');
        if (a._live.indexOf(name) < 0) a._live.push(name);
      }
    });
  } catch(e){ console.warn('enrich falhou', e); }
}

var DATA_AREA_CACHE = null;

async function init(){
  var id = getId();
  var root = document.getElementById('root');
  
  if (!DATA_AREA_CACHE) {
    var d = await jget('/api/areas.json');
    var a = (d.areas||[]).find(function(x){ return x.id===id; });
    if (!a){ root.innerHTML = '<p class="pend">Módulo "'+id+'" não encontrado.</p>'; return; }
    await enrich(a);
    DATA_AREA_CACHE = a;
  }
  
  var a = DATA_AREA_CACHE;
  document.title = a.icon+' '+a.nome+' · EPI-USE Office';

  var agSlug = 'area-' + a.id;
  var agentBadges = '';
  try {
    var counters = await jget('/api/agentes/_counters');
    var k = (counters && counters[agSlug]) || {};
    if (k.inbox) agentBadges += ' <span style="font-size:10px;background:rgba(251,191,36,.18);color:#fcd34d;padding:2px 7px;border-radius:99px;font-weight:700">📥 '+k.inbox+'</span>';
    if (k.outbox) agentBadges += ' <span style="font-size:10px;background:rgba(16,185,129,.16);color:#6ee7b7;padding:2px 7px;border-radius:99px;font-weight:700">📤 '+k.outbox+'</span>';
  } catch(e){}

  var liveChip = (a._live && a._live.length)
    ? ' <span class="livechip">● ao vivo · '+a._live.join(' · ')+'</span>' : '';
  var subabas = a.subabas ? ('<div class="subabas">'+a.subabas.map(function(t){
      return '<a class="subaba" href="'+t.href+'">'+t.label+'</a>'; }).join('')+'</div>') : '';

  // Renderiza skeleton inicial (síncrono)
  root.innerHTML =
    '<div class="mod-hdr" style="border-left:4px solid '+a.cor+'">'
    + '<div class="mod-ico">'+a.icon+'</div>'
    + '<div><h1>'+a.nome+liveChip+'</h1><div class="mod-dona">👤 '+a.dona
    + ' · <a href="/agentes/area-'+a.id+'" style="color:var(--color-info-500,#60a5fa);text-decoration:none">🤖 agente da área →</a>'+agentBadges+'</div>'
    + '<div class="mod-foco">'+(a.foco||'')+'</div></div></div>'
    + subabas
    + (a.id === 'pipeline' ? '<div class="sec-t">🌪️ Funil de Conversão Outbound</div>' + renderVisualFunnel(a.funil, a.cor) + '<div class="sec-t">🎯 Detalhe das metas</div>' : '<div class="sec-t">🎯 Dashboard de metas</div>')
    + renderMetasDashboard(a.funil, a.cor)
    + (a._spark && a._spark.length>1 ? '<div class="sec-t">📈 '+(a._spark_label || ('Evolução ('+a._spark.length+' meses)'))+'</div>'+renderSpark(a._spark, a.cor) : '')
    + '<div class="sec-t">🔧 Ferramentas</div>' + renderFerramentas(a.ferramentas, a.cor)
    + (a.id === 'brand' ? '<div class="sec-t">🎙️ Painel de Controle dos Voices</div><div id="brand-voices-panel" style="margin-bottom:24px"><div class="pend" style="padding:20px;text-align:center">Carregando painel dos Voices...</div></div>' : '')
    + '<div class="sec-t">📊 Números</div><div class="grid">'
    + (a.kpis||[]).map(function(k){
        var v = fmt(k.valor);

function drawSparkline2d(canvasId, data, isLight) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width = 100;
  const h = canvas.height = 30;
  ctx.clearRect(0, 0, w, h);
  if (!data || data.length < 2) return;
  const max = Math.max(...data);
  const min = Math.min(...data);
  const rng = (max - min) || 1;
  const pad = 3;
  ctx.beginPath();
  for (let i = 0; i < data.length; i++) {
    const x = pad + i * (w - 2 * pad) / (data.length - 1);
    const y = h - pad - (data[i] - min) * (h - 2 * pad) / rng;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.lineWidth = 2;
  const cyanColor = isLight ? '#2563eb' : '#00f2fe';
  const purpleColor = isLight ? '#7c3aed' : '#a855f7';
  const grad = ctx.createLinearGradient(0, 0, w, 0);
  grad.addColorStop(0, cyanColor);
  grad.addColorStop(1, purpleColor);
  ctx.strokeStyle = grad;
  
  ctx.shadowColor = isLight ? 'rgba(37, 99, 235, 0.3)' : 'rgba(0, 242, 254, 0.5)';
  ctx.shadowBlur = 4;
  ctx.shadowOffsetY = 1;
  ctx.stroke();
  
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  ctx.lineTo(w - pad, h);
  ctx.lineTo(pad, h);
  ctx.closePath();
  const gradFill = ctx.createLinearGradient(0, 0, 0, h);
  gradFill.addColorStop(0, isLight ? 'rgba(37, 99, 235, 0.15)' : 'rgba(0, 242, 254, 0.25)');
  gradFill.addColorStop(1, 'rgba(168, 85, 247, 0)');
  ctx.fillStyle = gradFill;
  ctx.fill();
}

async function loadPerformance(period) {
  currentPeriod = period;
  
  document.querySelectorAll('.perf-filter').forEach(el => el.classList.toggle('active', el.dataset.period === period));
  
  const perfTblArea = document.getElementById('perf-tbl-area');
  if (!perfTblArea) return;
  perfTblArea.innerHTML = '<div class="pend" style="text-align:center;padding:20px">Carregando performance...</div>';
  
  let voices = cachedVoices;
  let posts = cachedPostsMap[period];
  
  try {
    if (!voices) {
      const vr = await fetch('/api/voices.json').then(r => r.json());
      cachedVoices = vr.voices || [];
      voices = cachedVoices;
    }
    if (!posts) {
      const pr = await fetch('/api/posts?period=' + period).then(r => r.json());
      cachedPostsMap[period] = pr.posts || [];
      posts = cachedPostsMap[period];
    }
  } catch (e) {
    perfTblArea.innerHTML = `<div class="perf-empty">Erro ao carregar performance: ${e.message}</div>`;
    return;
  }
  
  const byVoice = {};
  for (const v of voices) byVoice[v.id] = { voice: v, posts: [], totalEng: 0, count: 0 };
  for (const p of posts) {
    if (!byVoice[p.voice_id]) continue;
    byVoice[p.voice_id].posts.push(p);
    byVoice[p.voice_id].count++;
    byVoice[p.voice_id].totalEng += (p.metrics.likes||0) + (p.metrics.comments||0) + (p.metrics.reposts||0);
  }
  
  const totalPosts = posts.length;
  const totalEng = posts.reduce((s,p)=>s + (p.metrics.likes||0)+(p.metrics.comments||0)+(p.metrics.reposts||0), 0);
  const avgEng = totalPosts > 0 ? Math.round(totalEng / totalPosts) : 0;
  
  let topVoice = null, topAvg = 0;
  for (const id in byVoice) {
    const b = byVoice[id];
    if (b.count > 0) {
      const avg = b.totalEng / b.count;
      if (avg > topAvg) { topAvg = avg; topVoice = b.voice; }
    }
  }
  
  const lastWeekCutoff = Date.now() - 7 * 86400000;
  const recentPosts = posts.filter(p => new Date(p.published_at || p.captured_at).getTime() >= lastWeekCutoff);
  const topPost = recentPosts.reduce((top, p) => {
    const e = (p.metrics.likes||0)+(p.metrics.comments||0)+(p.metrics.reposts||0);
    const te = top ? (top.metrics.likes||0)+(top.metrics.comments||0)+(top.metrics.reposts||0) : -1;
    return e > te ? p : top;
  }, null);
  
  const miniKpisEl = document.getElementById('perf-mini-kpis');
  if (miniKpisEl) {
    miniKpisEl.innerHTML = `
      <div class="perf-mini-card">
        <div class="perf-mini-lbl">Posts no período</div>
        <div class="perf-mini-val success">${totalPosts}</div>
        <div class="perf-mini-sub">${period === 'all' ? 'desde o início' : 'janela ' + period}</div>
      </div>
      <div class="perf-mini-card">
        <div class="perf-mini-lbl">Engajamento total</div>
        <div class="perf-mini-val success">${totalEng}</div>
        <div class="perf-mini-sub">likes + coments + reposts</div>
      </div>
      <div class="perf-mini-card">
        <div class="perf-mini-lbl">Eng. médio por post</div>
        <div class="perf-mini-val success">${avgEng}</div>
        <div class="perf-mini-sub">média da janela</div>
      </div>
      <div class="perf-mini-card">
        <div class="perf-mini-lbl">Top Performer</div>
        <div class="perf-mini-val purple" style="font-size:13px">${topVoice ? topVoice.nome.split(' ')[0] : '—'}</div>
        <div class="perf-mini-sub">${topVoice ? `eng. médio: ${Math.round(topAvg)}` : 'sem dados ainda'}</div>
      </div>
    `;
  }
  
  const topPostArea = document.getElementById('top-post-area');
  if (topPostArea) {
    if (topPost) {
      const topVoiceObj = voices.find(v => v.id === topPost.voice_id);
      const totalE = (topPost.metrics.likes||0)+(topPost.metrics.comments||0)+(topPost.metrics.reposts||0);
      topPostArea.innerHTML = `
        <div class="top-post-card">
          <div class="crown">🏆</div>
          <div class="body">
            <div class="label">Top post da semana</div>
            <div class="voice-name">${topVoiceObj ? topVoiceObj.nome : topPost.voice_id}</div>
            <div class="preview">${(topPost.content_preview||'(sem preview)').slice(0,140)}${(topPost.content_preview||'').length>140?'…':''}</div>
            <div class="metrics">
              <span>❤️ ${topPost.metrics.likes}</span>
              <span>💬 ${topPost.metrics.comments}</span>
              <span>🔄 ${topPost.metrics.reposts}</span>
              <span><b>${totalE}</b> total</span>
            </div>
          </div>
          <a class="open-btn" href="${topPost.post_url}" target="_blank">↗ Abrir no LinkedIn</a>
        </div>`;
    } else {
      topPostArea.innerHTML = '';
    }
  }
  
  const rows = Object.values(byVoice)
    .filter(b => b.count > 0)
    .sort((a,b) => (b.totalEng / Math.max(1,b.count)) - (a.totalEng / Math.max(1,a.count)));
    
  if (rows.length === 0) {
    perfTblArea.innerHTML = `<div class="perf-empty">Nenhum post registrado ainda.</div>`;
    return;
  }
  
  perfTblArea.innerHTML = `
    <div class="perf-tbl-wrap">
      <table class="perf-tbl">
        <thead><tr>
          <th>Voice</th><th>Posts</th><th>Eng. total</th><th>Eng. médio</th><th>Melhor post</th><th>Tendência</th><th></th>
        </tr></thead>
        <tbody>
        ${rows.map((b, i) => {
          const avg = Math.round(b.totalEng / b.count);
          const bestPost = b.posts.reduce((top, p) => {
            const e = (p.metrics.likes||0)+(p.metrics.comments||0)+(p.metrics.reposts||0);
            const te = top ? (top.metrics.likes||0)+(top.metrics.comments||0)+(top.metrics.reposts||0) : -1;
            return e > te ? p : top;
          }, null);
          let trend = 'flat', trendIcon = '→';
          if (b.posts.length >= 2) {
            const sorted = [...b.posts].sort((a,b) => new Date(a.published_at||a.captured_at) - new Date(b.published_at||b.captured_at));
            const mid = Math.floor(sorted.length/2);
            const e1 = sorted.slice(0, mid).reduce((s,p)=>s+(p.metrics.likes||0)+(p.metrics.comments||0)+(p.metrics.reposts||0), 0) / Math.max(1,mid);
            const e2 = sorted.slice(mid).reduce((s,p)=>s+(p.metrics.likes||0)+(p.metrics.comments||0)+(p.metrics.reposts||0), 0) / Math.max(1,sorted.length-mid);
            if (e2 > e1 * 1.1) { trend = 'up'; trendIcon = '▲'; }
            else if (e2 < e1 * 0.9) { trend = 'down'; trendIcon = '▼'; }
          }
          return `
          <tr class="clickable" onclick="window.open('/voices?v=${b.voice.id}', '_blank')">
            <td>
              <div style="font-weight:700;color:var(--home-text, #e6ebf2)">${b.voice.nome}</div>
              <div style="font-size:11px;color:var(--home-text-muted, #869ec3)">${b.voice.nicho}</div>
            </td>
            <td>${b.count}</td>
            <td><b>${b.totalEng}</b></td>
            <td>${avg}</td>
            <td>${bestPost ? `<a href="${bestPost.post_url}" target="_blank" style="color:#60a5fa;text-decoration:none" onclick="event.stopPropagation()">${(bestPost.metrics.likes||0)+(bestPost.metrics.comments||0)+(bestPost.metrics.reposts||0)} ↗</a>` : '—'}</td>
            <td><span class="trend-${trend}" style="font-size:14px">${trendIcon}</span> <canvas class="perf-spark" id="spark-${b.voice.id}"></canvas></td>
            <td><a class="tbl-action" href="/voices?v=${b.voice.id}" target="_blank" onclick="event.stopPropagation()">Abrir →</a></td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>
  `;
  
  const theme = document.documentElement.getAttribute('data-theme') || 'dark';
  const isLight = theme === 'light' || theme === 'elephant';
  for (const b of rows) {
    const sorted = [...b.posts].sort((a,b) => new Date(a.published_at||a.captured_at) - new Date(b.published_at||b.captured_at));
    const engValues = sorted.map(p => (p.metrics.likes||0)+(p.metrics.comments||0)+(p.metrics.reposts||0));
    drawSparkline2d('spark-' + b.voice.id, engValues, isLight);
  }
}

  if (digest.inbox_areas && digest.inbox_areas.hoje > 0) summaryParts.push(`<strong style="color:#fbbf24">${digest.inbox_areas.hoje}</strong> ${digest.inbox_areas.hoje===1?'novo pedido hoje':'novos pedidos hoje'}`);
  if (digest.pendencias && digest.pendencias.total > 0) summaryParts.push(`<strong style="color:#f59e0b">${digest.pendencias.total}</strong> ${digest.pendencias.total===1?'pendência':'pendências'} nos Voices`);
  if (digest.workflows_ativos_7d > 0) summaryParts.push(`<strong style="color:#93c5fd">${digest.workflows_ativos_7d}</strong> ${digest.workflows_ativos_7d===1?'workflow disparado':'workflows disparados'} nos últimos 7d`);
  if (summaryParts.length === 0) summaryParts.push('Tudo no eixo. Use o tempo pra revisar performance dos Voices ↓');
  
  const summaryEl = document.getElementById('digest-resumo');
  if (summaryEl) summaryEl.innerHTML = summaryParts.join(' · ');
  
  const pillsEl = document.getElementById('digest-pills');
  if (pillsEl && digest.inbox_areas) {
    const pills = [];
    pills.push(`<span style="font-size:11px;font-family:'JetBrains Mono',monospace;background:rgba(37,99,235,.12);color:#93c5fd;padding:5px 11px;border-radius:99px;">🎙️ ${digest.voices_ativos}/${digest.voices_meta} Voices</span>`);
    pills.push(`<span style="font-size:11px;font-family:'JetBrains Mono',monospace;background:rgba(245,158,11,.12);color:#fbbf24;padding:5px 11px;border-radius:99px;">📥 ${digest.inbox_areas.total} no inbox total</span>`);
    pills.push(`<span style="font-size:11px;font-family:'JetBrains Mono',monospace;background:rgba(168,85,247,.12);color:#c4b5fd;padding:5px 11px;border-radius:99px;">📋 ${digest.inbox_areas.semana} esta semana</span>`);
    pillsEl.innerHTML = pills.join('');
  }
  
  const acoesEl = document.getElementById('digest-acoes');
  if (acoesEl) {
    const acoes = [];
    if (digest.pendencias && digest.pendencias.lista && digest.pendencias.lista.length) {
      digest.pendencias.lista.forEach(p => {
        acoes.push(`<div style="display:flex;align-items:center;gap:10px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:9px 14px;font-size:12.5px;"><span style="color:#fbbf24;">⚠️</span><strong>${esc(p.nome)}</strong><span style="color:var(--home-text-muted);font-size:11px;flex:1;">${esc(p.motivo)}</span><a href="#voices-tab-status" onclick="switchVoicesTab('status')" style="font-size:10px;color:#93c5fd;text-decoration:none;font-weight:700;">RESOLVER →</a></div>`);
      });
    }
    if (digest.inbox_areas && digest.inbox_areas.novos_hoje && digest.inbox_areas.novos_hoje.length) {
      digest.inbox_areas.novos_hoje.forEach(it => {
        const title = it.arquivo.replace(/^\d{4}-\d{2}-\d{2}-/,'').replace(/\.md$/,'').replace(/-/g,' ');
        acoes.push(`<div style="display:flex;align-items:center;gap:10px;background:rgba(37,99,235,.06);border:1px solid rgba(37,99,235,.18);border-radius:8px;padding:9px 14px;font-size:12.5px;"><span style="font-family:'JetBrains Mono',monospace;font-size:10px;background:rgba(37,99,235,.15);color:#93c5fd;padding:2px 7px;border-radius:5px;">${esc(it.agente)}</span><strong style="flex:1;text-transform:capitalize;">${esc(title)}</strong><a href="/agentes/${esc(it.agente)}" style="font-size:10px;color:#93c5fd;text-decoration:none;font-weight:700;">ABRIR →</a></div>`);
      });
    }
    acoesEl.innerHTML = acoes.join('') || '<div style="font-size:12px;color:var(--home-text-muted);text-align:center;padding:8px;">Sem ações pendentes pra hoje 🎉</div>';
  }
  
  document.querySelectorAll('.voices-tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      switchVoicesTab(tab);
    });
  });
}

function switchVoicesTab(tab) {
  document.querySelectorAll('.voices-tab-btn').forEach(b => {
    const active = b.dataset.tab === tab;
    b.classList.toggle('active', active);
    b.style.color = active ? 'var(--home-text, #e6ebf2)' : 'var(--home-text-muted, #869ec3)';
    b.style.borderBottom = active ? '2px solid #60a5fa' : 'none';
    b.style.fontWeight = active ? '700' : '600';
  });
  
  document.querySelectorAll('.voices-tab-content').forEach(c => {
    c.style.display = c.id === 'voices-tab-' + tab ? 'block' : 'none';
  });
  
  if (tab === 'perf') {
    loadPerformance(currentPeriod);
  }
}

init();

// Escuta evento customizado de mudança de tema
window.addEventListener('office-theme-change', function() {
  init();
});
</script>
</body>
</html>
