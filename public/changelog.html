*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a1628; --bg-card: rgba(15, 30, 53, 0.6);
  --border: rgba(37,99,235,0.18); --border-light: rgba(255,255,255,0.06);
  --text: #e2e8f0; --text-dim: #94a3b8; --text-muted: #64748b;
  --primary: #2563EB; --primary-light: #60a5fa;
  --success: #10b981; --warning: #f59e0b;
}
html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }
body {
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(37,99,235,0.10), transparent 60%),
    var(--bg);
  background-attachment: fixed;
}
.wrap { max-width: 880px; margin: 0 auto; padding: 32px 28px 48px; }
.page-head { text-align: center; margin-bottom: 44px; }
.page-eyebrow { font-size: 11px; letter-spacing: 0.28em; color: var(--primary-light); text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
.page-h1 { font-family: 'Press Start 2P', monospace; font-size: 22px; color: var(--text); letter-spacing: 0.04em; line-height: 1.5; margin-bottom: 12px; }
.page-sub { font-size: 14px; color: var(--text-dim); max-width: 540px; margin: 0 auto; line-height: 1.55; }

.timeline { position: relative; padding-left: 36px; }
.timeline::before {
  content: ''; position: absolute; left: 11px; top: 8px; bottom: 8px; width: 2px;
  background: linear-gradient(to bottom, var(--border), transparent);
}
.entry {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: 14px;
  padding: 20px 24px;
  margin-bottom: 16px;
  transition: border-color .2s;
}
.entry:hover { border-color: var(--border); }
.entry::before {
  content: '';
  position: absolute;
  left: -32px;
  top: 22px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--bg);
  border: 2px solid var(--primary);
}
.entry.current::before { background: var(--success); border-color: var(--success); box-shadow: 0 0 8px var(--success); }
.entry-head { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
.ver-tag { font-family: 'Press Start 2P', monospace; font-size: 11px; color: var(--primary-light); background: rgba(37,99,235,0.10); border: 1px solid rgba(37,99,235,0.3); padding: 5px 10px; border-radius: 5px; letter-spacing: 0.04em; }
.ver-tag.current { color: var(--success); background: rgba(16,185,129,0.10); border-color: rgba(16,185,129,0.3); }
.entry-date { font-size: 12px; color: var(--text-muted); }
.entry-status { font-size: 11px; padding: 3px 9px; border-radius: 10px; font-weight: 600; }
.status-live { background: rgba(16,185,129,0.10); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
.status-local { background: rgba(245,158,11,0.10); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
.status-broken { background: rgba(239,68,68,0.10); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
.entry-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.entry-body { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
.entry-body ul { padding-left: 18px; margin: 6px 0; }
.entry-body li { margin: 3px 0; }
.entry-body code { background: rgba(255,255,255,0.05); padding: 1px 5px; border-radius: 3px; font-size: 11px; }
.entry-link { display: inline-block; margin-top: 12px; font-size: 12px; color: var(--primary-light); text-decoration: none; padding: 5px 10px; background: rgba(37,99,235,0.08); border-radius: 5px; }
.entry-link:hover { background: rgba(37,99,235,0.18); }
</style>
</head>

  live:   { label: '🚀 Em produção',   cls: 'status-live' },
  local:  { label: '🏠 Local only',     cls: 'status-local' },
  broken: { label: '⚠️ Parcialmente quebrada', cls: 'status-broken' }

// Mapeamento explícito version → snapshot file (algumas versões não tinham
// snapshot de game-engine). Filenames mantém o prefixo v3.X antigo pra não
// quebrar histórico — só os labels visuais estão em 0.X.Y.
const SNAPSHOT_MAP = {
  '0.2.0': '/_versoes-office/v2.0-game-engine.html',
  '0.2.1': '/_versoes-office/v2.1-game-engine.html',
  '0.2.2': '/_versoes-office/v2.2-game-engine.html',

  '0.3.1': '/_versoes-office/v3.1-game-engine.html',
  '0.3.4': '/_versoes-office/v3.4-game-engine.html',
  '0.4.6': '/_versoes-office/v0.4.6-game.html'
};

const tl = document.getElementById('timeline');
tl.innerHTML = RELEASES.map(r => {
  const status = STATUS_META[r.status] || STATUS_META.local;
  const snapshotUrl = SNAPSHOT_MAP[r.version];
  return `<div class="entry ${r.current ? 'current' : ''}">
    <div class="entry-head">
      <span class="ver-tag ${r.current ? 'current' : ''}">${r.version}</span>
      <span class="entry-date">${r.date}</span>
      <span class="entry-status ${status.cls}">${status.label}</span>
    </div>
    <div class="entry-title">${r.title}</div>
    <div class="entry-body">${r.body}</div>
    ${snapshotUrl && !r.current ? `<a class="entry-link" href="${snapshotUrl}">Ver snapshot do game →</a>` : ''}
  </div>`;
}).join('');
