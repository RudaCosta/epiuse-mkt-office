<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Agents · EPI-USE Voices</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<script defer data-domain="epiuse-voices-optimizer.up.railway.app" src="https://plausible.io/js/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a1628; --bg-2: #0d1e36; --bg-card: rgba(15, 30, 53, 0.6);
  --border: rgba(37,99,235,0.18); --border-light: rgba(255,255,255,0.06); --border-active: rgba(37,99,235,0.5);
  --text: #e2e8f0; --text-dim: #94a3b8; --text-muted: #64748b;
  --primary: #2563EB; --primary-light: #60a5fa;
  --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --purple: #a855f7;
}
html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }
body {
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(168,85,247,0.10), transparent 60%),
    radial-gradient(ellipse 60% 40% at 100% 100%, rgba(37,99,235,0.06), transparent 60%),
    var(--bg);
  background-attachment: fixed;
  padding: 24px 28px 48px;
}
.wrap { max-width: 1100px; margin: 0 auto; }

/* HEADER */
.hdr { background: linear-gradient(135deg, rgba(15,30,53,0.7), rgba(10,22,40,0.7)); border: 1px solid var(--border); border-radius: 18px; padding: 22px 28px; display: flex; align-items: center; justify-content: space-between; gap: 24px; margin-bottom: 28px; position: relative; overflow: hidden; }
.hdr::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 0% 0%, rgba(168,85,247,0.12), transparent 50%); pointer-events: none; }
.hdr-l { position: relative; z-index: 1; }
.hdr-title { font-family: 'Press Start 2P', monospace; font-size: 18px; color: #c084fc; letter-spacing: 0.04em; line-height: 1.5; }
.hdr-sub { font-size: 11px; color: var(--text-muted); letter-spacing: 0.25em; margin-top: 6px; font-weight: 500; }
.hdr-r { display: flex; gap: 8px; position: relative; z-index: 1; }
.hdr-chip { font-size: 13px; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-light); padding: 6px 14px; border-radius: 20px; text-decoration: none; }
.hdr-chip.link { color: #93c5fd; background: rgba(37,99,235,0.12); border-color: rgba(37,99,235,0.3); }
.hdr-chip.link:hover { background: rgba(37,99,235,0.22); }

.sec-hdr { display: flex; align-items: center; gap: 14px; margin: 24px 0 16px; }
.sec-hdr h2 { font-size: 11px; font-weight: 700; letter-spacing: 0.32em; color: var(--primary-light); text-transform: uppercase; }
.sec-hdr .line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }

/* ── GALERIA ── */
.intro { font-size: 14px; color: var(--text-dim); line-height: 1.6; max-width: 760px; margin-bottom: 28px; }
.intro b { color: var(--text); }
.voices-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 16px; margin-bottom: 30px; }
.voice-tile { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 14px; padding: 20px; text-decoration: none; color: var(--text); transition: transform .2s, border-color .2s, box-shadow .2s; cursor: pointer; }
.voice-tile:hover { transform: translateY(-3px); border-color: var(--border-active); box-shadow: 0 8px 24px rgba(168,85,247,0.10); }
.vt-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.vt-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 19px; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.06); }
.vt-avatar.empty { background: rgba(148,163,184,0.08); border: 2px dashed rgba(148,163,184,0.3); color: var(--text-muted); }
.vt-num { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--primary-light); background: rgba(37,99,235,0.10); padding: 4px 8px; border-radius: 5px; }
.vt-name-w { flex: 1; min-width: 0; }
.vt-name { font-size: 15px; font-weight: 700; }
.vt-role { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.vt-tags { display: flex; flex-wrap: wrap; gap: 5px; margin: 10px 0; }
.vt-tag { font-size: 11px; background: rgba(37,99,235,0.10); border: 1px solid rgba(37,99,235,0.25); color: var(--primary-light); padding: 3px 8px; border-radius: 5px; }
.vt-status { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 11px; }
.vt-status.piloto, .vt-status.onboarding { background: rgba(245,158,11,0.10); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
.vt-status.piloto::before, .vt-status.onboarding::before { content: ''; width: 6px; height: 6px; background: var(--warning); border-radius: 50%; }
.vt-cta { font-size: 12px; color: var(--primary-light); margin-top: 12px; }

/* ── PERFIL INDIVIDUAL ── */
.profile-hdr { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 16px; padding: 26px; display: flex; align-items: center; gap: 22px; margin-bottom: 24px; }
.profile-avatar { width: 76px; height: 76px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; flex-shrink: 0; border: 3px solid rgba(255,255,255,0.08); }
.profile-info { flex: 1; min-width: 0; }
.profile-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.profile-role { font-size: 14px; color: var(--text-dim); margin-bottom: 8px; }
.profile-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px; color: var(--text-muted); }
.profile-meta span { display: inline-flex; align-items: center; gap: 5px; }
.profile-num { font-family: 'Press Start 2P', monospace; font-size: 14px; color: var(--purple); }

.card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 14px; padding: 22px 24px; margin-bottom: 16px; backdrop-filter: blur(8px); }
.card-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--primary-light); display: flex; align-items: center; gap: 8px; }
.card-title .ico { font-size: 18px; }

/* Markdown content */
.md-content { font-size: 14px; line-height: 1.7; color: var(--text-dim); }
.md-content h1 { font-size: 18px; color: var(--text); margin: 18px 0 10px; }
.md-content h2 { font-size: 15px; color: var(--text); margin: 18px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border-light); }
.md-content h3 { font-size: 13px; color: var(--primary-light); margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 0.08em; }
.md-content ul, .md-content ol { padding-left: 22px; margin: 8px 0 14px; }
.md-content li { margin: 5px 0; }
.md-content strong { color: var(--text); }
.md-content code { background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
.md-content pre { background: rgba(0,0,0,0.3); padding: 14px; border-radius: 8px; overflow-x: auto; font-size: 12px; margin: 10px 0; }
.md-content pre code { background: none; padding: 0; }
.md-content hr { border: none; border-top: 1px solid var(--border-light); margin: 20px 0; }
.md-content p { margin: 8px 0; }

/* Prompt textarea */
.prompt-wrap { position: relative; }
.prompt-textarea { width: 100%; min-height: 240px; max-height: 480px; background: rgba(0,0,0,0.35); border: 1px solid var(--border-light); border-radius: 10px; padding: 16px; color: var(--text-dim); font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.55; resize: vertical; }
.prompt-actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
.btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .15s, transform .1s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-secondary { background: rgba(37,99,235,0.10); color: #93c5fd; border: 1px solid rgba(37,99,235,0.4); }
.btn-secondary:hover { background: rgba(37,99,235,0.20); }
.btn-success { background: var(--success); color: #fff; }
.copy-status { font-size: 12px; color: var(--success); opacity: 0; transition: opacity .3s; }
.copy-status.show { opacity: 1; }

/* Checklist */
.chk-item { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px dashed var(--border-light); font-size: 13px; color: var(--text-dim); align-items: flex-start; }
.chk-item:last-child { border-bottom: none; }
.chk-item input { margin-top: 3px; accent-color: var(--success); flex-shrink: 0; }
.chk-item label { flex: 1; cursor: pointer; }
.chk-item.done label { color: var(--text-muted); text-decoration: line-through; }

/* Back button */
.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--primary-light); text-decoration: none; margin-bottom: 16px; padding: 8px 14px; background: rgba(37,99,235,0.10); border: 1px solid rgba(37,99,235,0.3); border-radius: 8px; }
.back-link:hover { background: rgba(37,99,235,0.22); }

/* Provisional data banner + inline marks */
.prov-banner {
  background: linear-gradient(135deg, rgba(245,158,11,0.10), rgba(251,191,36,0.06));
  border: 1px solid rgba(245,158,11,0.4);
  border-radius: 12px;
  padding: 14px 18px;
  margin-bottom: 18px;
  display: flex; gap: 14px; align-items: flex-start;
}
.prov-banner-ico { font-size: 22px; flex-shrink: 0; }
.prov-banner-body { flex: 1; font-size: 13px; color: #fbbf24; line-height: 1.55; }
.prov-banner-body b { color: #fcd34d; }
.prov-banner-body .fields { display: inline-flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.prov-banner-body .field-chip { background: rgba(245,158,11,0.18); border: 1px solid rgba(245,158,11,0.35); padding: 2px 8px; border-radius: 4px; font-size: 11px; color: #fde68a; }
.prov-mark {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  background: rgba(245,158,11,0.15);
  color: #fbbf24;
  padding: 1px 6px;
  border-radius: 3px;
  margin-left: 6px;
  vertical-align: middle;
  letter-spacing: 0.04em;
  cursor: help;
  border: 1px solid rgba(245,158,11,0.3);
}
.prov-list-item { position: relative; }
.prov-list-item::before {
  content: '📝';
  font-size: 11px;
  margin-right: 4px;
  opacity: 0.7;
}

.foot { border-top: 1px solid var(--border-light); padding: 28px 0 8px; text-align: center; margin-top: 30px; }
.foot-line { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
.foot-line a { color: var(--primary-light); text-decoration: none; }
.foot-meta { font-family: 'Press Start 2P', monospace; font-size: 9px; color: rgba(148,163,184,0.35); letter-spacing: 0.15em; margin-top: 16px; }

.spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.08); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 60px auto; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }

@media (max-width: 720px) {
  .hdr { flex-direction: column; align-items: flex-start; }
  body { padding: 14px; }
  .profile-hdr { flex-direction: column; text-align: center; }
}
</style>
</head>
<body>
<div class="wrap">

  <header class="hdr">
    <div class="hdr-l">
      <div class="hdr-title" id="hdr-title">VOICE AGENTS</div>
      <div class="hdr-sub" id="hdr-sub">MÓDULO B · EPI-USE VOICES</div>
    </div>
    <div class="hdr-r">
      <a class="hdr-chip link" href="/">🎮 Game</a>
      <a class="hdr-chip link" href="/dashboard">📊 Dashboard</a>
      <a class="hdr-chip link" href="/painel">🎯 Painel</a>
    </div>
  </header>

  <main id="main">
    <div class="spinner"></div>
  </main>

  <footer class="foot">
    <div class="foot-line">Voice Agents · v1.0 · maio/2026 &nbsp; | &nbsp; <a href="https://erp.ngo" target="_blank">🐘 ERP.ngo</a></div>
    <div class="foot-meta">EPI-USE BRASIL · DISTRIBUIÇÃO VOICES · POWERED BY AI OFFICE ENGINE</div>
  </footer>

</div>

<script>
'use strict';

const params = new URLSearchParams(location.search);
const slug = params.get('v');

async function fetchVoices() {
  const res = await fetch('/api/voices.json');
  return res.json();
}

async function fetchVoiceMd(slug) {
  try {
    const res = await fetch(`/api/voices/${slug}.md`);
    if (!res.ok) return null;
    return await res.text();
  } catch (e) { return null; }
}

function avatarStyle(grad) {
  return `background: linear-gradient(135deg, ${grad[0]}, ${grad[1]})`;
}

// Helpers para campos que podem ser {valor, provisorio} ou valor cru
function getField(v, key) {
  const raw = v[key];
  if (raw && typeof raw === 'object' && !Array.isArray(raw) && 'valor' in raw) return raw.valor;
  return raw;
}
function isProv(v, key) {
  const raw = v[key];
  return !!(raw && typeof raw === 'object' && !Array.isArray(raw) && raw.provisorio === true);
}
function provMark(v, key, label) {
  return isProv(v, key)
    ? ` <span class="prov-mark" title="Dado provisório — aguarda confirmação do Voice">${label || '📝 provisório'}</span>`
    : '';
}
// Mapeamento de chave técnica → label humano
const PROV_LABEL = {
  linkedin: 'URL LinkedIn',
  tom_voz: 'Tom de voz',
  lado_humano: 'Lado humano',
  resultados: 'Resultados quantitativos'
};

async function renderGallery() {
  document.getElementById('hdr-title').textContent = 'VOICE AGENTS';
  document.getElementById('hdr-sub').textContent = 'MÓDULO B · EPI-USE VOICES';
  if (window.plausible) plausible('Voices Gallery View');

  let data;
  try { data = await fetchVoices(); }
  catch (e) {
    document.getElementById('main').innerHTML = '<div class="empty-state">Erro carregando Voices.</div>'; return;
  }

  let html = `<p class="intro">
    Cada <b>Voice</b> tem um agente de IA com sua personalidade, nicho e regras de tom. Clique num Voice abaixo
    para ver o prompt do agente (copiável pra colar no Claude.ai/Gemini) + checklist de próximos passos.
  </p>
  <div class="sec-hdr"><h2>Voices Ativos</h2><div class="line"></div></div>
  <div class="voices-grid">`;
  for (const v of data.voices) {
    html += `<a class="voice-tile" href="/voices?v=${v.id}" onclick="plausible && plausible('Voice Page View',{props:{voice:'${v.id}'}})">
      <div class="vt-head">
        <div class="vt-avatar" style="${avatarStyle(v.avatar_grad)}">👤</div>
        <div class="vt-name-w">
          <div class="vt-name">${v.nome}</div>
          <div class="vt-role">${v.cargo}</div>
        </div>
        <div class="vt-num">#0${v.numero}</div>
      </div>
      <div class="vt-tags">${v.tags.map(t => `<span class="vt-tag">${t}</span>`).join('')}</div>
      <span class="vt-status ${v.status}">${v.status_label}</span>
      <div class="vt-cta">Abrir agente →</div>
    </a>`;
  }
  html += `</div>

  <div class="sec-hdr"><h2>Vagas Abertas — recrute o próximo Voice</h2><div class="line"></div></div>
  <div class="voices-grid">`;
  for (const vg of data.vagas_abertas) {
    html += `<a class="voice-tile" href="/seja-voice" style="opacity:0.85">
      <div class="vt-head">
        <div class="vt-avatar empty">?</div>
        <div class="vt-name-w">
          <div class="vt-name">Vaga Reservada</div>
          <div class="vt-role">${vg.nicho}</div>
        </div>
        <div class="vt-num">#0${vg.numero}</div>
      </div>
      <div class="vt-tags">${vg.tags.map(t => `<span class="vt-tag">${t}</span>`).join('')}</div>
      <div class="vt-cta">Recrutar →</div>
    </a>`;
  }
  html += `</div>`;
  document.getElementById('main').innerHTML = html;
}

function buildSystemPrompt(voice, mdContent) {
  // Extract just the "INSTRUÇÕES DO AGENTE" section from the .md if possible
  let instructionsSection = mdContent;
  const idx = mdContent.indexOf('## INSTRUÇÕES DO AGENTE');
  if (idx > -1) instructionsSection = mdContent.slice(idx);

  const linkedin = getField(voice, 'linkedin');
  const tom = getField(voice, 'tom_voz');
  const humano = getField(voice, 'lado_humano');
  const resultados = getField(voice, 'resultados') || [];
  const provNote = (key) => isProv(voice, key) ? ' [⚠️ provisório — confirmar com o Voice]' : '';

  const ctx = `Você é o agente de conteúdo LinkedIn do(a) ${voice.nome}, ${voice.cargo} na EPI-USE Brasil.

CONTEXTO DO PROFISSIONAL:
- Nome: ${voice.nome}
- Cargo: ${voice.cargo}
- Empresa: ${voice.empresa}
- Nicho: ${voice.nicho}
- Audiência-alvo: ${voice.audiencia.join(', ')}
- LinkedIn: ${linkedin}${provNote('linkedin')}
- Tom de voz: ${tom || '(definir)'}${provNote('tom_voz')}
- Lado humano: ${humano || '(definir)'}${provNote('lado_humano')}

RESULTADOS REAIS:${provNote('resultados')}
${resultados.map(r => `- ${r}`).join('\n')}

CONTEXTO DO PROGRAMA EPI-USE VOICES:
EPI-USE Brasil — maior consultoria SAP HCM/Payroll do Brasil, parte do grupo groupelephant.com (4.500+ profissionais, 40 países, SAP Gold Partner). Todos os Voices são embaixadores do ERP.ngo (1% da receita global do grupo destinada à conservação de elefantes e combate à pobreza rural na África).

${instructionsSection}`;
  return ctx;
}

async function renderProfile(slug) {
  let data, md;
  try {
    [data, md] = await Promise.all([fetchVoices(), fetchVoiceMd(slug)]);
  } catch (e) {
    document.getElementById('main').innerHTML = '<div class="empty-state">Erro carregando dados.</div>'; return;
  }

  const voice = data.voices.find(v => v.id === slug);
  if (!voice) {
    document.getElementById('main').innerHTML = `<div class="empty-state">Voice "${slug}" não encontrada. <a href="/voices" style="color:#60a5fa">Voltar à galeria</a></div>`; return;
  }

  document.getElementById('hdr-title').textContent = voice.nome.toUpperCase().slice(0,18);
  document.getElementById('hdr-sub').textContent = `${voice.cargo.toUpperCase()} · #0${voice.numero}`;

  const mdRendered = md ? marked.parse(md) : '<p style="color:#64748b;font-style:italic">Arquivo .md ainda não criado para este Voice.</p>';
  const systemPrompt = md ? buildSystemPrompt(voice, md) : 'Crie o arquivo .md do agente primeiro.';

  const checklistKey = `voice-chk-${slug}`;
  const checks = JSON.parse(localStorage.getItem(checklistKey) || '{}');
  const checklistItems = [
    { id: 'publicar-2-sem', label: 'Publicar 2 posts esta semana' },
    { id: 'baseline-ssi', label: 'Registrar baseline de SSI no LinkedIn' },
    { id: 'baseline-seg', label: 'Registrar baseline de seguidores' },
    { id: 'engajar-5', label: 'Comentar em 5 posts de líderes do nicho hoje' },
    { id: 'kit-final', label: 'Aplicar kit do Profile Optimizer no LinkedIn' },
    { id: 'erp-ngo', label: 'Adicionar ERP.ngo como Causa Social no perfil' }
  ];

  const dadosConfirmar = voice.dados_a_confirmar || [];
  const provBanner = dadosConfirmar.length > 0 ? `
    <div class="prov-banner">
      <div class="prov-banner-ico">⚠️</div>
      <div class="prov-banner-body">
        <b>Dados provisórios neste perfil.</b> Alguns campos foram preenchidos por estimativa durante o build inicial — aguardando confirmação do(a) <b>${voice.nome}</b> na próxima call com a Duda.
        <div class="fields">
          ${dadosConfirmar.map(k => `<span class="field-chip">${PROV_LABEL[k] || k}</span>`).join('')}
        </div>
      </div>
    </div>
  ` : '';

  const linkedinUrl = getField(voice, 'linkedin');

  document.getElementById('main').innerHTML = `
    <a class="back-link" href="/voices">← Voltar à galeria</a>

    ${provBanner}

    <div class="profile-hdr">
      <div class="profile-avatar" style="${avatarStyle(voice.avatar_grad)}">👤</div>
      <div class="profile-info">
        <div class="profile-name">${voice.nome}</div>
        <div class="profile-role">${voice.cargo} · ${voice.empresa}</div>
        <div class="profile-meta">
          <span>🎯 ${voice.nicho}</span>
          <span>👥 ${voice.audiencia.join(', ')}</span>
          <span>🔗 <a href="${linkedinUrl}" target="_blank" style="color:var(--primary-light);text-decoration:none">LinkedIn</a>${provMark(voice, 'linkedin')}</span>
          <span>📊 SSI: ${voice.ssi_baseline ?? '—'}</span>
          <span>👁️ Seguidores: ${voice.seguidores_baseline ?? '—'}</span>
        </div>
      </div>
      <div class="profile-num">#0${voice.numero}</div>
    </div>

    <div class="card">
      <div class="card-title"><span class="ico">📋</span> Contexto do Agente${dadosConfirmar.includes('tom_voz') || dadosConfirmar.includes('lado_humano') || dadosConfirmar.includes('resultados') ? ' <span class="prov-mark">📝 contém dados provisórios</span>' : ''}</div>
      <div class="md-content">${mdRendered}</div>
    </div>

    <div class="card">
      <div class="card-title"><span class="ico">💬</span> Ativar Agente — copie e cole no Claude.ai/Gemini/ChatGPT</div>
      <div class="prompt-wrap">
        <textarea id="prompt-area" class="prompt-textarea" readonly>${systemPrompt.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</textarea>
        <div class="prompt-actions">
          <button class="btn btn-primary" onclick="copyPrompt()">📋 Copiar prompt completo</button>
          <a class="btn btn-secondary" href="https://claude.ai/new" target="_blank">↗ Abrir Claude.ai</a>
          <span class="copy-status" id="copy-status">✓ Copiado para clipboard</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="ico">📝</span> Próximos passos</div>
      <div id="checklist">
        ${checklistItems.map(it => `
          <div class="chk-item ${checks[it.id] ? 'done' : ''}">
            <input type="checkbox" id="chk-${it.id}" data-id="${it.id}" ${checks[it.id] ? 'checked' : ''}>
            <label for="chk-${it.id}">${it.label}</label>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="ico">📊</span> Métricas recentes</div>
      <p style="color:var(--text-muted);font-size:13px">Posts no mês atual: <b style="color:var(--text)">${voice.posts_mes_atual || 0}</b> · Último post: <b style="color:var(--text)">${voice.ultimo_post || 'sem dados'}</b></p>
      <p style="color:var(--text-muted);font-size:12px;margin-top:8px;font-style:italic">Métricas detalhadas (impressões, engajamento, conversões) virão na próxima sprint via integração com LinkedIn Insights.</p>
    </div>
  `;

  // Hook checklist
  document.querySelectorAll('#checklist input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', () => {
      checks[cb.dataset.id] = cb.checked;
      localStorage.setItem(checklistKey, JSON.stringify(checks));
      cb.closest('.chk-item').classList.toggle('done', cb.checked);
    });
  });
}

window.copyPrompt = function() {
  const ta = document.getElementById('prompt-area');
  ta.select(); ta.setSelectionRange(0, 99999);
  navigator.clipboard.writeText(ta.value).then(() => {
    const st = document.getElementById('copy-status');
    st.classList.add('show');
    setTimeout(() => st.classList.remove('show'), 2200);
    if (window.plausible) plausible('Voice Prompt Copied', { props: { voice: slug } });
  });
};

// Route
if (slug) {
  renderProfile(slug);
} else {
  renderGallery();
}
</script>
</body>
</html>
