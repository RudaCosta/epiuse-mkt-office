<html lang="pt-BR">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #060e1a; overflow: hidden; font-family: 'Inter', sans-serif; color: #fff; user-select: none; }

/* ── CANVAS ─────────────────────────────────────────────────────── */
#gc { display: block; position: fixed; inset: 0; }

/* ── HUD ────────────────────────────────────────────────────────── */
#hud {
  position: fixed; top: 0; left: 0; right: 0; height: 46px;
  background: rgba(6,14,26,0.88); backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(37,99,235,0.3);
  display: none; align-items: center; padding: 0 14px; gap: 10px; z-index: 20;
}
#hud.on { display: flex; }
#hud-logo { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #60a5fa; white-space: nowrap; }
#hud-hint { font-size: 11px; color: #475569; white-space: nowrap; }
#hud-spacer { flex: 1; }
#hud-zone { font-size: 11px; color: #94a3b8; padding: 3px 10px; background: rgba(37,99,235,0.08); border-radius: 10px; min-width: 120px; text-align: center; transition: opacity .3s; }
#hud-user { font-size: 12px; font-weight: 600; color: #93c5fd; background: rgba(37,99,235,0.15); border: 1px solid rgba(37,99,235,0.35); padding: 4px 12px; border-radius: 20px; white-space: nowrap; }

/* ── SPAWN GATE ─────────────────────────────────────────────────── */
#spawn {
  position: fixed; inset: 0; background: #060e1a;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0; z-index: 1000;
}
#spawn-anim { width: 88px; height: 88px; margin-bottom: 24px; image-rendering: pixelated; }
.sg-title { font-family: 'Press Start 2P', monospace; font-size: clamp(14px, 2.5vw, 22px); color: #60a5fa; text-align: center; line-height: 1.6; margin-bottom: 6px; }
.sg-sub { font-size: 13px; color: #475569; margin-bottom: 36px; text-align: center; }
.sg-form { display: flex; flex-direction: column; align-items: stretch; gap: 10px; width: 300px; }
.sg-label { font-size: 12px; color: #64748b; }
.sg-input { padding: 12px 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(37,99,235,0.4); border-radius: 8px; color: #fff; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border-color .2s, background .2s; }
.sg-input:focus { border-color: #2563EB; background: rgba(37,99,235,0.08); }
.sg-btn { padding: 13px; background: #2563EB; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; transition: background .15s; margin-top: 4px; }
.sg-btn:hover { background: #1d4ed8; }
.sg-note { font-size: 11px; color: #334155; text-align: center; margin-top: 24px; }

/* ── IFRAME MODAL ───────────────────────────────────────────────── */
#modal { position: fixed; inset: 0; background: rgba(0,0,0,.82); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 200; }
#modal.open { display: flex; }
#modal-box { position: relative; width: 93vw; height: 93vh; border-radius: 12px; overflow: hidden; border: 1px solid rgba(37,99,235,.4); background: #0a1628; }
#modal-frame { width: 100%; height: 100%; border: 0; }
#modal-close { position: absolute; top: 10px; right: 10px; width: 34px; height: 34px; border-radius: 50%; background: rgba(220,38,38,.9); color: #fff; border: none; font-size: 16px; cursor: pointer; z-index: 201; line-height: 34px; text-align: center; }
#modal-close:hover { background: #dc2626; }

/* ── INFO MODAL ─────────────────────────────────────────────────── */
#info-modal { position: fixed; inset: 0; background: rgba(0,0,0,.75); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 200; }
#info-modal.open { display: flex; }
#info-box { position: relative; width: 460px; max-width: 92vw; background: #0d1e36; border: 1px solid rgba(37,99,235,.4); border-radius: 16px; padding: 32px; }
#info-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #93c5fd; }
#info-body { font-size: 13px; line-height: 1.75; color: #cbd5e1; white-space: pre-line; }
#info-close { position: absolute; top: 12px; right: 12px; width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,.08); color: #fff; border: none; font-size: 14px; cursor: pointer; }
#info-close:hover { background: rgba(255,255,255,.16); }

/* ── TOAST ──────────────────────────────────────────────────────── */
#toast-wrap { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 300; display: flex; flex-direction: column-reverse; gap: 7px; align-items: center; pointer-events: none; }
.toast { background: rgba(13,30,54,.96); border: 1px solid rgba(37,99,235,.5); border-radius: 8px; padding: 9px 18px; font-size: 13px; color: #e2e8f0; backdrop-filter: blur(8px); white-space: nowrap; animation: tIn .3s ease, tOut .3s ease 2.7s forwards; }
@keyframes tIn  { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }
@keyframes tOut { to { opacity:0 } }
</style>

// ── MAP ARRAYS ─────────────────────────────────────────────────────
const mapTiles = new Uint8Array(COLS * ROWS).fill(T.FLOOR);
const mapSolid = new Uint8Array(COLS * ROWS);

function fillArea(c, r, w, h, tile, solid) {
  for (let row = r; row < r + h && row < ROWS; row++) {
    for (let col = c; col < c + w && col < COLS; col++) {
      const i = row * COLS + col;
      mapTiles[i] = tile;
      if (solid) mapSolid[i] = 1;
    }
  }
}

(function buildMap() {
  // Perimeter walls
  fillArea(0, 0, COLS, 1, T.WALL, true);
  fillArea(0, ROWS - 1, COLS, 1, T.WALL, true);
  fillArea(0, 0, 1, ROWS, T.WALL, true);
  fillArea(COLS - 1, 0, 1, ROWS, T.WALL, true);

  // ── Carpet zones ──────────────────────────────────────────────────
  fillArea(7,  1,  8,  5,  T.COFFEE);    // Coffee corner
  fillArea(21, 1, 10,  4,  T.HUB);       // Marketing Hub board

  fillArea(31, 15, 8,  7,  T.OPTIM);     // Profile Optimizer booth
  fillArea(21, 19,11,  8,  T.DUDA);      // Duda's office

  }
  // Bottom wall with entrance gap at cols 25-26 (player enters from south)
  for (let c = 22; c <= 30; c++) {
    if (c < 25 || c > 26) { mapTiles[26*COLS+c] = T.WALL; mapSolid[26*COLS+c] = 1; }
  }

  // Corridor between SAP Lab and main area (leave cols 38-40 open)
  // (already open by default)
})();

  { x:28*TS, y:14*TS, w:TS-4, h:TS-4, color:'#042008', bc:'#14532d', label:'🪴' },

  // Entrance mat
  { x:23*TS, y:28*TS+4, w:4*TS, h:TS-10, color:'#08183c', bc:'#1e40af', label:'🚪 ENTRADA' },
];

// ── INTERACTIVE ZONES ─────────────────────────────────────────────
// px/py = center of zone in world pixels, r = interaction radius
const ZONES = [
  {
    id:'coffee', px:11*TS, py:3*TS, r:64,
    name:'☕ Coffee Corner',
    tip:'Lore do programa EPI-USE Voices',
    action:{ type:'info', title:'☕ Coffee Corner — Programa EPI-USE Voices',
      body:`Bem-vindo ao EPI-USE Voices!\n\nSomos o programa de influência executiva da EPI-USE Brasil — maior consultoria SAP HCM/Payroll do Brasil, parte do grupo groupelephant.com (4.500+ profissionais, 40+ países, SAP Gold Partner).\n\nTodos os nossos Voices são automaticamente embaixadores do ERP.ngo — iniciativa que destina 1% da receita global do grupo para conservação de elefantes e combate à pobreza rural na África.\n\n🎯 Meta: transformar colaboradores em referências no LinkedIn com autenticidade e resultado mensurável.\n\n☕ Sente-se, relaxe, e vamos construir sua influência!` }
  },
  {
    id:'hub', px:26*TS, py:2.5*TS, r:72,
    name:'📺 Marketing Hub',
    tip:'Portal de onboarding e conteúdo EPI-USE',
    action:{ type:'iframe', url:'/hub' }
  },
  {
    id:'baia-01', px:10*TS, py:8*TS, r:52,
    name:'Anderson Costa 🎙️',
    tip:'Voice ativo — Consultor SAP HCM',
    action:{ type:'info', title:'🎙️ Anderson Costa — Voice Ativo',
      body:`Cargo: Consultor SAP HCM / SuccessFactors\nEmpresa: EPI-USE Brasil\n\nAnderson é um dos primeiros Voices do programa. Especialista em HCM e payroll com forte atuação em implementações S/4HANA.\n\nSSI Score: em evolução\nSeguidores: em crescimento\n\n📌 Use o Profile Optimizer (baia ao centro-direito) para gerar o kit completo deste Voice.\n\n💡 Módulo B — Voice Agents está a caminho!` }
  },
  {

      body:`Cargo: Especialista SAP | EPI-USE Brasil\n\nCarlos integra o time inaugural do EPI-USE Voices, trazendo experiência sólida em projetos SAP para clientes de grande porte no Brasil.\n\nSSI Score: em evolução\nSeguidores: em crescimento\n\n📌 Use o Profile Optimizer para gerar o kit completo.\n\n💡 Módulo B — Voice Agents em breve!` }

  {

// ── INPUT SYSTEM ───────────────────────────────────────────────────
const keysHeld = {};
const keysJust = new Set();

document.addEventListener('keydown', e => {
  if (!keysHeld[e.code]) keysJust.add(e.code);
  keysHeld[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  if (e.code === 'Escape') { closeModal(); closeInfo(); }
});
document.addEventListener('keyup', e => { keysHeld[e.code] = false; });

const isHeld = c => !!keysHeld[c];
const wasJust = c => keysJust.has(c);
const clearJust = () => keysJust.clear();

const UP    = () => isHeld('KeyW') || isHeld('ArrowUp');
const DOWN  = () => isHeld('KeyS') || isHeld('ArrowDown');
const LEFT  = () => isHeld('KeyA') || isHeld('ArrowLeft');
const RIGHT = () => isHeld('KeyD') || isHeld('ArrowRight');
const ACT   = () => wasJust('KeyE') || wasJust('Space');

// ── CAMERA ─────────────────────────────────────────────────────────
const cam = { x: 0, y: 0 };

function updateCamera(px, py, vw, vh) {
  const tx = Math.max(0, Math.min(px + 12 - vw / 2, WW - vw));
  const ty = Math.max(0, Math.min(py + 12 - vh / 2, WH - vh));
  cam.x += (tx - cam.x) * 0.10;
  cam.y += (ty - cam.y) * 0.10;
}

// ── PLAYER ─────────────────────────────────────────────────────────
const player = {
  x: 25 * TS, y: 27 * TS,  // spawn at entrance
  dir: 'up', walkF: 0, walkT: 0, moving: false, name: ''
};

function solidAt(x, y, w, h) {
  const pts = [[x,y],[x+w,y],[x,y+h],[x+w,y+h]];
  for (const [px, py] of pts) {
    const c = Math.floor(px / TS), r = Math.floor(py / TS);
    if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return true;
    if (mapSolid[r * COLS + c]) return true;
  }
  return false;
}

function updatePlayer(dt) {
  if (modalIsOpen || infoIsOpen) return;
  let dx = 0, dy = 0;
  if (UP())    { dy -= 1; player.dir = 'up'; }
  if (DOWN())  { dy += 1; player.dir = 'down'; }
  if (LEFT())  { dx -= 1; player.dir = 'left'; }
  if (RIGHT()) { dx += 1; player.dir = 'right'; }
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }
  player.moving = !!(dx || dy);

  const HB = 14, HOX = 5, HOY = 16;
  const nx = player.x + dx * PLAYER_SPEED * dt;
  const ny = player.y + dy * PLAYER_SPEED * dt;
  if (!solidAt(nx + HOX, player.y + HOY, HB, HB)) player.x = nx;
  if (!solidAt(player.x + HOX, ny + HOY, HB, HB)) player.y = ny;

  player.x = Math.max(TS, Math.min(player.x, WW - TS));
  player.y = Math.max(TS, Math.min(player.y, WH - TS));

  if (player.moving) {
    player.walkT += dt;
    if (player.walkT > 0.13) { player.walkF = (player.walkF + 1) % 4; player.walkT = 0; }
  } else {
    player.walkF = 0;
  }
}

// ── CANVAS & CTX ───────────────────────────────────────────────────
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
let vw, vh;

function resizeCanvas() {
  vw = canvas.width  = window.innerWidth;
  vh = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── RENDER: MAP ────────────────────────────────────────────────────
function renderMap() {
  const cx = cam.x, cy = cam.y;
  const c0 = Math.max(0, Math.floor(cx / TS));
  const r0 = Math.max(0, Math.floor(cy / TS));
  const c1 = Math.min(COLS, Math.ceil((cx + vw) / TS));
  const r1 = Math.min(ROWS, Math.ceil((cy + vh) / TS));

  for (let r = r0; r < r1; r++) {
    for (let c = c0; c < c1; c++) {
      const tid = mapTiles[r * COLS + c];
      const vis = TC[tid] || TC[1];
      const sx = c * TS - cx, sy = r * TS - cy;
      ctx.fillStyle = vis.bg;
      ctx.fillRect(sx, sy, TS, TS);
      ctx.strokeStyle = vis.gl;
      ctx.lineWidth = 0.4;
      ctx.strokeRect(sx + 0.5, sy + 0.5, TS - 1, TS - 1);
    }
  }
}

// ── RENDER: OBJECTS ────────────────────────────────────────────────
function renderObjects() {
  ctx.save();
  ctx.font = '10px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (const o of OBJECTS) {
    const sx = o.x - cam.x, sy = o.y - cam.y;
    if (sx + o.w < -20 || sx > vw + 20 || sy + o.h < -20 || sy > vh + 20) continue;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.fillRect(sx + 3, sy + 4, o.w, o.h);
    // Body
    ctx.fillStyle = o.color;
    ctx.fillRect(sx, sy, o.w, o.h);
    // Border
    ctx.strokeStyle = o.bc;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(sx + 0.75, sy + 0.75, o.w - 1.5, o.h - 1.5);
    // Label
    if (o.label) {
      const maxF = Math.min(11, (o.w - 8) / Math.max(1, o.label.length) * 1.65);
      ctx.fillStyle = 'rgba(255,255,255,0.72)';
      ctx.font = `${Math.max(8, maxF)}px Inter, sans-serif`;
      ctx.fillText(o.label, sx + o.w / 2, sy + o.h / 2, o.w - 8);
    }
  }
  ctx.restore();
}

// ── RENDER: AREA LABELS ────────────────────────────────────────────
const AREA_LABELS = [
  { px:17*TS, py:5.5*TS, text:'VOICES AREA', color:'rgba(96,165,250,0.30)' },
  { px:44*TS, py:8.5*TS, text:'SAP LAB', color:'rgba(167,139,250,0.30)' },
  { px:35*TS, py:15.5*TS, text:'OPTIMIZER', color:'rgba(52,211,153,0.28)' },
  { px:26*TS, py:22.5*TS, text:"DUDA'S OFFICE", color:'rgba(251,146,60,0.28)' },
  { px:40*TS, py:20.5*TS, text:'EVENTS', color:'rgba(45,212,191,0.28)' },
  { px:11*TS, py:1.5*TS, text:'COFFEE CORNER', color:'rgba(251,191,36,0.28)' },
  { px:17*TS, py:15.5*TS, text:'ERP.NGO', color:'rgba(74,222,128,0.26)' },
  { px:26*TS, py:1.5*TS, text:'MARKETING HUB', color:'rgba(192,132,252,0.28)' },
];

function renderAreaLabels() {
  ctx.save();
  ctx.font = 'bold 9px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const a of AREA_LABELS) {
    const sx = a.px - cam.x, sy = a.py - cam.y;
    if (sx < -160 || sx > vw + 160) continue;
    ctx.fillStyle = a.color;
    ctx.fillText(a.text, sx, sy);
  }
  ctx.restore();
}

// ── RENDER: PLAYER ─────────────────────────────────────────────────
function renderPlayer() {
  const sx = Math.round(player.x - cam.x);
  const sy = Math.round(player.y - cam.y);
  const bob = player.moving ? Math.sin(player.walkF * Math.PI * 0.5) * 1.5 : 0;
  const leg = player.moving ? Math.sin(player.walkF * Math.PI * 0.5) * 3.5 : 0;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.32)';
  ctx.beginPath();
  ctx.ellipse(sx + 12, sy + 30, 9, 3.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs
  ctx.fillStyle = '#1e3a8a';
  ctx.fillRect(sx + 6,  sy + 20 + bob, 5, 9 - leg);
  ctx.fillRect(sx + 13, sy + 20 + bob, 5, 9 + leg);

  // Shoes
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(sx + 5,  sy + 28 + bob - leg, 7, 4);
  ctx.fillRect(sx + 12, sy + 28 + bob + leg, 7, 4);

  // Body (EPI-USE blue jacket)
  ctx.fillStyle = '#2563EB';
  ctx.fillRect(sx + 4, sy + 12 + bob, 16, 10);
  // Shirt logo accent
  ctx.fillStyle = '#93c5fd';
  ctx.fillRect(sx + 7, sy + 14 + bob, 5, 3);

  // Neck
  ctx.fillStyle = '#f59e0b';
  ctx.fillRect(sx + 10, sy + 10 + bob, 4, 4);

  // Head
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath();
  ctx.arc(sx + 12, sy + 7 + bob, 7.5, 0, Math.PI * 2);
  ctx.fill();

  // Face details
  ctx.fillStyle = '#0f172a';
  switch (player.dir) {
    case 'down':
      ctx.fillRect(sx + 9,  sy + 6 + bob, 2, 2);
      ctx.fillRect(sx + 14, sy + 6 + bob, 2, 2);
      ctx.fillRect(sx + 10, sy + 10 + bob, 4, 1);
      break;
    case 'up':
      // no face visible (back of head)
      ctx.fillStyle = '#e6a800';
      ctx.fillRect(sx + 8, sy + 4 + bob, 8, 5);
      break;
    case 'right':
      ctx.fillRect(sx + 15, sy + 6 + bob, 2, 2);
      ctx.fillRect(sx + 14, sy + 9 + bob, 3, 1);
      break;
    case 'left':
      ctx.fillRect(sx + 7, sy + 6 + bob, 2, 2);
      ctx.fillRect(sx + 7, sy + 9 + bob, 3, 1);
      break;
  }

  // Hair
  ctx.fillStyle = '#92400e';
  ctx.fillRect(sx + 6, sy + 1 + bob, 12, 5);
  ctx.fillRect(sx + 4, sy + 4 + bob, 3, 4);

  // Name tag above player
  if (player.name) {
    ctx.save();
    const label = player.name;
    ctx.font = '600 10px Inter, sans-serif';
    const tw = ctx.measureText(label).width + 10;
    const tx = sx + 12 - tw / 2;
    const ty = sy - 12;
    ctx.fillStyle = 'rgba(9,25,48,0.88)';
    ctx.fillRect(tx, ty, tw, 14);
    ctx.fillStyle = '#93c5fd';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(label, tx + 5, ty + 2);
    ctx.restore();
  }
}

// ── RENDER: ZONES (interaction hints) ─────────────────────────────
let pulseT = 0;
let activeZone = null;

function renderZones() {
  const pulse = 0.5 + 0.5 * Math.sin(pulseT * 3.5);
  const px = player.x + 12, py = player.y + 12;

  activeZone = null;
  let minDist = Infinity;

  for (const z of ZONES) {
    const dist = Math.hypot(px - z.px, py - z.py);
    const nearby = dist < z.r;

    // Zone glow ring (visible from afar)
    if (dist < z.r * 2.8) {
      const alpha = nearby ? 0.14 : 0.05 * Math.max(0, 1 - (dist - z.r) / (z.r * 1.8));
      ctx.fillStyle = `rgba(37,99,235,${alpha.toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(z.px - cam.x, z.py - cam.y, z.r * 0.7, 0, Math.PI * 2);
      ctx.fill();
    }

    if (nearby && dist < minDist) { minDist = dist; activeZone = z; }
  }

  if (activeZone) {
    const z = activeZone;
    const sx = z.px - cam.x, sy = z.py - cam.y;
    const bY = sy - 58;

    // Pulsing "E" badge
    const bR = 13 + pulse * 3.5;
    ctx.save();
    ctx.shadowColor = '#2563EB';
    ctx.shadowBlur = 12 * pulse;
    ctx.fillStyle = `rgba(37,99,235,${0.82 + pulse * 0.18})`;
    ctx.beginPath();
    ctx.arc(sx, bY, bR, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.round(bR * 0.9)}px Inter, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('E', sx, bY);

    // Tooltip pill
    ctx.font = '11px Inter, sans-serif';
    const tipW = Math.min(240, ctx.measureText(z.tip).width + 22);
    const tipH = 24;
    const tipX = Math.max(6, Math.min(sx - tipW / 2, vw - tipW - 6));
    const tipY = bY + bR + 6;

    ctx.fillStyle = 'rgba(9,25,48,0.92)';
    ctx.fillRect(tipX, tipY, tipW, tipH);
    ctx.strokeStyle = 'rgba(37,99,235,0.5)';
    ctx.lineWidth = 0.8;
    ctx.strokeRect(tipX, tipY, tipW, tipH);

    ctx.fillStyle = '#cbd5e1';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(z.tip, tipX + tipW / 2, tipY + tipH / 2, tipW - 12);

    // Update HUD zone name
    document.getElementById('hud-zone').textContent = z.name;
  } else {
    document.getElementById('hud-zone').textContent = '';
  }
}

// ── RENDER: MINIMAP ────────────────────────────────────────────────
function renderMinimap() {
  const mx = vw - 90, my = vh - 70;
  const mw = 80, mh = 60;
  const scaleX = mw / WW, scaleY = mh / WH;

  // Background
  ctx.fillStyle = 'rgba(6,14,26,0.80)';
  ctx.fillRect(mx, my, mw, mh);
  ctx.strokeStyle = 'rgba(37,99,235,0.4)';
  ctx.lineWidth = 0.8;
  ctx.strokeRect(mx, my, mw, mh);

  // Carpet zones (dots of color)
  const miniZones = [
    { c:8,  r:5,  w:18, h:10, color:'rgba(37,99,235,0.5)' },
    { c:41, r:8,  w:7,  h:9,  color:'rgba(109,40,217,0.5)' },
    { c:31, r:15, w:8,  h:7,  color:'rgba(5,150,105,0.5)' },
    { c:21, r:19, w:11, h:8,  color:'rgba(217,119,6,0.5)' },
    { c:36, r:20, w:9,  h:7,  color:'rgba(13,148,136,0.5)' },
  ];
  for (const z of miniZones) {
    ctx.fillStyle = z.color;
    ctx.fillRect(mx + z.c * TS * scaleX, my + z.r * TS * scaleY, z.w * TS * scaleX, z.h * TS * scaleY);
  }

  // Viewport rect
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 0.6;
  ctx.strokeRect(
    mx + cam.x * scaleX, my + cam.y * scaleY,
    vw * scaleX, vh * scaleY
  );

  // Player dot
  ctx.fillStyle = '#f59e0b';
  ctx.beginPath();
  ctx.arc(mx + player.x * scaleX, my + player.y * scaleY, 2.5, 0, Math.PI * 2);
  ctx.fill();
}

// ── INTERACTIONS ───────────────────────────────────────────────────
function checkInteract() {
  if (activeZone && ACT()) {
    triggerAction(activeZone.action);
  }
}

// ── MODAL / INFO / TOAST ───────────────────────────────────────────
let modalIsOpen = false, infoIsOpen = false;
const modalEl    = document.getElementById('modal');
const modalFrame = document.getElementById('modal-frame');
const infoEl     = document.getElementById('info-modal');

function openModal(url) {
  modalFrame.src = url;
  modalEl.classList.add('open');
  modalIsOpen = true;
}
function closeModal() {
  modalEl.classList.remove('open');
  modalFrame.src = 'about:blank';
  modalIsOpen = false;
}
function openInfo(title, body) {
  document.getElementById('info-title').textContent = title;
  document.getElementById('info-body').textContent = body;
  infoEl.classList.add('open');
  infoIsOpen = true;
}
function closeInfo() {
  infoEl.classList.remove('open');
  infoIsOpen = false;
}
function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toast-wrap').prepend(el);
  setTimeout(() => el.remove(), 3200);
}
function triggerAction(action) {
  switch (action.type) {
    case 'iframe':    openModal(action.url); break;
    case 'external':  window.open(action.url, '_blank'); break;
    case 'toast':     showToast(action.msg); break;
    case 'info':      openInfo(action.title, action.body); break;
  }
}

// Close modals on backdrop click
modalEl.addEventListener('click', e => { if (e.target === modalEl) closeModal(); });
infoEl.addEventListener('click',  e => { if (e.target === infoEl)  closeInfo(); });

// ── GAME LOOP ──────────────────────────────────────────────────────
let lastTime = 0;
let gameActive = false;

function loop(ts) {
  if (!gameActive) return;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  pulseT += dt;

  updatePlayer(dt);
  updateCamera(player.x, player.y, vw, vh);
  checkInteract();
  clearJust();

  // Clear
  ctx.fillStyle = '#060e1a';
  ctx.fillRect(0, 0, vw, vh);

  renderMap();
  renderObjects();
  renderAreaLabels();
  renderZones();
  renderPlayer();
  renderMinimap();

  requestAnimationFrame(loop);
}

// ── SPAWN GATE ANIMATION ───────────────────────────────────────────
(function initSpawnAnim() {
  const sc = document.getElementById('spawn-anim');
  const sx = sc.getContext('2d');
  let t = 0;

  function frame() {
    sx.clearRect(0, 0, 88, 88);

    // Floor
    sx.fillStyle = '#182438'; sx.fillRect(4, 44, 80, 40);
    sx.strokeStyle = '#1f2d45'; sx.lineWidth = 0.4;
    for (let i = 4; i < 84; i += 8) sx.strokeRect(i, 44, 8, 8);

    // Desk
    sx.fillStyle = '#1a3260'; sx.fillRect(16, 48, 56, 18);
    sx.strokeStyle = '#2563eb'; sx.lineWidth = 1;
    sx.strokeRect(16.5, 48.5, 55, 17);

    // Monitor
    sx.fillStyle = '#07100e'; sx.fillRect(28, 28, 32, 22);
    sx.fillStyle = '#1e40af'; sx.fillRect(30, 30, 28, 18);
    // Screen glow animation
    const g = 0.5 + 0.5 * Math.sin(t * 2);
    sx.fillStyle = `rgba(96,165,250,${0.25 + g * 0.45})`;
    sx.fillRect(30, 30, 28, 18);
    // EPI-USE logo pixel on screen
    sx.fillStyle = 'rgba(255,255,255,0.7)';
    sx.fillRect(38, 34, 12, 6);

    // Character bob
    const bob = Math.sin(t * 2.5) * 2;
    // Body
    sx.fillStyle = '#2563EB'; sx.fillRect(38, 52 + bob, 12, 8);
    // Head
    sx.fillStyle = '#fbbf24';
    sx.beginPath(); sx.arc(44, 47 + bob, 6, 0, Math.PI * 2); sx.fill();

    t += 0.04;
    requestAnimationFrame(frame);
  }
  frame();
})();

// ── SPAWN GATE LOGIC ───────────────────────────────────────────────
function enterOffice() {
  const raw = document.getElementById('player-name').value.trim();
  player.name = raw || 'Visitante';

  document.getElementById('spawn').style.display = 'none';
  document.getElementById('hud').classList.add('on');
  document.getElementById('hud-user').textContent = '👤 ' + player.name;

  gameActive = true;
  lastTime = performance.now();
  requestAnimationFrame(loop);

  setTimeout(() => showToast(`🎉 Bem-vindo ao EPI-USE Office, ${player.name}!`), 400);
  setTimeout(() => showToast('💡 Use WASD para mover e E para interagir com as baias.'), 1800);
  setTimeout(() => showToast('🪪 Experimente o Profile Optimizer ao centro-direito do mapa!'), 3600);
}

document.getElementById('player-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') enterOffice();
});
