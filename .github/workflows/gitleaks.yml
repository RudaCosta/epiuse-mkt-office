# Secret scanning em todo push/PR — impede novo segredo commitado no repo.
# Docs: https://github.com/gitleaks/gitleaks-action
name: gitleaks
on:
  push:
  pull_request:
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
